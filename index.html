<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHJ Exp App</title>
<style>
  :root {
    --primary:#1a5276;--primary-light:#2980b9;--accent:#e67e22;--accent-light:#f39c12;
    --success:#27ae60;--danger:#c0392b;--warn:#d4ac0d;--bg:#f4f6f8;--card:#ffffff;
    --border:#dce3ea;--text:#1c2833;--text-muted:#7f8c8d;--sidebar-w:260px;--header-h:64px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
  #loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a5276 0%,#154360 50%,#0d2137 100%);}
  .login-box{background:#fff;border-radius:16px;padding:40px 36px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.3);text-align:center;}
  .login-title{font-size:22px;font-weight:700;color:var(--primary);margin-bottom:4px;}
  .login-sub{font-size:12px;color:var(--text-muted);margin-bottom:28px;}
  .form-group{margin-bottom:16px;text-align:left;}
  .form-group label{font-size:12px;font-weight:600;color:var(--text-muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
  .form-group input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;color:var(--text);}
  .btn-primary{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;}
  .btn-primary:hover{background:var(--primary-light);}
  .login-error{color:var(--danger);font-size:12px;margin-top:8px;display:none;}
  #appShell{display:none;min-height:100vh;}
  .header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2);}
  .header-left{display:flex;align-items:center;gap:12px;}
  .header-title{font-size:18px;font-weight:700;}
  .header-title span{color:var(--accent-light);}
  .header-right{display:flex;align-items:center;gap:12px;}
  .user-badge{background:rgba(255,255,255,.15);border-radius:20px;padding:5px 12px;font-size:13px;}
  .btn-logout{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;}
  .sidebar{position:fixed;top:var(--header-h);left:0;width:var(--sidebar-w);bottom:0;background:#1a2537;overflow-y:auto;z-index:50;padding:16px 0;}
  .nav-section{padding:6px 16px 4px;font-size:10px;font-weight:700;color:#5d7499;text-transform:uppercase;letter-spacing:1px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:#9cb2cc;cursor:pointer;font-size:13px;transition:all .2s;border-left:3px solid transparent;}
  .nav-item:hover{background:rgba(255,255,255,.05);color:#fff;}
  .nav-item.active{background:rgba(41,128,185,.2);color:#fff;border-left-color:var(--accent);}
  .nav-icon{font-size:16px;width:20px;text-align:center;}
  .nav-badge{background:var(--accent);color:#fff;border-radius:10px;padding:2px 7px;font-size:10px;margin-left:auto;}
  .main{margin-left:var(--sidebar-w);margin-top:var(--header-h);padding:24px;min-height:calc(100vh - var(--header-h));}
  .card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 6px rgba(0,0,0,.07);margin-bottom:20px;}
  .card-title{font-size:15px;font-weight:700;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
  .stat-card{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-left:4px solid var(--primary);}
  .stat-label{font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;}
  .stat-value{font-size:22px;font-weight:700;color:var(--text);margin-top:4px;}
  .stat-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
  .form-row{display:grid;gap:14px;margin-bottom:14px;}
  .form-row.col2{grid-template-columns:1fr 1fr;}
  .form-row.col3{grid-template-columns:1fr 1fr 1fr;}
  .form-row.col4{grid-template-columns:1fr 1fr 1fr 1fr;}
  label.field-label{font-size:11px;font-weight:600;color:var(--text-muted);display:block;margin-bottom:5px;text-transform:uppercase;}
  input[type=text],input[type=number],input[type=date],input[type=email],select,textarea{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;color:var(--text);background:#fff;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary-light);}
  textarea{resize:vertical;min-height:70px;}
  .btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:16px;}
  .btn{padding:9px 20px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;}
  .btn-save{background:var(--primary);color:#fff;}
  .btn-save:hover{background:var(--primary-light);}
  .btn-cancel{background:#ecf0f1;color:var(--text);}
  .btn-approve{background:var(--success);color:#fff;padding:5px 12px;font-size:12px;border-radius:5px;border:none;cursor:pointer;}
  .btn-reject{background:var(--danger);color:#fff;padding:5px 12px;font-size:12px;border-radius:5px;border:none;cursor:pointer;}
  .btn-pay{background:var(--accent);color:#fff;padding:5px 12px;font-size:12px;border-radius:5px;border:none;cursor:pointer;}
  .btn-sm{padding:4px 10px;font-size:11px;}
  .btn-outline{background:transparent;border:1.5px solid var(--primary);color:var(--primary);}
  .btn-new{background:var(--accent);color:#fff;border:none;padding:9px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;}

  thead th{background:#f0f4f8;padding:10px 12px;text-align:left;font-weight:700;color:var(--text-muted);font-size:11px;text-transform:uppercase;border-bottom:2px solid var(--border);}

  .badge-approved{background:#eafaf1;color:#1e8449;}
  .badge-rejected{background:#fdedec;color:#922b21;}
  .badge-paid{background:#eaf0fb;color:#1a5276;}
  .badge-voided{background:#f0f0f0;color:#888;}
  .badge-cash{background:#fef5e7;color:#ca6f1e;}
  .badge-bank{background:#e8f4fd;color:#1b6ca8;}
  .badge-debit{background:#fdedec;color:#922b21;}
  .badge-credit{background:#eafaf1;color:#1e8449;}
  .badge-transfer{background:#f0e8ff;color:#6c3483;}
  .badge-open{background:#fef9e7;color:#d68910;}
  .badge-settled{background:#eafaf1;color:#1e8449;}
  .badge-cancelled{background:#f0f0f0;color:#888;}
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;}
  .modal-bg.open{display:flex;}
  .modal{background:#fff;border-radius:14px;padding:28px;width:640px;max-width:95vw;max-height:90vh;overflow-y:auto;}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  .modal-title{font-size:17px;font-weight:700;color:var(--primary);}
  .modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-muted);}
  #toast{position:fixed;bottom:24px;right:24px;background:#1a2537;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;z-index:500;display:none;box-shadow:0 4px 12px rgba(0,0,0,.2);}
  .filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px;background:#fff;padding:14px 16px;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
  .filter-bar .form-group{margin:0;min-width:140px;}
  .pipeline{display:flex;gap:0;margin-bottom:20px;}
  .pipe-step{flex:1;padding:10px 14px;background:#ecf0f1;text-align:center;font-size:11px;font-weight:700;color:var(--text-muted);position:relative;}
  .pipe-step:not(:last-child)::after{content:'';position:absolute;right:-10px;top:0;bottom:0;width:20px;background:inherit;clip-path:polygon(0 0,calc(100% - 5px) 50%,0 100%);z-index:1;}
  .pipe-step.active{background:var(--primary);color:#fff;}
  .pipe-step.done{background:var(--success);color:#fff;}
  .pipe-step:first-child{border-radius:6px 0 0 6px;}
  .pipe-step:last-child{border-radius:0 6px 6px 0;}
  /* Holding card */
  .holding-card{border-radius:10px;padding:14px;margin-bottom:10px;border:1.5px solid var(--border);}
  .holding-card.positive{border-color:#27ae60;background:#f0fff4;}
  .holding-card.zero{border-color:#bdc3c7;background:#f8f9fa;}
  .holding-card.negative{border-color:#c0392b;background:#fff5f5;}
  @media(max-width:768px){
    .sidebar{display:none!important;}
    .main{margin-left:0!important;padding:12px!important;}
    .stats-row{grid-template-columns:repeat(2,1fr)!important;}
    .form-row.col2,.form-row.col3,.form-row.col4{grid-template-columns:1fr!important;}
    .modal{width:100vw!important;max-width:100vw!important;border-radius:16px 16px 0 0!important;position:fixed;bottom:0;left:0;right:0;margin:0;}
    .modal-bg.open{align-items:flex-end!important;}
  }
</style>
</head>

<script>
// ══════════════════════════════════════════════════════════
//  CONFIGURATION — edit these in the HTML file
// ══════════════════════════════════════════════════════════
const APP_CONFIG = {
  scriptUrl: 'https://script.google.com/macros/s/AKfycbxJaR_JeS-PakbDHOMySAy5LOk7wcV4teGocCM0JcRLzyUo2ORMOQQJHqDnAUsvzXJ0/exec',
  sheetId:   '1JL8flLniqzH-9E36dnOZorCzHerjMO6BKxeQ0efkznk',
  appSecret: '6279@GSEKLX278905721',
};

// Apply config
(function(){
  if(APP_CONFIG.scriptUrl) localStorage.setItem('ghj_api_url', APP_CONFIG.scriptUrl);
  if(APP_CONFIG.sheetId)   localStorage.setItem('ghj_sheet_id', APP_CONFIG.sheetId);
  if(APP_CONFIG.appSecret) localStorage.setItem('ghj_app_secret', APP_CONFIG.appSecret);
})();

// ══════════════════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════════════════

// CASH INFLOW HEADS — these bring cash INTO the system (from outside world)
// ── Income Heads (Col A of Head sheet) ───────────────────────────
const INCOME_HEADS = [
  'Bank Withdrawal','Capital Contribution','Cash Donation','Cash Fees',
  'Cash Miscellaneous Receipts','Cash Receipts','Cash Sale',
  'Cash Stay Charges (Accommodation)','Corpus Fund','Patty Cash Transfer'
];
const CASH_INFLOW_HEADS = INCOME_HEADS; // alias

// ── Expense Heads (Col B of Head sheet) ──────────────────────────
const EXPENSE_HEADS = [
  'Admin','Bank Deposit','Government Fees/Taxes','Groceries/Food Items',
  'Inventories','Marketing & Events','Miscellaneous Expense',
  'Operational Expenses','Petty Cash Transfer','Program/Event/Welfare',
  'Purchase','Repair & Maintenance','Salaries & Wages',
  'Travel & Transportation'
];

const ALL_HEADS = [...INCOME_HEADS, ...EXPENSE_HEADS];

// ── Income Categories (Col C of Head sheet) ──────────────────────
const INCOME_CATEGORIES = [
  'Cash Receipts','Bank Withdrawal','Cash Debit','Cash Deposit To Bank',
  'Cash Stay Charges (Accommodation)','Cash Withdrawal',
  'Donation','Fees','Patty Cash Transfer'
];

// ── Expense Categories (Col D of Head sheet) ─────────────────────
const EXPENSE_CATEGORIES = [
  'Accounting & Audit Fees','Accumulation of Funds','Banking Charges',
  'Buidling Rent','Construction Costs','Corpus Fund',
  'Courier & Shipping Services','Electricity/Water/Gas Payments',
  'Govt Fees/Taxes','Groceries/Food','House Hold/Keeping Items',
  'AMC/Insurance Premium','Interest on Borrowed Capital',
  'IT & ITES Services','Langar/Bhandara','Legal & Professional Services',
  'Maintenance & Repair','Marketing & Events','Miscellaneous',
  'Operating Expenses','Printing/Stationery','Program Supplies',
  'Purchase of Land/Building','Purchase of Machinery/Equipment',
  'Repayment of Loans','Salaries & Wages','Social Work Activities',
  'Staff/Volunteers Accommodation','Staff/Volunteers Welfare',
  'Travel & Transportation'
];

// Combined for backward compat
const CATEGORIES = [...INCOME_CATEGORIES, ...EXPENSE_CATEGORIES];


const DEFAULT_USERS = [
  {email:'admin@ghj.org',    pwd:'admin123',  name:'Admin',    role:'admin'},
  {email:'approver@ghj.org', pwd:'approve123',name:'Approver', role:'approver'},
  {email:'creator@ghj.org',  pwd:'create123', name:'Creator',  role:'creator'},
  {email:'creator2@ghj.org', pwd:'create456', name:'Creator2', role:'creator'},
];

let USERS = JSON.parse(localStorage.getItem('ghj_users')||'null') || DEFAULT_USERS;
let currentUser = null;
let currentPage = 'dashboard';
let editingId   = null;
let reportPeriod= 'this_month';
let reportMode  = 'cash';

// ══════════════════════════════════════════════════════════
//  DATA LAYER
// ══════════════════════════════════════════════════════════
function loadData(k){ try{return JSON.parse(localStorage.getItem(k))||[];}catch{return[];} }
function saveData(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch{} }
function getData(){ return { cash: loadData('ghj_cash'), bank: loadData('ghj_bank') }; }
function getCashAllocations(){ return loadData('ghj_alloc'); }
function saveCashAllocations(d){ saveData('ghj_alloc',d); }
function genId(){ return 'GHJ-'+Date.now()+'-'+Math.floor(Math.random()*9999); }

// ── CASH HOLDINGS COMPUTATION ─────────────────────────────
// Admin holds all cash by default.
// Allocations transfer custodianship from Admin → any user.
// Each user's holding = Cash allocated to them (credit) - Cash bills they paid (debit)
// Admin's holding   = Total cash received (all inflows) - Allocated to others - Admin's own bills

// ══════════════════════════════════════════════════════════
//  CASH LEDGER — Per-Person Running Balance
//  Every cash entry has a txnType:
//    RECEIPT  : Cash received from external source → increases holder's balance
//    TRANSFER : Cash moved between people          → decreases sender, increases receiver
//    EXPENSE  : Cash paid to vendor/expense        → decreases holder's balance
//
//  Rules (per spec):
//  5.1 RECEIPT  → From = External source (donation, sale, bank withdrawal, etc.)
//  5.2 TRANSFER → Between people (Admin → Creator, etc.)
//  5.3 EXPENSE  → To = Vendor/Payee
//  5.4 EXPENSE or TRANSFER cannot exceed cash in hand of the sender
// ══════════════════════════════════════════════════════════

function computeCashHoldings() {
  const d    = getData();
  const cash = d.cash.filter(e => e.status !== 'voided');

  // Build per-person running balance from cash entries only
  // Each entry has: holder (who has the cash), txnType, amount, transferTo (for TRANSFER)
  const balances = {}; // { personName -> { receipts, transferIn, transferOut, expenses, balance } }

  const initPerson = name => {
    if (!balances[name]) balances[name] = { receipts:0, transferIn:0, transferOut:0, expenses:0, balance:0 };
  };

  // Seed all known users
  USERS.forEach(u => initPerson(u.name));

  cash.forEach(e => {
    const holder = e.paidByUser || e.createdBy || 'Admin';
    const amt    = Number(e.amount) || 0;
    // EntryType values from Excel: Income(Inflow) | Transfer | Expense(Outflow)
    const txn = e.txnType || (e.type === 'credit' ? 'Income(Inflow)' : 'Expense(Outflow)');

    initPerson(holder);

    if (txn === 'Income(Inflow)' || txn === 'RECEIPT') {
      balances[holder].receipts += amt;
      balances[holder].balance  += amt;
    } else if (txn === 'Expense(Outflow)' || txn === 'EXPENSE') {
      balances[holder].expenses += amt;
      balances[holder].balance  -= amt;
    } else if (txn === 'Transfer' || txn === 'TRANSFER') {
      // vendor field = ReceivedBy/VendorName = the person receiving the transfer
      const receiver = e.transferTo || e.vendor || '';
      initPerson(receiver);
      balances[holder].transferOut += amt;
      balances[holder].balance     -= amt;
      if (receiver) {
        balances[receiver].transferIn += amt;
        balances[receiver].balance    += amt;
      }
    }
  });

  // Also apply allocations (CashMgmt register) as TRANSFER from Admin
  const allc = getCashAllocations();
  allc.filter(a => a.status !== 'cancelled').forEach(a => {
    const from = a.fromUser || 'Admin';
    const to   = a.toUser   || '';
    const amt  = Number(a.amount) || 0;
    initPerson(from);
    initPerson(to);
    // Check if there's already a TRANSFER cash entry for this allocation (avoid double-count)
    const linked = cash.find(e => e.allocationId === a.id || e.paymentRef === a.id);
    if (!linked) {
      // Allocation not yet reflected in cash entries — apply it
      balances[from].transferOut += amt;
      balances[from].balance     -= amt;
      if (to) {
        balances[to].transferIn  += amt;
        balances[to].balance     += amt;
      }
    }
  });

  // Build holdings map (same shape as before for backward compat)
  const holdings = {};
  Object.entries(balances).forEach(([name, b]) => {
    const u = USERS.find(u => u.name === name);
    holdings[name] = {
      allocated: b.receipts + b.transferIn,
      spent:     b.expenses + b.transferOut,
      balance:   b.balance,
      receipts:  b.receipts,
      transferIn: b.transferIn,
      transferOut: b.transferOut,
      expenses:  b.expenses,
      role:      u ? u.role : 'unknown',
      isAdmin:   u ? u.role === 'admin' : false
    };
  });

  const totalCashIn = balances['Admin'] ? balances['Admin'].receipts : 0;
  const totalAllocatedToOthers = Object.entries(balances)
    .filter(([n]) => n !== 'Admin')
    .reduce((s, [, b]) => s + b.transferIn, 0);
  const adminBills = balances['Admin'] ? balances['Admin'].expenses : 0;
  const allocByUser = {};
  Object.entries(balances).forEach(([n, b]) => { allocByUser[n] = b.transferIn; });
  const billsByUser = {};
  Object.entries(balances).forEach(([n, b]) => { billsByUser[n] = b.expenses; });

  return { holdings, totalCashIn, allocByUser, billsByUser, totalAllocatedToOthers, adminBills };
}

// ══════════════════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════════════════
async function doLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const pwd   = document.getElementById('loginPwd').value;
  const errEl = document.getElementById('loginErr');
  const btn   = document.querySelector('.btn-primary');
  errEl.style.display='none';
  const url = localStorage.getItem('ghj_api_url');
  if(url){
    btn.textContent='Verifying...'; btn.disabled=true;
    try{
      const secret3=APP_CONFIG.appSecret||'';
      const resp=await fetch(url+'?type=users'+(secret3?'&secret='+encodeURIComponent(secret3):''),{redirect:'follow'});
      const raw=await resp.text();
      if(raw&&!raw.trimStart().startsWith('<')){
        const rows=JSON.parse(raw);
        if(Array.isArray(rows)&&rows.length>1){
          const hdr=rows[0].map(h=>String(h).toLowerCase().trim());
          const ni=hdr.indexOf('name'),ei=hdr.indexOf('email'),pi=['password','pwd','pass'].reduce((f,k)=>f>=0?f:hdr.indexOf(k),-1),ri=hdr.indexOf('role');
          if(ei>=0&&pi>=0){
            const sheetUsers=rows.slice(1).filter(r=>r[ei]).map(r=>({name:ni>=0?String(r[ni]).trim():String(r[ei]).trim(),email:String(r[ei]).trim(),pwd:String(r[pi]).trim(),role:ri>=0?String(r[ri]).trim().toLowerCase():'creator'}));
            if(sheetUsers.length){USERS=sheetUsers;localStorage.setItem('ghj_users',JSON.stringify(USERS));}
          }
        }
      }
    }catch(e){/* fallback to cached */}
    btn.textContent='Sign In'; btn.disabled=false;
  }
  const user=USERS.find(u=>u.email.toLowerCase()===email.toLowerCase()&&u.pwd===pwd);
  if(user){
    currentUser=user;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('appShell').style.display='block';
    document.getElementById('userBadge').textContent='👤 '+user.name+' ('+user.role+')';
    buildSidebar();
    showPage('dashboard');
    updateBadges();
    updateSyncTimeDisplay();
    if(url) loadFromSheet();
    return;
  }
  errEl.textContent='Invalid email or password. Demo: admin@ghj.org / admin123';
  errEl.style.display='block';
}

function clearAllCacheAndReload(){
  if(!confirm('Clear all locally cached data and reload?\nThis will remove cash, bank, alloc, and user data from browser.\nSheet data will reload fresh on next login.')) return;
  const keysToKeep=['ghj_api_url','ghj_sheet_id','ghj_app_secret'];
  Object.keys(localStorage).forEach(k=>{
    if(!keysToKeep.includes(k)) localStorage.removeItem(k);
  });
  showToast('✅ Cache cleared! Reloading...');
  setTimeout(()=>location.reload(),1500);
}

function getScriptUrl(){ return APP_CONFIG.scriptUrl||localStorage.getItem('ghj_api_url')||''; }

async function pushToSheet(action,data){
  const url=getScriptUrl();
  const secret=APP_CONFIG.appSecret||localStorage.getItem('ghj_app_secret')||'';
  const payload={
    action, _secret:secret,
    // Maps exactly to Google Sheet column names
    // ── CashEntries columns ────────────────────────────────────
    id:            data.id||'',           // A: ID (Auto)
    createdAt:     data.createdAt||new Date().toISOString(), // B: TimeStamp (Auto)
    createdBy:     data.createdBy||'',    // C: CreatedBy (login user)
    txnType:       data.txnType||'',      // D: EntryType: Income(Inflow)/Transfer/Expense(Outflow)
    srno:          data.srno||'',         // E: SrNo
    date:          data.date||'',         // F: Date
    head:          data.head||'',         // G: Head
    category:      data.category||'',     // H: Category
    vendor:        data.vendor||'',       // I: ReceivedBy/VendorName
    amount:        Number(data.amount)||0,// J: Amount
    desc:          data.desc||'',         // K: Description
    invoiceLink:   data.invoiceLink||'',  // L: InvoiceLink
    screenshotLink:data.screenshotLink||'',// M: ScreenShot
    status:        data.status||'pending',// N: Status
    approvedBy:    data.approvedBy||'',   // O: ApprovedBy
    paymentRef:    data.paymentRef||'',   // P: PaymentRef
    remarks:       data.remarks||'',      // Q: Remarks
    // R: Type = 'cash' (auto-set on server)
    paytype:       data.paytype||'cash',
    type:          data.type||'debit',    // debit/credit (for bank entries)
    // ── BankEntries extra columns ──────────────────────────────
    bankName:      data.bankName||'',     // Q: BankName
    accNo:         data.accNo||'',        // R: AccountNo
    chequeRef:     data.chequeRef||'',    // S: ChequeRef
    // ── Transfer destination ───────────────────────────────────
    transferTo:    data.transferTo||'',
    paidByUser:    data.paidByUser||''
  };
  if(!url){addToQueue(payload);return;}
  try{
    const resp=await fetch(url,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
    const raw=await resp.text();
    if(!raw||raw.trimStart().startsWith('<')) throw new Error('HTML response — fix deployment');
    const r=JSON.parse(raw);
    if(r.status==='ok'){removeFromQueue(payload.id);updateSyncBadge();showToast('✅ Saved to Google Sheets!');}
    else throw new Error(r.error||'Script error');
  }catch(e){addToQueue(payload);showToast('⚠️ Saved locally: '+e.message);}
}

async function loadFromSheet(){
  const url=getScriptUrl(); if(!url) return;
  const secret=APP_CONFIG.appSecret||'';
  const startTime=Date.now();
  try{
    // Load Cash + Bank ledger entries
    for(const type of['cash','bank']){
      const resp=await fetch(url+'?type='+type+(secret?'&secret='+encodeURIComponent(secret):''),{redirect:'follow'});
      const raw=await resp.text();
      if(!raw||raw.trimStart().startsWith('<')) continue;
      const rows=JSON.parse(raw);
      if(!Array.isArray(rows)||rows.length<2) continue;

      // Normalise header: lowercase, strip spaces/special chars for key matching
      const hdr=rows[0].map(h=>String(h||'').toLowerCase().replace(/[^a-z0-9]/g,''));
      const col=k=>hdr.indexOf(k);
      const s=(r,k,fb)=>String((col(k)>=0?r[col(k)]:r[fb])||'');

      let entries;
      if(type==='cash'){
        // CashEntries columns from Excel:
        // A:idauto B:timestampauto C:createdby D:entrytype E:srno F:date
        // G:head H:category I:receivedbyvndorname J:amount K:description
        // L:invoicelink M:screenshot N:status O:approvedby P:paymentref Q:remarks R:type
        entries=rows.slice(1).filter(r=>r[0]&&String(r[0]).startsWith('GHJ')).map(r=>{
          const entryType=s(r,'entrytype',3);
          const isInflow = entryType==='Income(Inflow)';
          const isTransfer = entryType==='Transfer';
          return {
            id:          s(r,'idauto',0),
            createdAt:   s(r,'timestampauto',1),
            createdBy:   s(r,'createdby',2),
            txnType:     entryType,                           // Income(Inflow)/Transfer/Expense(Outflow)
            srno:        s(r,'srno',4),
            date:        s(r,'date',5),
            head:        s(r,'head',6),
            category:    s(r,'category',7),
            vendor:      s(r,'receivedbyvndorname',8),        // ReceivedBy / VendorName
            amount:      parseFloat(r[col('amount')>=0?col('amount'):9]||0),
            desc:        s(r,'description',10),
            invoiceLink: s(r,'invoicelink',11),
            screenshotLink:s(r,'screenshot',12),
            status:      s(r,'status',13)||'pending',
            approvedBy:  s(r,'approvedby',14),
            paymentRef:  s(r,'paymentref',15),
            remarks:     s(r,'remarks',16),
            type:        isInflow ? 'credit' : 'debit',       // derive from EntryType
            paytype:     'cash',
            paidByUser:  s(r,'createdby',2),                  // CreatedBy = who holds cash
            transferTo:  isTransfer ? s(r,'receivedbyvndorname',8) : ''
          };
        });
      } else {
        // BankEntries columns from Excel:
        // A:id B:srno C:date D:head E:category F:type G:amount H:description
        // I:vendor J:invoicelink K:screenshot L:status M:createdby N:approvedby
        // O:paymentref P:remarks Q:bankname R:accountno S:chequeref T:paytype
        entries=rows.slice(1).filter(r=>r[0]&&String(r[0]).startsWith('GHJ')).map(r=>({
          id:           s(r,'id',0),
          srno:         s(r,'srno',1),
          date:         s(r,'date',2),
          head:         s(r,'head',3),
          category:     s(r,'category',4),
          type:         s(r,'type',5)||'debit',
          amount:       parseFloat(r[col('amount')>=0?col('amount'):6]||0),
          desc:         s(r,'description',7),
          vendor:       s(r,'vendor',8),
          invoiceLink:  s(r,'invoicelink',9),
          screenshotLink:s(r,'screenshot',10),
          status:       s(r,'status',11)||'pending',
          createdBy:    s(r,'createdby',12),
          approvedBy:   s(r,'approvedby',13),
          paymentRef:   s(r,'paymentref',14),
          remarks:      s(r,'remarks',15),
          bankName:     s(r,'bankname',16),
          accNo:        s(r,'accountno',17),
          chequeRef:    s(r,'chequeref',18),
          paytype:      'bank'
        }));
      }
      const queuedIds=new Set(getPendingQueue().map(q=>q.id));
      const merged=entries.filter(e=>!queuedIds.has(e.id));
      merged.push(...getPendingQueue().filter(q=>q.paytype===type));
      saveData('ghj_'+type,merged);
    }

    // Load Cash Allocations from Sheet (CashMgmt tab)
    try{
      const aResp=await fetch(url+'?type=cashalloc'+(secret?'&secret='+encodeURIComponent(secret):''),{redirect:'follow'});
      const aRaw=await aResp.text();
      if(aRaw&&!aRaw.trimStart().startsWith('<')){
        const aRows=JSON.parse(aRaw);
        if(Array.isArray(aRows)&&aRows.length>1){
          const ah=aRows[0].map(h=>String(h).toLowerCase().trim());
          const ai=k=>ah.indexOf(k);
          const allocs=aRows.slice(1).filter(r=>r[ai('id')]||r[0]).map(r=>({
            id:String(r[ai('id')]||r[0]||''),
            date:String(r[ai('date')]||r[1]||''),
            toUser:String(r[ai('touser')]||r[2]||''),
            fromUser:String(r[ai('fromuser')]||r[3]||''),
            amount:parseFloat(r[ai('amount')]||r[4]||0),
            purpose:String(r[ai('purpose')]||r[5]||''),
            status:String(r[ai('status')]||r[6]||'active'),
            remarks:String(r[ai('remarks')]||r[7]||''),
            createdAt:String(r[ai('createdat')]||r[8]||'')
          }));
          if(allocs.length>0){
            saveCashAllocations(allocs);
            console.log('Loaded '+allocs.length+' allocations from Sheet');
          }
        }
      }
    }catch(ae){console.warn('Alloc load failed:',ae.message);}

    // Record last sync timestamp
    const syncTime=new Date().toISOString();
    localStorage.setItem('ghj_last_sheet_sync',syncTime);
    updateSyncTimeDisplay();

    const elapsed=((Date.now()-startTime)/1000).toFixed(1);
    showToast('✅ Synced from Sheet in '+elapsed+'s');
    showPage(currentPage);
  }catch(e){showToast('⚠️ Refresh failed: '+e.message);}
}

function updateSyncTimeDisplay(){
  const ts=localStorage.getItem('ghj_last_sheet_sync');
  const el=document.getElementById('lastSyncDisplay');
  if(!el) return;
  if(!ts){ el.textContent=''; return; }
  const d=new Date(ts);
  const pad=n=>String(n).padStart(2,'0');
  el.textContent='Last sync: '+d.toLocaleDateString('en-IN')+' '+pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
}

// Sync queue
function getPendingQueue(){try{return JSON.parse(localStorage.getItem('ghj_sync_queue')||'[]');}catch{return[];}}
function savePendingQueue(q){try{localStorage.setItem('ghj_sync_queue',JSON.stringify(q));}catch{}}
function addToQueue(e){const q=getPendingQueue().filter(x=>x.id!==e.id);q.push({...e,_at:new Date().toISOString()});savePendingQueue(q);updateSyncBadge();}
function removeFromQueue(id){savePendingQueue(getPendingQueue().filter(e=>e.id!==id));updateSyncBadge();}
function updateSyncBadge(){
  const q=getPendingQueue(),b=document.getElementById('syncBadge');if(!b)return;
  if(q.length>0){b.textContent=q.length+' unsynced';b.style.display='inline-block';b.style.background='#e67e22';}
  else{b.style.display='none';}
}
async // Add entry to sync queue with full data
function addToSyncQueue(entry) {
  const q = getPendingQueue();
  // Remove duplicate if exists
  const idx = q.findIndex(x => x.id === entry.id);
  if (idx >= 0) q.splice(idx, 1);
  q.push(entry);
  localStorage.setItem('ghj_sync_queue', JSON.stringify(q));
  updateSyncBadge();
}

async function retrySyncQueue(){
  const url=getScriptUrl();if(!url||!getPendingQueue().length)return;
  const secret=APP_CONFIG.appSecret||localStorage.getItem('ghj_app_secret')||'';
  showToast('🔄 Retrying sync...');let n=0;
  for(const e of[...getPendingQueue()]){
    try{
      const payload={...e,_secret:secret};
      const r=await fetch(url,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
      const raw=await r.text();
      if(raw&&!raw.trimStart().startsWith('<')){const res=JSON.parse(raw);if(res.status==='ok'){removeFromQueue(e.id);n++;}}
    }catch{}
  }
  if(n>0){showToast('✅ '+n+' item(s) synced!');showPage(currentPage);}
}

async function saveAllocationToSheet(rec){
  const url=getScriptUrl(); if(!url) return;
  const secret=APP_CONFIG.appSecret||'';
  try{
    const payload={action:'saveAllocation',_secret:secret,...rec};
    const resp=await fetch(url,{method:'POST',redirect:'follow',
      headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
    const raw=await resp.text();
    if(raw&&!raw.trimStart().startsWith('<')){
      const r=JSON.parse(raw);
      if(r.status==='ok'){showToast('✅ Allocation synced to Sheet!'); updateSyncTimeDisplay();}
      else throw new Error(r.error||'Sync failed');
    }
  }catch(e){showToast('⚠️ Saved locally — sheet sync failed: '+e.message);}
}

function issueAllocation(){
  const toUser=document.getElementById('al_to').value;
  const amount=parseFloat(document.getElementById('al_amount').value);
  const date=document.getElementById('al_date').value;
  const purpose=document.getElementById('al_purpose').value.trim();
  const remarks=document.getElementById('al_remarks').value.trim();
  if(!toUser||!amount||!date||!purpose){alert('Please fill all required fields.');return;}

  const h=computeCashHoldings();
  const adminBal=h.holdings['Admin']?.balance||0;
  if(amount>adminBal){
    if(!confirm('⚠️ Admin only holds ₹'+adminBal.toLocaleString('en-IN')+' cash.\nAllocating ₹'+amount.toLocaleString('en-IN')+' will create a deficit.\nProceed anyway?')) return;
  }

  const allc=getCashAllocations();
  const rec={id:genId(),date,toUser,fromUser:currentUser.name,amount,purpose,status:'active',remarks,createdAt:new Date().toISOString()};
  allc.push(rec);
  saveCashAllocations(allc);
  // Clear the stale alloc cache flag so next load gets fresh data
  localStorage.removeItem('ghj_alloc_stale');
  showToast('✅ ₹'+amount.toLocaleString('en-IN')+' allocated to '+toUser);
  saveAllocationToSheet(rec);
  showPage('cashalloc');
}

function settleAllocation(id){
  const allc=getCashAllocations();
  const idx=allc.findIndex(a=>a.id===id);
  if(idx<0) return;
  const remarks=prompt('Settle allocation to '+allc[idx].toUser+'\nAmount: ₹'+allc[idx].amount+'\nPurpose: '+allc[idx].purpose+'\n\nSettlement remarks:')||'';
  allc[idx].status='settled';
  allc[idx].settledAt=new Date().toISOString();
  allc[idx].remarks=(allc[idx].remarks?allc[idx].remarks+' | ':'')+'Settled: '+remarks;
  saveCashAllocations(allc);
  saveAllocationToSheet(allc[idx]);
  showToast('✅ Allocation settled & synced.');
  showPage('cashalloc');
}

function cancelAllocation(id){
  if(!confirm('Cancel this allocation? (Use only if cash was NOT actually given.)')) return;
  const allc=getCashAllocations();
  const idx=allc.findIndex(a=>a.id===id);
  if(idx<0) return;
  allc[idx].status='cancelled';
  saveCashAllocations(allc);
  saveAllocationToSheet(allc[idx]);
  showToast('Allocation cancelled.');
  showPage('cashalloc');
}

  const myName=currentUser.name;
  // Creator sees only their own entries
  let entries=isCreator
    ?d[type].filter(e=>e.createdBy===myName||e.paidByUser===myName)
    :d[type];

  const label=type==='cash'?'💵 Cash Ledger':'🏦 Bank Ledger';
  const canCreate=currentUser.role==='admin'||currentUser.role==='approver'||currentUser.role==='creator';

  const rows=entries.slice().sort((a,b)=>b.date>a.date?1:-1).map(e=>`
  <tr style="${e.status==='voided'?'opacity:.45;text-decoration:line-through':''}">
    <td style="font-size:10px;color:var(--text-muted)">${e.srno}</td>
    <td>${e.date}</td>
    <td style="font-size:11px">${e.head}</td>
    <td style="font-size:10px">${e.category}</td>
    <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.desc}</td>
    <td style="color:var(--primary-light);font-size:11px">${e.vendor||'—'}</td>
    <td style="font-size:11px;color:#6c3483;font-weight:500">${e.paidByUser||e.createdBy||'—'}</td>

    <td><span class="badge badge-${e.type}">${e.type==='debit'?'DR':'CR'}</span></td>
    <td style="font-weight:700;color:${e.type==='debit'?'#c0392b':'#27ae60'}">₹${Number(e.amount).toLocaleString('en-IN')}</td>
    <td>${e.invoiceLink?`<a href="${e.invoiceLink}" target="_blank" class="badge badge-approved" style="text-decoration:none">📎</a>`:''}${e.screenshotLink?` <a href="${e.screenshotLink}" target="_blank" class="badge badge-paid" style="text-decoration:none">📷</a>`:''}</td>
    <td>
      <span class="badge badge-${e.status}">${e.status==='voided'?'VOID ✕':e.status.toUpperCase()}</span>

    </td>
    <td>
      ${(currentUser.role==='admin'||(currentUser.role==='creator'&&(e.createdBy===myName)))&&e.status==='pending'?`<button class="btn btn-outline btn-sm" onclick="editEntry('${type}','${e.id}')">Edit</button> `:''}
      ${e.status==='approved'&&(currentUser.role==='admin'||currentUser.role==='approver')?`<button class="btn-pay btn-sm" onclick="openPayModal('${type}','${e.id}')">Pay</button> `:''}
      ${currentUser.role==='admin'&&e.status!=='paid'&&e.status!=='voided'?`<button class="btn btn-sm" style="background:#fee;color:#c0392b;border:1px solid #f5c6cb" onclick="voidEntry('${type}','${e.id}')">✕ Void</button>`:''}

    <div style="display:flex;gap:8px">
      <button class="btn btn-outline btn-sm" onclick="downloadEntries('${type}')">⬇ CSV</button>
      ${canCreate?`<button class="btn-new" onclick="openNewEntry('${type}')">+ New Entry</button>`:''}
    </div>
  </div>
  <div class="filter-bar">
    <div class="form-group"><label class="field-label">From</label><input type="date" id="filterFrom" onchange="filterTable('${type}')"></div>

    <div class="form-group"><label class="field-label">Head</label><select onchange="filterTable('${type}')" id="filterHead"><option value="">All Heads</option>${ALL_HEADS.map(h=>`<option>${h}</option>`).join('')}</select></div>
    <div class="form-group"><label class="field-label">Type</label><select onchange="filterTable('${type}')" id="filterType"><option value="">All</option><option value="debit">Debit (DR)</option><option value="credit">Credit (CR)</option></select></div>
    <div class="form-group"><label class="field-label">Status</label><select onchange="filterTable('${type}')" id="filterStatus"><option value="">All</option><option>pending</option><option>approved</option><option>paid</option><option>rejected</option><option>voided</option></select></div>
    <div class="form-group" style="min-width:160px"><label class="field-label">Search</label><input type="text" id="filterSearch" placeholder="Desc / Vendor..." oninput="filterTable('${type}')"></div>
  </div>
  <div class="card">
    <div class="tbl-wrap">
    <table><thead><tr>
      <th>Sr.No</th><th>Date</th><th>Head</th><th>Category</th><th>Description</th><th>Vendor</th><th>Paid By</th>
      ${type==='bank'?'<th>Bank</th><th>Ref</th>':''}
      <th>Dr/Cr</th><th>Amount</th><th>Files</th><th>Status</th><th>Actions</th>
    </tr></thead>
    <tbody id="tableBody">${rows||'<tr><td colspan="13" style="text-align:center;padding:30px;color:var(--text-muted)">No entries. Click "+ New Entry" to add.</td></tr>'}</tbody>
    </table></div>
  </div>`;
}

function filterTable(type){
  const from=(document.getElementById('filterFrom')||{}).value||'';
  const to=(document.getElementById('filterTo')||{}).value||'';
  const head=(document.getElementById('filterHead')||{}).value||'';
  const etype=(document.getElementById('filterType')||{}).value||'';
  const status=(document.getElementById('filterStatus')||{}).value||'';
  const search=((document.getElementById('filterSearch')||{}).value||'').toLowerCase();
  const d=getData();
  const isCreator=currentUser.role==='creator';
  const myName=currentUser.name;
  let entries=isCreator?d[type].filter(e=>e.createdBy===myName||e.paidByUser===myName):d[type];
  entries=entries.filter(e=>{
    if(from&&e.date<from) return false;
    if(to&&e.date>to) return false;
    if(head&&e.head!==head) return false;
    if(etype&&e.type!==etype) return false;
    if(status&&e.status!==status) return false;
    if(search){const hay=[e.desc,e.vendor,e.srno,e.head,e.paidByUser,e.createdBy,String(e.amount)].join(' ').toLowerCase();if(!hay.includes(search)) return false;}
    return true;
  });
  const body=document.getElementById('tableBody');if(!body)return;
  if(!entries.length){body.innerHTML='<tr><td colspan="13" style="text-align:center;padding:20px;color:var(--text-muted)">No matching entries.</td></tr>';return;}
  const q=getPendingQueue();
  body.innerHTML=entries.slice().sort((a,b)=>b.date>a.date?1:-1).map(e=>`
  <tr style="${e.status==='voided'?'opacity:.45':''}">
    <td style="font-size:10px;color:var(--text-muted)">${e.srno}</td><td>${e.date}</td>
    <td style="font-size:11px">${e.head}</td><td style="font-size:10px">${e.category}</td>
    <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.desc}</td>
    <td style="color:var(--primary-light);font-size:11px">${e.vendor||'—'}</td>
    <td style="font-size:11px;color:#6c3483;font-weight:500">${e.paidByUser||e.createdBy||'—'}</td>
    ${type==='bank'?`<td style="font-size:10px">${e.bankName||'—'}</td><td style="font-size:10px">${e.chequeRef||'—'}</td>`:''}
    <td><span class="badge badge-${e.type}">${e.type==='debit'?'DR':'CR'}</span></td>
    <td style="font-weight:700;color:${e.type==='debit'?'#c0392b':'#27ae60'}">₹${Number(e.amount).toLocaleString('en-IN')}</td>
    <td>${e.invoiceLink?`<a href="${e.invoiceLink}" target="_blank" class="badge badge-approved" style="text-decoration:none">📎</a>`:''}</td>
    <td><span class="badge badge-${e.status}">${e.status==='voided'?'VOID':e.status.toUpperCase()}</span>${q.find(x=>x.id===e.id)?'<span style="font-size:9px;background:#e67e22;color:#fff;border-radius:8px;padding:2px 5px;margin-left:3px">⚡</span>':''}</td>
    <td>
      ${(currentUser.role==='admin'||(currentUser.role==='creator'&&e.createdBy===currentUser.name))&&e.status==='pending'?`<button class="btn btn-outline btn-sm" onclick="editEntry('${type}','${e.id}')">Edit</button> `:''}
      ${e.status==='approved'&&(currentUser.role==='admin'||currentUser.role==='approver')?`<button class="btn-pay btn-sm" onclick="openPayModal('${type}','${e.id}')">Pay</button> `:''}
      ${currentUser.role==='admin'&&e.status!=='paid'&&e.status!=='voided'?`<button class="btn btn-sm" style="background:#fee;color:#c0392b;border:1px solid #f5c6cb" onclick="voidEntry('${type}','${e.id}')">✕</button>`:''}
    </td>
  </tr>`).join('');
}

// currentStub holds the Sheet-registered stub for the entry being created
let currentStub = null;

async function openNewEntry(type){
  editingId = null;
  currentStub = null;

  const modal     = document.getElementById('entryModal');
  const titleEl   = document.getElementById('modalTitle');
  const bodyEl    = document.getElementById('modalBody');
  const label     = type==='cash' ? '💵 New Cash Entry' : '🏦 New Bank Entry';
  titleEl.textContent = label;

  // Show loading spinner immediately so modal opens fast
  bodyEl.innerHTML = `
    <div style="text-align:center;padding:40px 20px">
      <div style="font-size:36px;margin-bottom:16px">⏳</div>
      <div style="font-size:14px;font-weight:600;color:var(--primary);margin-bottom:6px">Registering entry in Google Sheet…</div>
      <div style="font-size:12px;color:var(--text-muted)">ID, timestamp and your name are being created first.<br>The form will appear in a moment.</div>
      <div style="margin-top:20px;font-size:11px;color:#e67e22" id="stub_status"></div>
    </div>`;
  modal.classList.add('open');

  // Try to create the stub row in Sheet — get back auto ID + timestamp
  const url = getScriptUrl();
  const secret = APP_CONFIG.appSecret || localStorage.getItem('ghj_app_secret') || '';
  let stub = null;

  if (url) {
    try {
      const resp = await fetch(url, {
        method: 'POST', redirect: 'follow',
        headers: {'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify({
          action: 'createStub',
          _secret: secret,
          paytype: type,
          createdBy: currentUser.name,
          createdAt: new Date().toISOString()
        })
      });
      const raw = await resp.text();
      if (raw && !raw.trimStart().startsWith('<')) {
        const r = JSON.parse(raw);
        if (r.status === 'ok' && r.id) {
          stub = { id: r.id, srno: r.srno, createdAt: r.timestamp || new Date().toISOString() };
        }
      }
    } catch(err) {
      console.warn('Stub creation failed, using local ID:', err.message);
    }
  }

  // If Sheet unreachable — generate a local stub (will sync on save)
  if (!stub) {
    const localId  = 'GHJ-LOCAL-' + Date.now();
    const localSrno = 'GHJ/' + (type==='cash'?'C':'B') + '/' +
                      String((getData()[type]||[]).length + 1).padStart(4,'0');
    stub = { id: localId, srno: localSrno, createdAt: new Date().toISOString(), isLocal: true };
    const statusEl = document.getElementById('stub_status');
    if (statusEl) statusEl.textContent = '⚠️ Sheet unreachable — working offline. Entry will sync on save.';
    await new Promise(r => setTimeout(r, 800)); // brief pause so user sees the message
  }

  currentStub = stub;

  // Open the form pre-loaded with the stub data
  bodyEl.innerHTML = entryForm(type, {
    id:        stub.id,
    srno:      stub.srno,
    createdAt: stub.createdAt,
    createdBy: currentUser.name,
    _isNewWithStub: true   // flag so saveEntry knows to use stub data
  });

  // Show the stub info at the top of the form
  const stubInfo = document.getElementById('stub_info');
  if (stubInfo) {
    stubInfo.innerHTML = stub.isLocal
      ? '⚠️ <b>Local ID</b> (offline) — will sync to Sheet on save'
      : '✅ <b>Registered in Sheet</b> — your entry is already anchored';
    stubInfo.style.background = stub.isLocal ? '#fff8e1' : '#eafaf1';
    stubInfo.style.borderColor = stub.isLocal ? '#f39c12' : '#27ae60';
  }
}

function editEntry(type,id){
  editingId=id;
  const e=getData()[type].find(x=>x.id===id);if(!e)return;
  document.getElementById('modalTitle').textContent='Edit Entry';
  document.getElementById('modalBody').innerHTML=entryForm(type,e);
  document.getElementById('entryModal').classList.add('open');
}

    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px">
      <div>
        <b>Entry ID:</b> <code style="background:rgba(0,0,0,0.06);padding:1px 5px;border-radius:3px">${v.id||'—'}</code> &nbsp;
        <b>Sr.No:</b> <code style="background:rgba(0,0,0,0.06);padding:1px 5px;border-radius:3px">${v.srno||'—'}</code>
      </div>
      <div style="font-size:10px;color:var(--text-muted)">
        Created: ${v.createdBy||currentUser.name} · ${v.createdAt?new Date(v.createdAt).toLocaleString('en-IN'):'now'}
      </div>
    </div>
  </div>`;

  return`
  ${v.id ? stubInfoHtml : ''}
  ${typeHint}
  ${isCash?`

    <div style="flex:1.5">
      <label class="field-label">💱 Transaction Type *</label>
      <select id="f_txntype" onchange="onTxnTypeChange('${type}')" style="font-size:13px;font-weight:600;border:2px solid var(--primary);background:#f8fbff">
        <option value="Income(Inflow)"  ${(curTxnType==='Income(Inflow)'||curTxnType==='RECEIPT')?'selected':''}>💰 RECEIPT — Cash received from external source</option>
        <option value="Transfer" ${curTxnType==='Transfer'?'selected':''}>🔄 TRANSFER — Give cash to another person</option>
        <option value="Expense(Outflow)"  ${curTxnType==='Expense(Outflow)'?'selected':''}>💸 EXPENSE — Pay vendor / expense</option>
      </select>
    </div>
    <div style="flex:1;background:#f0f4ff;border-radius:8px;padding:10px 12px;font-size:11px;color:#1a5276;line-height:1.9">
      <span id="txntype_rule" style="font-weight:700;display:block">${
        curTxnType==='RECEIPT'?'Rule 5.1: From = External source':
        curTxnType==='TRANSFER'?'Rule 5.2: Between people only':
        'Rule 5.3: To = Vendor/Payee'
      }</span>
      <span id="txntype_desc">${
        curTxnType==='RECEIPT'?'Donation, sale, bank withdrawal, fees...':
        curTxnType==='TRANSFER'?'Admin→Creator, Admin→Approver etc.':

      }</span>
      <span style="display:block;margin-top:4px;color:var(--primary);font-weight:600">Your cash balance: ₹${myBal.toLocaleString('en-IN')}</span>
    </div>
  </div>

    <div style="flex:1"><label class="field-label">🔄 Transfer To (Person) *</label>
      <select id="f_transfer_to" style="width:100%;padding:9px;border:1.5px solid var(--primary);border-radius:8px">
        <option value="">Select recipient...</option>
        ${USERS.filter(u=>u.name!==currentUser.name).map(u=>'<option value="'+u.name+'"'+(v.transferTo===u.name?' selected':'')+'>'+ u.name+' ('+u.role+')</option>').join('')}

}

function onTxnTypeChange(type) {
  const el = document.getElementById('f_txntype');
  if (!el) return;
  const txnType = el.value;
  const typeEl  = document.getElementById('f_type');
  const headEl  = document.getElementById('f_head');
  const catEl   = document.getElementById('f_category');
  const hint    = document.getElementById('txntype_rule');
  const desc    = document.getElementById('txntype_desc');
  const transferRow = document.getElementById('transfer_to_row');
  const vendorLabel = document.getElementById('vendor_label');

  if (txnType === 'Income(Inflow)') {
    if (typeEl)  typeEl.value = 'credit';
    if (headEl && !INCOME_HEADS.includes(headEl.value)) headEl.value = INCOME_HEADS[0];
    if (transferRow) transferRow.style.display = 'none';
    if (hint) hint.textContent = 'Income(Inflow) — Rule: From = External source';
    if (desc) desc.textContent = 'Cash received: donation, sale, bank withdrawal, fees, etc.';
    if (vendorLabel) vendorLabel.textContent = 'Received From / Source *';
  } else if (txnType === 'Transfer') {
    if (typeEl)  typeEl.value = 'debit';
    if (headEl)  headEl.value = 'Patty Cash Transfer';
    if (transferRow) transferRow.style.display = '';
    if (hint) hint.textContent = 'Transfer — Rule: Between people only';
    if (desc) desc.textContent = 'Cash given to another user. Cannot exceed your cash in hand.';
    if (vendorLabel) vendorLabel.textContent = 'Transfer To (Person) *';
  } else if (txnType === 'Expense(Outflow)') {
    if (typeEl)  typeEl.value = 'debit';
    if (headEl && !EXPENSE_HEADS.includes(headEl.value)) headEl.value = EXPENSE_HEADS[0];
    if (transferRow) transferRow.style.display = 'none';
    if (hint) hint.textContent = 'Expense(Outflow) — Rule: To = Vendor/Payee';
    if (desc) desc.textContent = 'Cash paid to vendor. Cannot exceed cash in hand.';
    if (vendorLabel) vendorLabel.textContent = 'Vendor / Paid To *';
  }
  // Refresh category options
  refreshCategoryOptions(txnType);
}

function refreshCategoryOptions(txnType) {
  const catEl = document.getElementById('f_category');
  if (!catEl) return;
  const isIncome = txnType === 'Income(Inflow)';
  const cats = isIncome ? INCOME_CATEGORIES : EXPENSE_CATEGORIES;
  catEl.innerHTML = cats.map(c => '<option>' + c + '</option>').join('');
}

function onTypeChange(type){
  const val = document.getElementById('f_type').value;
  const headEl = document.getElementById('f_head');
  if (!headEl) return;
  if (val==='credit' && EXPENSE_HEADS.includes(headEl.value)) headEl.value = CASH_INFLOW_HEADS[0];
  if (val==='debit'  && CASH_INFLOW_HEADS.includes(headEl.value)) headEl.value = EXPENSE_HEADS[0];
}

function onHeadChange(){
  const headEl = document.getElementById('f_head');
  const typeEl = document.getElementById('f_type');
  if (!headEl || !typeEl) return;
  if (CASH_INFLOW_HEADS.includes(headEl.value)) typeEl.value = 'credit';
  if (EXPENSE_HEADS.includes(headEl.value)) typeEl.value = 'debit';
}


function saveEntry(type){
  const date       = document.getElementById('f_date').value;
  const etype      = document.getElementById('f_type').value;
  const paidByUser = document.getElementById('f_paidby').value;
  const head       = document.getElementById('f_head').value;
  const category   = document.getElementById('f_category').value;
  const amount     = parseFloat(document.getElementById('f_amount').value);
  const desc       = document.getElementById('f_desc').value.trim();
  const vendor     = document.getElementById('f_vendor').value.trim();
  const invoiceLink= document.getElementById('f_invoice').value.trim();
  const remarks    = document.getElementById('f_remarks').value.trim();
  const g = id => { const el=document.getElementById(id); return el?el.value.trim():''; };

  // txnType only for cash entries
  const txnTypeEl = document.getElementById('f_txntype');
  const txnType   = txnTypeEl ? txnTypeEl.value : (etype==='credit'?'RECEIPT':'EXPENSE');
  const transferTo= g('f_transfer_to');

  if(!date||!head||!amount||!desc){alert('Please fill all required fields: Date, Head, Amount, Description');return;}
  if(!vendor && txnType!=='TRANSFER'){alert('Please fill Vendor / Paid To / Received From');return;}
  if(txnType==='TRANSFER' && !transferTo){alert('Please select the Transfer To person.');return;}

  // ── Rule 5.4: Expense/Transfer cannot exceed cash in hand ─────────────────
  if(type==='cash' && !editingId && (txnType==='EXPENSE'||txnType==='TRANSFER')) {
    const h = computeCashHoldings();
    const holder = paidByUser || currentUser.name;
    const balance = (h.holdings[holder]||{}).balance || 0;
    if(amount > balance) {
      const action = txnType==='TRANSFER'?'Transfer':'Expense';
      if(!confirm('⚠️ Rule 5.4 Violation!\n'
        +holder+' only has ₹'+balance.toLocaleString('en-IN')+' cash in hand.\n'
        +'This '+action+' of ₹'+amount.toLocaleString('en-IN')+' exceeds available balance.\n\n'
        +'Proceed anyway? (This will create a deficit.)')) return;
    }
  }

  const d    = getData();
  const list = d[type];

  if(editingId){
    const idx=list.findIndex(e=>e.id===editingId);if(idx<0)return;
    list[idx]={...list[idx],date,type:etype,txnType,transferTo,paidByUser,head,category,
      amount,desc,vendor,invoiceLink,remarks,
      updatedBy:currentUser.name,updatedAt:new Date().toISOString(),
      ...(type==='bank'?{bankName:g('f_bank'),accNo:g('f_accno'),chequeRef:g('f_cheque')}:{})};
    saveData('ghj_'+type,list);
    closeModal();showPage(type);showToast('✅ Entry updated — syncing...');
    pushToSheet('updateEntry',{...list[idx],paytype:type});
  } else {
    // Use the stub ID/SrNo from Sheet if available, otherwise generate locally
    const stub = currentStub || {};
    const entryId   = stub.id        || ('GHJ-LOCAL-' + Date.now());
    const entrySrno = stub.srno      || ('GHJ/'+(type==='cash'?'C':'B')+'/'+String(list.length+1).padStart(4,'0'));
    const entryTs   = stub.createdAt || new Date().toISOString();
    const isLocal   = !stub.id || (stub.id||'').startsWith('GHJ-LOCAL-');

    const entry={
      id:entryId, srno:entrySrno, date, type:etype, txnType, transferTo,
      paytype:type, paidByUser, head, category, amount, desc, vendor,
      invoiceLink, screenshotLink:'', remarks,
      status:'pending',
      createdBy: currentUser.name,
      createdAt: entryTs,
      approvedBy:'', paymentRef:'',
      _stubLocal: isLocal,   // flag for sync queue
      ...(type==='bank'?{bankName:g('f_bank'),accNo:g('f_accno'),chequeRef:g('f_cheque')}:{})
    };

    // Remove existing entry with same ID if it was a stub placeholder
    const existingIdx = list.findIndex(e=>e.id===entryId);
    if(existingIdx>=0) list.splice(existingIdx,1);
    list.push(entry);
    saveData('ghj_'+type, list);

    currentStub = null; // clear after use

    closeModal();
    showPage(type);

    // If stub was local (offline), add to sync queue
    if(isLocal){
      addToSyncQueue(entry);
      showToast('⚠️ Saved locally (offline). Will sync when connection returns.');
    } else {
      // Stub was registered — now update that row with full data
      showToast('✅ Entry saved — updating Sheet...');
      pushToSheet('updateEntry', entry);
    }
  }
}

function changeStatus(type,id,status){
  const d=getData(),list=d[type];
  const idx=list.findIndex(e=>e.id===id);if(idx<0)return;
  list[idx].status=status;
  list[idx].approvedBy=currentUser.name;
  list[idx].approvedAt=new Date().toISOString();
  saveData('ghj_'+type,list);
  pushToSheet('updateStatus',{...list[idx],paytype:type});
  showToast(status==='approved'?'✅ Approved!':'❌ Rejected.');
  showPage('approvals');
}

function voidEntry(type,id){
  if(currentUser.role!=='admin'){showToast('Only Admin can void entries.');return;}
  const d=getData(),list=d[type];
  const entry=list.find(e=>e.id===id);if(!entry)return;
  if(entry.status==='paid'){showToast('Cannot void a paid entry. Create a reversal entry instead.');return;}
  const reason=prompt('Reason for voiding (required):');
  if(!reason||!reason.trim()){showToast('Void cancelled.');return;}
  const idx=list.findIndex(e=>e.id===id);
  list[idx].status='voided';list[idx].voidedBy=currentUser.name;
  list[idx].voidedAt=new Date().toISOString();list[idx].voidReason=reason.trim();
  saveData('ghj_'+type,list);
  pushToSheet('updateStatus',{...list[idx],paytype:type,approvedBy:'VOID: '+reason+' by '+currentUser.name});
  showToast('Entry voided.');showPage(currentPage);
}

function getReportPeriodFilter(period){
  const now=new Date(),y=now.getFullYear(),m=now.getMonth();
  if(period==='this_month'){const f=new Date(y,m,1).toISOString().slice(0,10),t=new Date(y,m+1,0).toISOString().slice(0,10);return e=>e.date>=f&&e.date<=t;}
  if(period==='prev_month'){const f=new Date(y,m-1,1).toISOString().slice(0,10),t=new Date(y,m,0).toISOString().slice(0,10);return e=>e.date>=f&&e.date<=t;}
  if(period==='this_year'){const f=y+'-01-01',t=y+'-12-31';return e=>e.date>=f&&e.date<=t;}
  if(period==='last_3m'){const f=new Date(y,m-2,1).toISOString().slice(0,10);return e=>e.date>=f;}
  if(period==='last_6m'){const f=new Date(y,m-5,1).toISOString().slice(0,10);return e=>e.date>=f;}
  return()=>true;
}

function downloadReportData(){
  const d=getData();
  const periodFn=getReportPeriodFilter(reportPeriod);
  const allRaw=[...d.cash.map(e=>({...e,paytype:'cash'})),...d.bank.map(e=>({...e,paytype:'bank'}))];
  const filtered=(reportMode==='all'?allRaw:allRaw.filter(e=>e.paytype===reportMode)).filter(e=>periodFn(e));
  downloadCSV(filtered.map(e=>({SrNo:e.srno,Date:e.date,Mode:e.paytype,Head:e.head,Category:e.category,DrCr:e.type==='debit'?'DR':'CR',Amount:e.amount,Description:e.desc,Vendor:e.vendor||'',PaidByUser:e.paidByUser||e.createdBy||'',Status:e.status})),'GHJ_report_'+reportPeriod);
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function corsResponse(data) {
  return ContentService
    .createTextOutput(JSON.stringify(data))
    .setMimeType(ContentService.MimeType.JSON);
}

function getOrCreateTab(ss, name, headers) {
  var tab = ss.getSheetByName(name);
  if (!tab) {
    tab = ss.insertSheet(name);
    tab.appendRow(headers);
    var hdrRange = tab.getRange(1, 1, 1, headers.length);
    hdrRange.setFontWeight('bold')
            .setBackground('#1a3a5c')
            .setFontColor('#ffffff');
    tab.setFrozenRows(1);
  }
  return tab;
}

// ── Rebuild CashMgmt summary from CashEntries ─────────────────────────────────
function rebuildCashMgmt(ss) {
  var ctab = ss.getSheetByName('CashEntries');
  if (!ctab || ctab.getLastRow() < 2) return;

  var rows = ctab.getDataRange().getValues();
  var hdr  = rows[0].map(function(h){ return String(h).trim(); });
  var col  = function(name){ return hdr.indexOf(name); };

  // Per-user summary
  var summary = {}; // { userName: { income:0, transfer_in:0, transfer_out:0, expense:0 } }
  var init = function(u){ if(!summary[u]) summary[u]={income:0,transfer_in:0,transfer_out:0,expense:0}; };

  for (var i = 1; i < rows.length; i++) {
    var r      = rows[i];
    var holder = String(r[col('CreatedBy')]  || '').trim();
    var etype  = String(r[col('EntryType')]  || '').trim();
    var amt    = parseFloat(r[col('Amount')] || 0);
    var vendor = String(r[col('ReceivedBy/VendorName')] || '').trim();

    if (!holder || !amt) continue;
    init(holder);

    if (etype === 'Income(Inflow)') {
      summary[holder].income += amt;
    } else if (etype === 'Transfer') {
      // Transfer OUT from holder, Transfer IN to vendor (recipient)
      summary[holder].transfer_out += amt;
      init(vendor);
      summary[vendor].transfer_in += amt;
    } else if (etype === 'Expense(Outflow)') {
      summary[holder].expense += amt;
    }
  }

  // Write to CashMgmt tab — clear and rewrite
  var mtab = getOrCreateTab(ss, 'CashMgmt', ['Total Cash Holding Status','Opening','Income(Inflow)','Transfer','Expense(Outflow)','Net Balance']);
  // Clear data rows (keep header)
  if (mtab.getLastRow() > 1) {
    mtab.getRange(2, 1, mtab.getLastRow() - 1, 6).clearContent();
  }

  // Write Admin section header
  mtab.appendRow(['Admin Cash Summary','Opening','Income(Inflow)','Transfer Out','Expense(Outflow)','Net Balance']);

  // Write per-user rows
  mtab.appendRow(['LoginUserName','Opening','Income(Inflow) Received','Transfer In','Expense(Outflow)','Closing Balance']);
  Object.keys(summary).forEach(function(u) {
    var s = summary[u];
    var net = 0 + s.income + s.transfer_in - s.transfer_out - s.expense;
    mtab.appendRow([u, 0, s.income, s.transfer_in, s.expense, net]);
  });
}

// ════════════════════════════════════════════════════════════════════════
//  doPost — write operations
// ════════════════════════════════════════════════════════════════════════
function doPost(e) {
  try {
    if (!e || !e.postData || !e.postData.contents)
      return corsResponse({status:'error', error:'No POST body'});

    var p;
    try { p = JSON.parse(e.postData.contents); }
    catch(ex) { return corsResponse({status:'error', error:'Bad JSON: '+ex.message}); }

    if (APP_SECRET && p._secret !== APP_SECRET)
      return corsResponse({status:'error', error:'Unauthorized'});

    var ss = SpreadsheetApp.openById(SHEET_ID);

    // ── CREATE row stub first (the "auto-ID" pattern) ────────────────
    // Client calls action='createStub' FIRST to get a pre-registered row.
    // Then fills in the form and calls saveEntry to update that row.
    if (p.action === 'createStub') {
      var isBankEntry = (p.paytype === 'bank');
      var stubTab = isBankEntry
        ? getOrCreateTab(ss, 'BankEntries', BANK_HEADERS)
        : getOrCreateTab(ss, 'CashEntries', CASH_HEADERS);

      var ts   = new Date().toISOString();
      var uid  = 'GHJ-' + Date.now() + '-' + Math.floor(Math.random()*9999);
      // SrNo = count of existing data rows + 1
      var rowCount = Math.max(stubTab.getLastRow() - 1, 0); // minus header
      var srno = 'GHJ/' + (isBankEntry?'B':'C') + '/' + ('000' + (rowCount+1)).slice(-4);

      if (isBankEntry) {
        // BankEntries: A:ID B:SrNo C:Date D:Head E:Category F:Type G:Amount
        //              H:Description I:Vendor J:InvoiceLink K:ScreenShot
        //              L:Status M:CreatedBy ... (rest blank)
        var stubRowB = [uid, srno, '', '', '', 'debit', 0, '', '', '', '', 'stub',
                        p.createdBy||'', '', '', '', '', '', '', 'bank'];
        while(stubRowB.length < BANK_HEADERS.length) stubRowB.push('');
        stubTab.appendRow(stubRowB);
      } else {
        // CashEntries: A:ID(Auto) B:TimeStamp(Auto) C:CreatedBy D:EntryType
        //              E:SrNo F:Date G:Head H:Category I:ReceivedBy/VendorName
        //              J:Amount K:Description L:InvoiceLink M:ScreenShot
        //              N:Status O:ApprovedBy P:PaymentRef Q:Remarks R:Type
        var stubRowC = [uid, ts, p.createdBy||'', '', srno, '', '', '', '',
                        0, '', '', '', 'stub', '', '', '', 'cash'];
        while(stubRowC.length < CASH_HEADERS.length) stubRowC.push('');
        stubTab.appendRow(stubRowC);
      }

      // Format the new stub row
      var newRowNum = stubTab.getLastRow();
      stubTab.getRange(newRowNum, 1).setBackground('#fff8e1'); // yellow = stub

      return corsResponse({status:'ok', id:uid, srno:srno, timestamp:ts});
    }

    // ── Save/Update Cash Entry ───────────────────────────────────────
    if (p.action === 'saveEntry' || p.action === 'updateEntry') {

      if (p.paytype === 'bank') {
        var btab = getOrCreateTab(ss, 'BankEntries', BANK_HEADERS);
        var brows = btab.getDataRange().getValues();
        var bfound = -1;
        for (var bi = 1; bi < brows.length; bi++) {
          if (String(brows[bi][0]) === String(p.id)) { bfound = bi; break; }
        }
        // BankEntries: A:ID B:SrNo C:Date D:Head E:Category F:Type G:Amount
        //              H:Description I:Vendor J:InvoiceLink K:ScreenShot L:Status
        //              M:CreatedBy N:ApprovedBy O:PaymentRef P:Remarks
        //              Q:BankName R:AccountNo S:ChequeRef T:PayType
        var brow = [
          p.id||'',              // A: ID
          p.srno||'',            // B: SrNo
          p.date||'',            // C: Date
          p.head||'',            // D: Head
          p.category||'',        // E: Category
          p.type||'debit',       // F: Type
          Number(p.amount)||0,   // G: Amount
          p.desc||'',            // H: Description
          p.vendor||'',          // I: Vendor
          p.invoiceLink||'',     // J: InvoiceLink
          p.screenshotLink||'',  // K: ScreenShot
          p.status||'pending',   // L: Status
          p.createdBy||'',       // M: CreatedBy
          p.approvedBy||'',      // N: ApprovedBy
          p.paymentRef||'',      // O: PaymentRef
          p.remarks||'',         // P: Remarks
          p.bankName||'',        // Q: BankName
          p.accNo||'',           // R: AccountNo
          p.chequeRef||'',       // S: ChequeRef
          p.paytype||'bank'      // T: PayType
        ];
        if (bfound >= 1) btab.getRange(bfound+1,1,1,brow.length).setValues([brow]);
        else btab.appendRow(brow);

      } else {
        var ctab = getOrCreateTab(ss, 'CashEntries', CASH_HEADERS);
        var crows = ctab.getDataRange().getValues();
        var cfound = -1;
        for (var ci = 1; ci < crows.length; ci++) {
          if (String(crows[ci][0]) === String(p.id)) { cfound = ci; break; }
        }
        // CashEntries: A:ID(Auto) B:TimeStamp(Auto) C:CreatedBy D:EntryType
        //              E:SrNo F:Date G:Head H:Category I:ReceivedBy/VendorName
        //              J:Amount K:Description L:InvoiceLink M:ScreenShot
        //              N:Status O:ApprovedBy P:PaymentRef Q:Remarks R:Type
        var crow = [
          p.id||'',              // A: ID (Auto)
          p.createdAt||new Date().toISOString(), // B: TimeStamp (Auto)
          p.createdBy||'',       // C: CreatedBy (login user)
          p.txnType||'',         // D: EntryType (Income(Inflow)/Transfer/Expense(Outflow))
          p.srno||'',            // E: SrNo
          p.date||'',            // F: Date
          p.head||'',            // G: Head
          p.category||'',        // H: Category
          p.vendor||'',          // I: ReceivedBy/VendorName
          Number(p.amount)||0,   // J: Amount
          p.desc||'',            // K: Description
          p.invoiceLink||'',     // L: InvoiceLink
          p.screenshotLink||'',  // M: ScreenShot
          p.status||'pending',   // N: Status
          p.approvedBy||'',      // O: ApprovedBy
          p.paymentRef||'',      // P: PaymentRef
          p.remarks||'',         // Q: Remarks
          'cash'                 // R: Type
        ];
        if (cfound >= 1) {
          ctab.getRange(cfound+1,1,1,crow.length).setValues([crow]);
          // Clear stub yellow background now that row is filled
          ctab.getRange(cfound+1,1,1,crow.length).setBackground(null);
        } else {
          ctab.appendRow(crow);
        }

        // Rebuild CashMgmt summary after every cash write
        rebuildCashMgmt(ss);
      }
      return corsResponse({status:'ok'});
    }

    // ── Update Status only ───────────────────────────────────────────
    if (p.action === 'updateStatus') {
      var tabName = p.paytype==='bank' ? 'BankEntries' : 'CashEntries';
      var stab = ss.getSheetByName(tabName);
      if (!stab) return corsResponse({status:'error', error:'Tab not found'});
      var srows = stab.getDataRange().getValues();
      for (var si = 1; si < srows.length; si++) {
        if (String(srows[si][0]) === String(p.id)) {
          if (p.paytype === 'bank') {
            // Bank: Status=L(12), ApprovedBy=N(14), PaymentRef=O(15), Screenshot=K(11)
            if (p.status)         stab.getRange(si+1,12).setValue(p.status);
            if (p.approvedBy)     stab.getRange(si+1,14).setValue(p.approvedBy);
            if (p.paymentRef)     stab.getRange(si+1,15).setValue(p.paymentRef);
            if (p.screenshotLink) stab.getRange(si+1,11).setValue(p.screenshotLink);
          } else {
            // Cash: Status=N(14), ApprovedBy=O(15), PaymentRef=P(16), Screenshot=M(13)
            if (p.status)         stab.getRange(si+1,14).setValue(p.status);
            if (p.approvedBy)     stab.getRange(si+1,15).setValue(p.approvedBy);
            if (p.paymentRef)     stab.getRange(si+1,16).setValue(p.paymentRef);
            if (p.screenshotLink) stab.getRange(si+1,13).setValue(p.screenshotLink);
          }
          if (p.paytype !== 'bank') rebuildCashMgmt(ss);
          return corsResponse({status:'ok'});
        }
      }
      return corsResponse({status:'error', error:'ID not found'});
    }

    return corsResponse({status:'error', error:'Unknown action: '+p.action});

  } catch(err) {
    return corsResponse({status:'error', error:err.message});
  }
}

// ════════════════════════════════════════════════════════════════════════
//  doGet — read operations
// ════════════════════════════════════════════════════════════════════════
function doGet(e) {
  try {
    var secret = (e && e.parameter && e.parameter.secret) ? e.parameter.secret : '';
    if (APP_SECRET && secret !== APP_SECRET)
      return corsResponse({status:'error', error:'Unauthorized'});

    var type = (e && e.parameter && e.parameter.type) ? e.parameter.type : 'cash';
    var ss   = SpreadsheetApp.openById(SHEET_ID);
    var tab;

    if      (type === 'cash')      tab = ss.getSheetByName('CashEntries');
    else if (type === 'bank')      tab = ss.getSheetByName('BankEntries');
    else if (type === 'cashalloc') tab = ss.getSheetByName('CashMgmt');
    else if (type === 'users')     tab = ss.getSheetByName('Users');
    else return corsResponse({status:'error', error:'Unknown type: '+type});

    if (!tab || tab.getLastRow() < 2) return corsResponse([]);
    return corsResponse(tab.getDataRange().getValues());

  } catch(err) {
    return corsResponse({status:'error', error:err.message});
  }
}

async function testConnection(){
  const url=(document.getElementById('apiUrl')||{}).value||localStorage.getItem('ghj_api_url');
  if(!url){showToast('No URL entered.');return;}
  const r=document.getElementById('testResult');if(r)r.innerHTML='🔄 Testing...';
  try{
    const resp=await fetch(url+'?type=cash',{redirect:'follow'});
    const raw=await resp.text();
    if(!raw||raw.trimStart().startsWith('<')) throw new Error('Got HTML — set "Who has access = Anyone" in deployment');
    JSON.parse(raw);
    if(r)r.innerHTML='<span style="color:var(--success)">✅ Connection working!</span>';
    showToast('✅ Connected!');
  }catch(e){
    if(r)r.innerHTML='<span style="color:var(--danger)">❌ '+e.message+'</span>';
    showToast('❌ Connection failed.');
  }
}

async function refreshUsersFromSheet(){
  const url=localStorage.getItem('ghj_api_url');if(!url){showToast('No Apps Script URL saved.');return;}
  showToast('🔄 Fetching users...');
  try{
    const secret=APP_CONFIG.appSecret||'';
    const resp=await fetch(url+'?type=users'+(secret?'&secret='+encodeURIComponent(secret):''),{redirect:'follow'});
    const raw=await resp.text();
    if(!raw||raw.trimStart().startsWith('<')) throw new Error('HTML response');
    const rows=JSON.parse(raw);
    if(!Array.isArray(rows)||rows.length<2) throw new Error('Empty Users tab');
    const hdr=rows[0].map(h=>String(h).toLowerCase().trim());
    const ni=hdr.indexOf('name'),ei=hdr.indexOf('email'),pi=['password','pwd','pass'].reduce((f,k)=>f>=0?f:hdr.indexOf(k),-1),ri=hdr.indexOf('role');
    if(ei<0||pi<0) throw new Error('Email or Password column not found');
    const users=rows.slice(1).filter(r=>r[ei]).map(r=>({name:ni>=0?String(r[ni]).trim():String(r[ei]).trim(),email:String(r[ei]).trim(),pwd:String(r[pi]).trim(),role:ri>=0?String(r[ri]).trim().toLowerCase():'creator'}));
    USERS=users;localStorage.setItem('ghj_users',JSON.stringify(USERS));
    showToast('✅ '+USERS.length+' users loaded!');showPage('settings');
  }catch(e){showToast('❌ '+e.message);}
}

function downloadCSV(data,filename){
  if(!data||!data.length){showToast('No data to download.');return;}
  const keys=Object.keys(data[0]);
  const csv=[keys.join(','),...data.map(row=>keys.map(k=>{const v=String(row[k]===null||row[k]===undefined?'':row[k]);return v.includes(',')||v.includes('"')||v.includes('\n')?'"'+v.replace(/"/g,'""')+'"':v;}).join(','))].join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename+'_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast('✅ Downloaded: '+a.download);
}

}
