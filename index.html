<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHJ Exp App</title>
<style>
  :root{--primary:#1a5276;--primary-light:#2980b9;--accent:#e67e22;--accent-light:#f39c12;--success:#27ae60;--danger:#c0392b;--bg:#f4f6f8;--card:#fff;--border:#dce3ea;--text:#1c2833;--text-muted:#7f8c8d;--sidebar-w:260px;--header-h:64px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
  #loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a5276,#154360,#0d2137);}
  .login-box{background:#fff;border-radius:16px;padding:40px 36px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center;}
  .login-title{font-size:22px;font-weight:700;color:var(--primary);margin-bottom:4px;}
  .login-sub{font-size:12px;color:var(--text-muted);margin-bottom:28px;}
  .form-group{margin-bottom:16px;text-align:left;}
  .form-group label{font-size:12px;font-weight:600;color:var(--text-muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
  .form-group input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;color:var(--text);}
  .btn-primary{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;}
  .login-error{color:var(--danger);font-size:12px;margin-top:8px;display:none;}
  #appShell{display:none;min-height:100vh;}
  .header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2);}
  .header-left{display:flex;align-items:center;gap:12px;}
  .header-title{font-size:18px;font-weight:700;}
  .header-title span{color:var(--accent-light);}
  .header-right{display:flex;align-items:center;gap:10px;}
  .sync-info{font-size:11px;color:rgba(255,255,255,.75);background:rgba(255,255,255,.1);padding:4px 10px;border-radius:12px;white-space:nowrap;}
  .user-badge{background:rgba(255,255,255,.15);border-radius:20px;padding:5px 12px;font-size:13px;}
  .btn-logout{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;}
  .sidebar{position:fixed;top:var(--header-h);left:0;width:var(--sidebar-w);bottom:0;background:#1a2537;overflow-y:auto;z-index:50;padding:16px 0;}
  .nav-section{padding:6px 16px 4px;font-size:10px;font-weight:700;color:#5d7499;text-transform:uppercase;letter-spacing:1px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:#9cb2cc;cursor:pointer;font-size:13px;transition:all .2s;border-left:3px solid transparent;}
  .nav-item:hover{background:rgba(255,255,255,.05);color:#fff;}
  .nav-item.active{background:rgba(41,128,185,.2);color:#fff;border-left-color:var(--accent);}
  .nav-icon{font-size:16px;width:20px;text-align:center;}
  .nav-badge{background:var(--accent);color:#fff;border-radius:10px;padding:2px 7px;font-size:10px;margin-left:auto;}
  .main{margin-left:var(--sidebar-w);margin-top:var(--header-h);padding:24px;min-height:calc(100vh - var(--header-h));}
  .card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 6px rgba(0,0,0,.07);margin-bottom:20px;}
  .card-title{font-size:15px;font-weight:700;color:var(--primary);margin-bottom:16px;}
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
  .stat-card{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-left:4px solid var(--primary);}
  .stat-label{font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;}
  .stat-value{font-size:22px;font-weight:700;color:var(--text);margin-top:4px;}
  .stat-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
  .form-row{display:grid;gap:14px;margin-bottom:14px;}
  .form-row.col2{grid-template-columns:1fr 1fr;}
  .form-row.col3{grid-template-columns:1fr 1fr 1fr;}
  label.field-label{font-size:11px;font-weight:600;color:var(--text-muted);display:block;margin-bottom:5px;text-transform:uppercase;}
  input[type=text],input[type=number],input[type=date],input[type=email],select,textarea{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;color:var(--text);background:#fff;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary-light);}
  textarea{resize:vertical;min-height:60px;}
  .btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:16px;}
  .btn{padding:9px 20px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;}
  .btn-save{background:var(--primary);color:#fff;}
  .btn-cancel{background:#ecf0f1;color:var(--text);}
  .btn-approve{background:var(--success);color:#fff;padding:5px 12px;font-size:12px;border-radius:5px;border:none;cursor:pointer;}
  .btn-reject{background:var(--danger);color:#fff;padding:5px 12px;font-size:12px;border-radius:5px;border:none;cursor:pointer;}
  .btn-pay{background:var(--accent);color:#fff;padding:5px 12px;font-size:12px;border-radius:5px;border:none;cursor:pointer;}
  .btn-sm{padding:4px 10px;font-size:11px;}
  .btn-outline{background:transparent;border:1.5px solid var(--primary);color:var(--primary);}
  .btn-new{background:var(--accent);color:#fff;border:none;padding:9px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;}
  .tbl-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  thead th{background:#f0f4f8;padding:10px 12px;text-align:left;font-weight:700;color:var(--text-muted);font-size:11px;text-transform:uppercase;border-bottom:2px solid var(--border);}
  tbody td{padding:10px 12px;border-bottom:1px solid #f0f0f0;vertical-align:middle;}
  tbody tr:hover{background:#fafbfc;}
  .badge{display:inline-block;padding:3px 9px;border-radius:12px;font-size:10px;font-weight:700;}
  .badge-pending{background:#fef9e7;color:#d68910;}
  .badge-approved{background:#eafaf1;color:#1e8449;}
  .badge-rejected{background:#fdedec;color:#922b21;}
  .badge-paid{background:#eaf0fb;color:#1a5276;}
  .badge-voided{background:#f0f0f0;color:#888;}
  .badge-cash{background:#fef5e7;color:#ca6f1e;}
  .badge-bank{background:#e8f4fd;color:#1b6ca8;}
  .badge-debit{background:#fdedec;color:#922b21;}
  .badge-credit{background:#eafaf1;color:#1e8449;}
  .badge-active{background:#eafaf1;color:#1e8449;}
  .badge-settled{background:#eaf0fb;color:#1a5276;}
  .badge-cancelled{background:#f0f0f0;color:#888;}
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;}
  .modal-bg.open{display:flex;}
  .modal{background:#fff;border-radius:14px;padding:28px;width:640px;max-width:95vw;max-height:90vh;overflow-y:auto;}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  .modal-title{font-size:17px;font-weight:700;color:var(--primary);}
  .modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-muted);}
  #toast{position:fixed;bottom:24px;right:24px;background:#1a2537;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;z-index:500;display:none;box-shadow:0 4px 12px rgba(0,0,0,.2);}
  .filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px;background:#fff;padding:14px 16px;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
  .filter-bar .form-group{margin:0;min-width:130px;}
  .holding-bar{height:10px;border-radius:5px;background:#ecf0f1;margin-top:4px;}
  .holding-bar-fill{height:10px;border-radius:5px;background:var(--success);}
  @media(max-width:768px){
    .sidebar{display:none!important;}
    .main{margin-left:0!important;padding:12px!important;}
    .stats-row{grid-template-columns:repeat(2,1fr)!important;}
    .form-row.col2,.form-row.col3{grid-template-columns:1fr!important;}
    .modal{width:100vw!important;border-radius:16px 16px 0 0!important;position:fixed;bottom:0;left:0;right:0;margin:0;}
    .modal-bg.open{align-items:flex-end!important;}
  }
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-title">GHJ <span style="color:var(--accent)">Exp</span> App</div>

<!-- ══ APP ══ -->
<div id="appShell">

    <div class="header-left">

<div id="toast"></div>

<script>
// ════════════════════════════════════════════════════════════════════
//  ▼▼▼  EDIT ONLY THESE 3 LINES — everything else is automatic  ▼▼▼
// ════════════════════════════════════════════════════════════════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzy_MDK_4WGGg9TUYTcN2YNGAnf3onbBcQQpvHRcZC6tUCpNd2LYOgbScw6kL3SUe9h/exec';
const SHEET_ID   = '1JL8flLniqzH-9E36dnOZorCzHerjMO6BKxeQ0efkznk';
const APP_SECRET = '6279@GSEKLX278905721';
// ════════════════════════════════════════════════════════════════════

// ── CASH INFLOW HEADS ──────────────────────────────────────────────
const INFLOW_HEADS = [
  'Cash Donation','Cash Fees','Cash Sale',
  'Cash Stay Charges (Accommodation)','Cash Fooding Charges',
  'Bank Withdrawal to Cash','Corpus Fund','Capital Contribution',
  'Cash Miscellaneous Receipts'
];

// ── EXPENSE / OUTFLOW HEADS ────────────────────────────────────────
const EXPENSE_HEADS = [
  'Groceries/Food Items','Admin & Office','Operational Expenses',
  'Repair & Maintenance','Program/Event/Welfare','Purchase & Inventory',
  'Salaries & Wages','Travel & Transportation','Marketing & Events',
  'Bank Deposit from Cash','Government Fees/Taxes','Miscellaneous Expense'
];

const ALL_HEADS = [...INFLOW_HEADS, ...EXPENSE_HEADS];

const CATEGORIES = [
  'Cash Donation','Cash Fees','Cash Sale','Accommodation Charges','Fooding Charges',
  'Bank Withdrawal','Capital / Corpus','Salaries & Wages','Office Rent',
  'Electricity/Water/Gas','Groceries/Food','Printing/Stationery','Courier & Shipping',
  'Insurance Premium','Banking Charges','Travel & Transportation','Marketing & Events',
  'Maintenance & Repair','Purchase of Equipment','Program Supplies',
  'Govt Fees/Taxes','Bank Deposit','Miscellaneous'
];

const DEFAULT_USERS = [
  {email:'admin@ghj.org',    pwd:'admin123',  name:'Admin',    role:'admin'},
  {email:'approver@ghj.org', pwd:'approve123',name:'Approver', role:'approver'},
  {email:'creator@ghj.org',  pwd:'create123', name:'Creator',  role:'creator'},
  {email:'creator2@ghj.org', pwd:'create456', name:'Creator2', role:'creator'},
];

let USERS       = JSON.parse(localStorage.getItem('ghj_users')||'null') || DEFAULT_USERS;
let currentUser = null;
let currentPage = 'dashboard';
let editingId   = null;
let reportPeriod= 'this_month';
let reportMode  = 'cash';

// ── DATA LAYER ─────────────────────────────────────────────────────
const ld  = k => { try{return JSON.parse(localStorage.getItem(k))||[];}catch{return[];} };
const sd  = (k,v) => { try{localStorage.setItem(k,JSON.stringify(v));}catch{} };
const getData   = () => ({cash:ld('ghj_cash'), bank:ld('ghj_bank')});
const getAllocs  = () => ld('ghj_alloc');
const saveAllocs= d  => sd('ghj_alloc',d);
const genId     = () => 'GHJ-'+Date.now()+'-'+Math.floor(Math.random()*9999);

// ── CASH HOLDINGS COMPUTATION ──────────────────────────────────────
function computeHoldings(){
  const d=getData(), allc=getAllocs();
  // Total cash received into system
  const totalIn = d.cash
    .filter(e=>INFLOW_HEADS.includes(e.head)&&e.type==='credit'&&e.status!=='voided')
    .reduce((s,e)=>s+Number(e.amount),0);
  // Allocated to each user (from admin)
  const allocByUser={};
  allc.filter(a=>a.status!=='cancelled').forEach(a=>{
    allocByUser[a.toUser]=(allocByUser[a.toUser]||0)+Number(a.amount);
  });
  // Bills paid by each user
  const billsByUser={};
  d.cash.filter(e=>e.type==='debit'&&e.status!=='voided').forEach(e=>{
    const u=e.paidByUser||e.createdBy||'Admin';
    billsByUser[u]=(billsByUser[u]||0)+Number(e.amount);
  });
  // Holdings per user
  const holdings={};
  USERS.filter(u=>u.name!=='Admin').forEach(u=>{
    holdings[u.name]={allocated:allocByUser[u.name]||0, spent:billsByUser[u.name]||0,
      balance:(allocByUser[u.name]||0)-(billsByUser[u.name]||0), role:u.role};
  });
  const totalAllocatedToOthers=Object.entries(allocByUser).filter(([u])=>u!=='Admin').reduce((s,[,v])=>s+v,0);
  const adminBills=billsByUser['Admin']||0;
  holdings['Admin']={allocated:totalIn, spent:totalAllocatedToOthers+adminBills,
    balance:totalIn-totalAllocatedToOthers-adminBills, role:'admin', isAdmin:true};
  return {holdings,totalIn,allocByUser,billsByUser,totalAllocatedToOthers,adminBills};
}

// ── SYNC BADGE & TIME ─────────────────────────────────────────────
function setLastSync(){ localStorage.setItem('ghj_last_sync',new Date().toISOString()); updateSyncInfo(); }
function updateSyncInfo(){
  const el=document.getElementById('syncInfo'); if(!el)return;
  const ts=localStorage.getItem('ghj_last_sync');
  if(!ts){el.style.display='none';return;}
  const d=new Date(ts);
  el.textContent='🔄 Last sync: '+d.toLocaleDateString('en-IN')+' '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  el.style.display='block';
}
function getPQ(){ try{return JSON.parse(localStorage.getItem('ghj_sq')||'[]');}catch{return[];} }
function setPQ(q){ try{localStorage.setItem('ghj_sq',JSON.stringify(q));}catch{} }
function addQ(e){ const q=getPQ().filter(x=>x.id!==e.id); q.push({...e,_at:new Date().toISOString()}); setPQ(q); updateSyncBadge(); }
function remQ(id){ setPQ(getPQ().filter(e=>e.id!==id)); updateSyncBadge(); }
function updateSyncBadge(){
  const q=getPQ(),b=document.getElementById('syncBadge'); if(!b)return;
  if(q.length){b.textContent=q.length+' unsynced — retry';b.style.display='inline-block';}
  else{b.style.display='none';}
}

// ── PUSH TO SHEET ─────────────────────────────────────────────────
async function pushToSheet(action, data){
  const payload={action,_secret:APP_SECRET,
    id:data.id||'',srno:data.srno||'',date:data.date||'',head:data.head||'',
    category:data.category||'',type:data.type||'debit',amount:Number(data.amount)||0,
    desc:data.desc||data.description||'',vendor:data.vendor||'',
    invoiceLink:data.invoiceLink||'',screenshotLink:data.screenshotLink||'',
    status:data.status||'pending',createdBy:data.createdBy||'',
    approvedBy:data.approvedBy||'',paymentRef:data.paymentRef||'',
    remarks:data.remarks||'',paytype:data.paytype||'cash',
    bankName:data.bankName||'',accNo:data.accNo||'',chequeRef:data.chequeRef||'',
    paymentMode:data.paymentMode||'',paidBy:data.paidBy||'',paidByUser:data.paidByUser||''};
  if(!SCRIPT_URL){addQ(payload);showToast('⚠️ No Script URL — saved locally.');return;}
  try{
    const r=await fetch(SCRIPT_URL,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
    const raw=await r.text();
    if(!raw||raw.trimStart().startsWith('<')) throw new Error('HTML response — fix deployment settings');
    const res=JSON.parse(raw);
    if(res.status==='ok'){remQ(payload.id);setLastSync();showToast('✅ Saved to Google Sheets!');}
    else throw new Error(res.error||'Script error');
  }catch(e){addQ(payload);showToast('⚠️ Saved locally: '+e.message);}
}

// ── PUSH CASH ALLOCATION TO SHEET ─────────────────────────────────
async function pushAllocToSheet(action, rec){
  const payload={action,_secret:APP_SECRET,
    id:rec.id||'',date:rec.date||'',toUser:rec.toUser||'',fromUser:rec.fromUser||'',
    amount:Number(rec.amount)||0,purpose:rec.purpose||'',status:rec.status||'active',
    remarks:rec.remarks||'',createdAt:rec.createdAt||'',settledAt:rec.settledAt||''};
  if(!SCRIPT_URL){addQ({...payload,_type:'alloc'});showToast('⚠️ No Script URL — saved locally.');return;}
  try{
    const r=await fetch(SCRIPT_URL,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
    const raw=await r.text();
    if(!raw||raw.trimStart().startsWith('<')) throw new Error('HTML response');
    const res=JSON.parse(raw);
    if(res.status==='ok'){remQ(payload.id);setLastSync();showToast('✅ Allocation saved to Sheet!');}
    else throw new Error(res.error||'Script error');
  }catch(e){addQ({...payload,_type:'alloc'});showToast('⚠️ Saved locally: '+e.message);}
}

// ── PUSH REPORT SUMMARY TO SHEET ──────────────────────────────────
async function pushReportToSheet(){
  if(!SCRIPT_URL){showToast('⚠️ No Script URL configured.');return;}
  showToast('📊 Pushing report to Google Sheet...');
  try{
    const payload=buildReportPayload();
    payload.action='saveReport';
    payload._secret=APP_SECRET;
    const r=await fetch(SCRIPT_URL,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
    const raw=await r.text();
    if(!raw||raw.trimStart().startsWith('<')) throw new Error('HTML response — fix deployment');
    const res=JSON.parse(raw);
    if(res.status==='ok'){setLastSync();showToast('✅ Report saved to "Reports" tab in Google Sheet!');}
    else throw new Error(res.error||'Script error');
  }catch(e){showToast('❌ Report push failed: '+e.message);}
}

function buildReportPayload(){
  const d=getData();
  const periodFn=getPeriodFn(reportPeriod);
  const all=[...d.cash.map(e=>({...e,paytype:'cash'})),...d.bank.map(e=>({...e,paytype:'bank'}))];
  const filtered=all.filter(e=>e.status!=='voided'&&periodFn(e));
  const debits=filtered.filter(e=>e.type==='debit');
  const credits=filtered.filter(e=>e.type==='credit');
  const h=computeHoldings();
  // Inflow by head
  const inflowByHead={};
  INFLOW_HEADS.forEach(hd=>{ inflowByHead[hd]=d.cash.filter(e=>e.head===hd&&e.type==='credit'&&e.status!=='voided'&&periodFn(e)).reduce((s,e)=>s+Number(e.amount),0);});
  // Expense by head
  const expByHead={};
  ALL_HEADS.forEach(hd=>{expByHead[hd]=debits.filter(e=>e.head===hd).reduce((s,e)=>s+Number(e.amount),0);});
  // Expense by category
  const expByCat={};
  CATEGORIES.forEach(c=>{expByCat[c]=debits.filter(e=>e.category===c).reduce((s,e)=>s+Number(e.amount),0);});
  const periodLabel={all:'All Time',this_month:'This Month',prev_month:'Previous Month',this_year:'This Year',last_3m:'Last 3 Months',last_6m:'Last 6 Months'}[reportPeriod]||'';
  return{
    period:periodLabel,
    generatedAt:new Date().toISOString(),
    generatedBy:currentUser.name,
    totalCashIn:h.totalIn||Object.values(inflowByHead).reduce((s,v)=>s+v,0),
    totalDebit:debits.reduce((s,e)=>s+Number(e.amount),0),
    totalCredit:credits.reduce((s,e)=>s+Number(e.amount),0),
    inflowByHead:JSON.stringify(inflowByHead),
    expByHead:JSON.stringify(expByHead),
    expByCat:JSON.stringify(expByCat),
    holdingsByUser:JSON.stringify(Object.fromEntries(Object.entries(h.holdings).map(([u,v])=>[u,v.balance]))),
  };
}

// ── LOAD FROM SHEET ────────────────────────────────────────────────
async function loadFromSheet(){
  if(!SCRIPT_URL){showToast('⚠️ No Script URL configured.');return;}
  showToast('🔄 Refreshing from Google Sheet...');
  try{
    for(const type of['cash','bank']){
      const resp=await fetch(SCRIPT_URL+'?type='+type+'&secret='+encodeURIComponent(APP_SECRET),{redirect:'follow'});
      const raw=await resp.text();
      if(!raw||raw.trimStart().startsWith('<')) continue;
      const rows=JSON.parse(raw);
      if(!Array.isArray(rows)||rows.length<2) continue;
      const hdr=rows[0].map(h=>String(h).toLowerCase().trim());
      const ix=h=>hdr.indexOf(h);
      const qIds=new Set(getPQ().map(q=>q.id));
      const entries=rows.slice(1).filter(r=>(r[ix('id')]||r[0])&&!qIds.has(String(r[ix('id')]||r[0]))).map(r=>({
        id:String(r[ix('id')]||r[0]||''),srno:String(r[ix('srno')]||r[1]||''),
        date:String(r[ix('date')]||r[2]||''),head:String(r[ix('head')]||r[3]||''),
        category:String(r[ix('category')]||r[4]||''),type:String(r[ix('type')]||r[5]||'debit'),
        amount:parseFloat(r[ix('amount')]||r[6]||0),desc:String(r[ix('description')]||r[7]||''),
        vendor:String(r[ix('vendor')]||r[8]||''),invoiceLink:String(r[ix('invoicelink')]||r[9]||''),
        screenshotLink:String(r[ix('screenshot')]||r[10]||''),status:String(r[ix('status')]||r[11]||'pending'),
        createdBy:String(r[ix('createdby')]||r[12]||''),approvedBy:String(r[ix('approvedby')]||r[13]||''),
        paymentRef:String(r[ix('paymentref')]||r[14]||''),remarks:String(r[ix('remarks')]||r[15]||''),
        bankName:String(r[ix('bankname')]||r[16]||''),accNo:String(r[ix('accountno')]||r[17]||''),
        chequeRef:String(r[ix('chequeref')]||r[18]||''),paytype:type,
        paidByUser:String(r[ix('paidbyuser')]||r[21]||'')
      }));
      // merge with queued
      const local=getPQ().filter(q=>q.paytype===type);
      sd('ghj_'+type,[...entries,...local]);
    }
    // Load allocations from sheet
    try{
      const ar=await fetch(SCRIPT_URL+'?type=allocations&secret='+encodeURIComponent(APP_SECRET),{redirect:'follow'});
      const araw=await ar.text();
      if(araw&&!araw.trimStart().startsWith('<')){
        const arows=JSON.parse(araw);
        if(Array.isArray(arows)&&arows.length>1){
          const ahdr=arows[0].map(h=>String(h).toLowerCase().trim());
          const ax=h=>ahdr.indexOf(h);
          const allocs=arows.slice(1).filter(r=>r[ax('id')]||r[0]).map(r=>({
            id:String(r[ax('id')]||r[0]||''),date:String(r[ax('date')]||r[1]||''),
            toUser:String(r[ax('touser')]||r[2]||''),fromUser:String(r[ax('fromuser')]||r[3]||''),
            amount:parseFloat(r[ax('amount')]||r[4]||0),purpose:String(r[ax('purpose')]||r[5]||''),
            status:String(r[ax('status')]||r[6]||'active'),remarks:String(r[ax('remarks')]||r[7]||''),
            createdAt:String(r[ax('createdat')]||r[8]||''),settledAt:String(r[ax('settledat')]||r[9]||'')
          }));
          if(allocs.length) sd('ghj_alloc',allocs);
        }
      }
    }catch{}
    setLastSync();
    showToast('✅ Data refreshed from Google Sheets!');
    showPage(currentPage);
  }catch(e){showToast('⚠️ Refresh failed: '+e.message);}
}

async function retrySyncQueue(){
  if(!SCRIPT_URL||!getPQ().length)return;
  showToast('🔄 Retrying sync...');
  let n=0;
  for(const e of[...getPQ()]){
    try{
      // Choose correct action based on type
      const action=e._type==='alloc'?'saveAllocation':(e.action||'saveEntry');
      const payload={...e,action};
      const r=await fetch(SCRIPT_URL,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
      const raw=await r.text();
      if(raw&&!raw.trimStart().startsWith('<')){const res=JSON.parse(raw);if(res.status==='ok'){remQ(e.id);n++;}}
    }catch{}
  }
  if(n>0){setLastSync();showToast('✅ '+n+' item(s) synced!');showPage(currentPage);}
  else showToast('⚠️ Sync failed — check connection & Script URL.');
}

// ── AUTH ───────────────────────────────────────────────────────────
async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pwd=document.getElementById('loginPwd').value;
  const err=document.getElementById('loginErr');
  const btn=document.querySelector('.btn-primary');
  err.style.display='none';
  if(SCRIPT_URL){
    btn.textContent='Verifying...';btn.disabled=true;
    try{
      const resp=await fetch(SCRIPT_URL+'?type=users&secret='+encodeURIComponent(APP_SECRET),{redirect:'follow'});
      const raw=await resp.text();
      if(raw&&!raw.trimStart().startsWith('<')){
        const rows=JSON.parse(raw);
        if(Array.isArray(rows)&&rows.length>1){
          const h=rows[0].map(x=>String(x).toLowerCase().trim());
          const ei=h.indexOf('email'),pi=['password','pwd','pass'].reduce((f,k)=>f>=0?f:h.indexOf(k),-1),ni=h.indexOf('name'),ri=h.indexOf('role');
          if(ei>=0&&pi>=0){
            const su=rows.slice(1).filter(r=>r[ei]).map(r=>({email:String(r[ei]).trim(),pwd:String(r[pi]).trim(),name:ni>=0?String(r[ni]).trim():String(r[ei]).trim(),role:ri>=0?String(r[ri]).trim().toLowerCase():'creator'}));
            if(su.length){USERS=su;sd('ghj_users',USERS);}
          }
        }
      }
    }catch{}
    btn.textContent='Sign In';btn.disabled=false;
  }
  const user=USERS.find(u=>u.email.toLowerCase()===email.toLowerCase()&&u.pwd===pwd);
  if(user){
    currentUser=user;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('appShell').style.display='block';
    document.getElementById('userBadge').textContent='👤 '+user.name+' ('+user.role+')';
    buildSidebar();updateSyncInfo();updateSyncBadge();showPage('dashboard');
    if(SCRIPT_URL) loadFromSheet();
    return;
  }
  err.textContent='Invalid email or password. Demo: admin@ghj.org / admin123';
  err.style.display='block';
}

function doLogout(){
  currentUser=null;
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('appShell').style.display='none';
}

// ── SIDEBAR ────────────────────────────────────────────────────────
function buildSidebar(){
  const cr=currentUser.role==='creator';
  const pages=[
    {s:'Main',     p:'dashboard',  i:'📊',l:'Dashboard'},
    {s:'Ledgers',  p:'cash',       i:'💵',l:'Cash Ledger'},
    {s:'',         p:'bank',       i:'🏦',l:'Bank Ledger'},
    {s:'Cash Mgmt',p:'cashalloc',  i:'💸',l:'Cash Allocations',admin:true},
    {s:'',         p:'cashholding',i:'👛',l:'Cash Holdings',   admin:true},
    {s:'Workflow', p:'approvals',  i:'✅',l:'Approvals',       admin:true},
    {s:'',         p:'payments',   i:'💳',l:'Payment Releases',admin:true},
    {s:'Reports',  p:'reports',    i:'📈',l:'Reports / MIS',   admin:true},
    {s:'Settings', p:'settings',   i:'⚙️',l:'Settings',        admin:true},
  ];
  let prev='',html='';
  pages.forEach(p=>{
    if(cr&&p.admin)return;
    if(p.s&&p.s!==prev){html+=`<div class="nav-section">${p.s}</div>`;prev=p.s;}
    html+=`<div class="nav-item" id="nav-${p.p}"><span class="nav-icon">${p.i}</span>${p.l}</div>`;
  });
  html+=`<div class="nav-section" style="margin-top:8px;border-top:1px solid #2a3547;padding-top:8px"></div>`;
  html+=`<div class="nav-item" id="nav-refresh"><span class="nav-icon">🔄</span>Refresh from Sheet</div>`;
  const el=document.getElementById('sidebarNav'); el.innerHTML=html;
  pages.forEach(p=>{const n=document.getElementById('nav-'+p.p);if(n)n.addEventListener('click',()=>showPage(p.p));});
  const ref=document.getElementById('nav-refresh');if(ref)ref.addEventListener('click',loadFromSheet);
  updateActiveNav();
}

function updateActiveNav(){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const a=document.getElementById('nav-'+currentPage);if(a)a.classList.add('active');
}

// ── ROUTING ────────────────────────────────────────────────────────
function showPage(page){
  const restricted=['cashalloc','cashholding','approvals','payments','reports','settings'];
  if(currentUser.role==='creator'&&restricted.includes(page)){showToast('⚠️ No permission.');page='dashboard';}
  currentPage=page;updateActiveNav();
  const mc=document.getElementById('mainContent');
  const map={dashboard:renderDashboard,cash:()=>renderLedger('cash'),bank:()=>renderLedger('bank'),
    cashalloc:renderCashAlloc,cashholding:renderCashHolding,
    approvals:renderApprovals,payments:renderPayments,reports:renderReports,settings:renderSettings};
  mc.innerHTML=(map[page]||renderDashboard)();
}

// ── PERIOD FILTER ──────────────────────────────────────────────────
function getPeriodFn(period){
  const now=new Date(),y=now.getFullYear(),m=now.getMonth();
  if(period==='this_month'){const f=new Date(y,m,1).toISOString().slice(0,10),t=new Date(y,m+1,0).toISOString().slice(0,10);return e=>e.date>=f&&e.date<=t;}
  if(period==='prev_month'){const f=new Date(y,m-1,1).toISOString().slice(0,10),t=new Date(y,m,0).toISOString().slice(0,10);return e=>e.date>=f&&e.date<=t;}
  if(period==='this_year'){const f=y+'-01-01',t=y+'-12-31';return e=>e.date>=f&&e.date<=t;}
  if(period==='last_3m'){const f=new Date(y,m-2,1).toISOString().slice(0,10);return e=>e.date>=f;}
  if(period==='last_6m'){const f=new Date(y,m-5,1).toISOString().slice(0,10);return e=>e.date>=f;}
  return()=>true;
}

function issueAllocation(){
  const toUser=document.getElementById('al_to').value;
  const amount=parseFloat(document.getElementById('al_amount').value);
  const date=document.getElementById('al_date').value;
  const purpose=document.getElementById('al_purpose').value.trim();
  const remarks=document.getElementById('al_remarks').value.trim();
  if(!toUser||!amount||!date||!purpose){alert('Please fill all required fields.');return;}
  const h=computeHoldings();
  const adminBal=h.holdings['Admin']?.balance||0;
  if(amount>adminBal&&!confirm(`⚠️ Admin holds ₹${adminBal.toLocaleString('en-IN')}. Allocating ₹${amount.toLocaleString('en-IN')} creates deficit. Proceed?`)) return;
  const allc=getAllocs();
  const rec={id:genId(),date,toUser,fromUser:currentUser.name,amount,purpose,status:'active',remarks,createdAt:new Date().toISOString(),settledAt:''};
  allc.push(rec);
  saveAllocs(allc);
  showToast(`✅ ₹${amount.toLocaleString('en-IN')} allocated to ${toUser} — syncing to Sheet...`);
  pushAllocToSheet('saveAllocation',rec);
  showPage('cashalloc');
}

function settleAllocation(id){
  const allc=getAllocs();
  const idx=allc.findIndex(a=>a.id===id);if(idx<0)return;
  const remarks=prompt(`Settle: ${allc[idx].toUser} · ₹${allc[idx].amount}\nPurpose: ${allc[idx].purpose}\n\nSettlement remarks:`)||'';
  allc[idx].status='settled';
  allc[idx].settledAt=new Date().toISOString();
  allc[idx].remarks=(allc[idx].remarks?allc[idx].remarks+' | ':'')+'Settled: '+remarks;
  saveAllocs(allc);
  pushAllocToSheet('updateAllocation',allc[idx]);
  showToast('✅ Allocation settled — syncing...');
  showPage('cashalloc');
}

function cancelAllocation(id){
  if(!confirm('Cancel this allocation? (Use only if cash was NOT given.)')) return;
  const allc=getAllocs();
  const idx=allc.findIndex(a=>a.id===id);if(idx<0)return;
  allc[idx].status='cancelled';
  saveAllocs(allc);
  pushAllocToSheet('updateAllocation',allc[idx]);
  showToast('Allocation cancelled.');
  showPage('cashalloc');
}

function filterTable(type){
  const g=id=>(document.getElementById(id)||{}).value||'';
  const from=g('fFrom'),to=g('fTo'),head=g('fHead'),etype=g('fType'),status=g('fStatus'),search=g('fSearch').toLowerCase();
  const d=getData();
  const cr=currentUser.role==='creator';const mn=currentUser.name;
  let entries=cr?d[type].filter(e=>e.createdBy===mn||e.paidByUser===mn):d[type];
  entries=entries.filter(e=>{
    if(from&&e.date<from)return false;if(to&&e.date>to)return false;
    if(head&&e.head!==head)return false;if(etype&&e.type!==etype)return false;
    if(status&&e.status!==status)return false;
    if(search){const hay=[e.desc,e.vendor,e.srno,e.head,e.paidByUser,e.createdBy,String(e.amount)].join(' ').toLowerCase();if(!hay.includes(search))return false;}
    return true;
  });
  const body=document.getElementById('tableBody');if(!body)return;
  if(!entries.length){body.innerHTML='<tr><td colspan="13" style="text-align:center;padding:20px;color:var(--text-muted)">No matching entries.</td></tr>';return;}
  body.innerHTML=entries.slice().sort((a,b)=>b.date>a.date?1:-1).map(e=>`
  <tr style="${e.status==='voided'?'opacity:.45':''}">
    <td style="font-size:10px;color:var(--text-muted)">${e.srno}</td><td>${e.date}</td>
    <td style="font-size:11px">${e.head}</td><td style="font-size:10px">${e.category}</td>
    <td style="max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.desc}</td>
    <td style="color:var(--primary-light);font-size:11px">${e.vendor||'—'}</td>
    <td style="font-size:11px;color:#6c3483;font-weight:500">${e.paidByUser||e.createdBy||'—'}</td>
    ${type==='bank'?`<td style="font-size:10px">${e.bankName||'—'}</td><td style="font-size:10px">${e.chequeRef||'—'}</td>`:''}
    <td><span class="badge badge-${e.type}">${e.type==='debit'?'DR':'CR'}</span></td>
    <td style="font-weight:700;color:${e.type==='debit'?'#c0392b':'#27ae60'}">₹${Number(e.amount).toLocaleString('en-IN')}</td>
    <td>${e.invoiceLink?`<a href="${e.invoiceLink}" target="_blank" class="badge badge-approved" style="text-decoration:none">📎</a>`:''}</td>
    <td><span class="badge badge-${e.status}">${e.status==='voided'?'VOID':e.status.toUpperCase()}</span></td>
    <td>
      ${(currentUser.role==='admin'||(cr&&e.createdBy===currentUser.name))&&e.status==='pending'?`<button class="btn btn-outline btn-sm" onclick="editEntry('${type}','${e.id}')">Edit</button> `:''}
      ${e.status==='approved'&&(currentUser.role==='admin'||currentUser.role==='approver')?`<button class="btn-pay btn-sm" onclick="openPayModal('${type}','${e.id}')">Pay</button> `:''}
      ${currentUser.role==='admin'&&e.status!=='paid'&&e.status!=='voided'?`<button class="btn btn-sm" style="background:#fee;color:#c0392b;border:1px solid #f5c6cb" onclick="voidEntry('${type}','${e.id}')">✕</button>`:''}
    </td>
  </tr>`).join('');
}

function saveEntry(type){
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
  const date=g('f_date'),etype=g('f_type'),paidByUser=g('f_paidby'),head=g('f_head'),
        category=g('f_category'),amount=parseFloat(g('f_amount')),desc=g('f_desc'),vendor=g('f_vendor'),
        invoiceLink=g('f_invoice'),remarks=g('f_remarks');
  if(!date||!head||!amount||!desc||!vendor){alert('Please fill all required fields.');return;}
  if(currentUser.role==='creator'&&etype==='credit'&&!confirm('⚠️ You are recording a Cash CREDIT. Normally Admin records inflows. Proceed?')) return;
  const d=getData(),list=d[type];
  if(editingId){
    const idx=list.findIndex(e=>e.id===editingId);if(idx<0)return;
    list[idx]={...list[idx],date,type:etype,paidByUser,head,category,amount,desc,vendor,invoiceLink,remarks,
      updatedBy:currentUser.name,updatedAt:new Date().toISOString(),
      ...(type==='bank'?{bankName:g('f_bank'),accNo:g('f_accno'),chequeRef:g('f_cheque')}:{})};
    sd('ghj_'+type,list);closeModal();showPage(type);showToast('✅ Entry updated — syncing...');
    pushToSheet('updateEntry',{...list[idx],paytype:type});
  } else {
    const srno='GHJ/'+(type==='cash'?'C':'B')+'/'+String(list.length+1).padStart(4,'0');
    const entry={id:genId(),srno,date,type:etype,paytype:type,paidByUser,head,category,amount,
      desc,vendor,invoiceLink,screenshotLink:'',remarks,status:'pending',
      createdBy:currentUser.name,createdAt:new Date().toISOString(),approvedBy:'',paymentRef:'',
      ...(type==='bank'?{bankName:g('f_bank'),accNo:g('f_accno'),chequeRef:g('f_cheque')}:{})};
    list.push(entry);sd('ghj_'+type,list);
    closeModal();showPage(type);showToast('✅ Entry saved — syncing...');
    pushToSheet('saveEntry',entry);
  }
}

function changeStatus(type,id,status){
  const d=getData(),list=d[type];
  const idx=list.findIndex(e=>e.id===id);if(idx<0)return;
  list[idx].status=status;list[idx].approvedBy=currentUser.name;list[idx].approvedAt=new Date().toISOString();
  sd('ghj_'+type,list);
  pushToSheet('updateStatus',{...list[idx],paytype:type});
  showToast(status==='approved'?'✅ Approved!':'❌ Rejected.');
  showPage('approvals');
}

function voidEntry(type,id){
  if(currentUser.role!=='admin'){showToast('Only Admin can void.');return;}
  const d=getData(),list=d[type];
  const e=list.find(x=>x.id===id);if(!e)return;
  if(e.status==='paid'){showToast('Cannot void a paid entry.');return;}
  const reason=prompt('Reason for voiding (required):');
  if(!reason||!reason.trim()){showToast('Cancelled.');return;}
  const idx=list.findIndex(x=>x.id===id);
  list[idx]={...list[idx],status:'voided',voidedBy:currentUser.name,voidedAt:new Date().toISOString(),voidReason:reason.trim()};
  sd('ghj_'+type,list);
  pushToSheet('updateStatus',{...list[idx],paytype:type,approvedBy:'VOID: '+reason+' by '+currentUser.name});
  showToast('Entry voided.');showPage(currentPage);
}

function renderReports(){

  const mf=reportMode==='all'?allRaw:allRaw.filter(e=>e.paytype===reportMode);
  const filtered=mf.filter(e=>e.status!=='voided'&&periodFn(e));
  const debits=filtered.filter(e=>e.type==='debit');
  const credits=filtered.filter(e=>e.type==='credit');
  const totalDebit=debits.reduce((s,e)=>s+Number(e.amount),0);
  const totalCredit=credits.reduce((s,e)=>s+Number(e.amount),0);
  const h=computeHoldings();

  // Inflow by head (cash credit only, period filtered)
  const inflowByHead={};
  INFLOW_HEADS.forEach(hd=>{inflowByHead[hd]=d.cash.filter(e=>e.head===hd&&e.type==='credit'&&e.status!=='voided'&&periodFn(e)).reduce((s,e)=>s+Number(e.amount),0);});

  <!-- SUMMARY -->
  <div class="card">
    <div class="card-title">📈 Summary · ${PLABEL} · ${reportMode==='all'?'Cash + Bank':reportMode.toUpperCase()}</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px">
      <div class="stat-card" style="border-left-color:#27ae60"><div class="stat-label">Cash Received</div><div class="stat-value" style="color:#27ae60">₹${totalCredit.toLocaleString('en-IN')}</div><div class="stat-sub">${credits.length} entries</div></div>
      <div class="stat-card" style="border-left-color:#c0392b"><div class="stat-label">Bills / Expenses</div><div class="stat-value" style="color:#c0392b">₹${totalDebit.toLocaleString('en-IN')}</div><div class="stat-sub">${debits.length} entries</div></div>
      <div class="stat-card" style="border-left-color:${(totalCredit-totalDebit)>=0?'#27ae60':'#c0392b'}"><div class="stat-label">Net</div><div class="stat-value" style="color:${(totalCredit-totalDebit)>=0?'#27ae60':'#c0392b'}">${(totalCredit-totalDebit)>=0?'+':''}₹${(totalCredit-totalDebit).toLocaleString('en-IN')}</div></div>

    </div>
  </div>`;
}

function corsResp(data){
  return ContentService.createTextOutput(JSON.stringify(data))
    .setMimeType(ContentService.MimeType.JSON);
}

function doGet(e){
  try{
    if(APP_SECRET &amp;&amp; (!e||!e.parameter||e.parameter.secret!==APP_SECRET))
      return corsResp({status:'error',error:'Unauthorized'});
    var ss=SpreadsheetApp.openById(SHEET_ID);
    var type=(e&amp;&amp;e.parameter&amp;&amp;e.parameter.type)||'cash';
    var tabMap={cash:'CashEntries',bank:'BankEntries',users:'Users',allocations:'CashAllocations'};
    var tab=ss.getSheetByName(tabMap[type]||'CashEntries');
    if(!tab) return corsResp({status:'error',error:'Tab not found: '+type});
    return corsResp(tab.getDataRange().getValues());
  }catch(err){return corsResp({status:'error',error:err.message});}
}

function doPost(e){
  try{
    var p=JSON.parse(e.postData.contents);
    if(APP_SECRET &amp;&amp; p._secret!==APP_SECRET)
      return corsResp({status:'error',error:'Unauthorized'});
    var ss=SpreadsheetApp.openById(SHEET_ID);

    // ── REPORT SAVE ───────────────────────────────────────────
    if(p.action==='saveReport'){
      var rt=ss.getSheetByName('Reports');
      if(!rt){
        rt=ss.insertSheet('Reports');
        rt.appendRow(['Generated At','Period','Generated By','Total Cash In',
          'Total Debit','Total Credit','Inflow By Head','Expense By Head',
          'Expense By Category','Holdings By User']);
      }
      rt.appendRow([p.generatedAt,p.period,p.generatedBy,p.totalCashIn,
        p.totalDebit,p.totalCredit,p.inflowByHead,p.expByHead,
        p.expByCat,p.holdingsByUser]);
      return corsResp({status:'ok'});
    }

    // ── CASH ALLOCATION SAVE / UPDATE ─────────────────────────
    if(p.action==='saveAllocation'||p.action==='updateAllocation'){
      var at=ss.getSheetByName('CashAllocations');
      if(!at){
        at=ss.insertSheet('CashAllocations');
        at.appendRow(['ID','Date','ToUser','FromUser','Amount','Purpose',
          'Status','Remarks','CreatedAt','SettledAt']);
      }
      var aData=at.getDataRange().getValues();
      var aIdx=-1;
      for(var i=1;i&lt;aData.length;i++){if(String(aData[i][0])===String(p.id)){aIdx=i;break;}}
      var aRow=[p.id,p.date,p.toUser,p.fromUser,p.amount,p.purpose,
                p.status,p.remarks,p.createdAt,p.settledAt||''];
      if(aIdx>=0) at.getRange(aIdx+1,1,1,aRow.length).setValues([aRow]);
      else at.appendRow(aRow);
      return corsResp({status:'ok'});
    }

    // ── ENTRY OPERATIONS ──────────────────────────────────────
    var tabName=(p.paytype==='cash')?'CashEntries':'BankEntries';
    var tab=ss.getSheetByName(tabName);
    if(!tab){
      tab=ss.insertSheet(tabName);
      tab.appendRow(['ID','SrNo','Date','Head','Category','Type','Amount',
        'Description','Vendor','InvoiceLink','Screenshot','Status','CreatedBy',
        'ApprovedBy','PaymentRef','Remarks','BankName','AccountNo','ChequeRef',
        'PayType','PaymentMode','PaidByUser']);
    }
    var rows=tab.getDataRange().getValues();

    if(p.action==='updateStatus'||p.action==='updateEntry'){
      for(var j=1;j&lt;rows.length;j++){
        if(String(rows[j][0])===String(p.id)){
          if(p.action==='updateStatus'){
            tab.getRange(j+1,12).setValue(p.status||'');
            tab.getRange(j+1,14).setValue(p.approvedBy||'');
            tab.getRange(j+1,15).setValue(p.paymentRef||'');
            if(p.screenshotLink) tab.getRange(j+1,11).setValue(p.screenshotLink);
          } else {
            tab.getRange(j+1,1,1,22).setValues([[p.id,p.srno,p.date,p.head,p.category,
              p.type,p.amount,p.desc,p.vendor,p.invoiceLink,p.screenshotLink,
              p.status,p.createdBy,p.approvedBy,p.paymentRef,p.remarks,
              p.bankName,p.accNo,p.chequeRef,p.paytype,p.paymentMode,p.paidByUser]]);
          }
          return corsResp({status:'ok'});
        }
      }
    }

    // saveEntry — check duplicate first
    for(var k=1;k&lt;rows.length;k++){
      if(String(rows[k][0])===String(p.id))
        return corsResp({status:'ok',note:'duplicate skipped'});
    }
    tab.appendRow([p.id,p.srno,p.date,p.head,p.category,p.type,p.amount,
      p.desc,p.vendor,p.invoiceLink,p.screenshotLink,p.status||'pending',
      p.createdBy,p.approvedBy||'',p.paymentRef||'',p.remarks||'',
      p.bankName||'',p.accNo||'',p.chequeRef||'',p.paytype||'cash',
      p.paymentMode||'',p.paidByUser||'']);
    return corsResp({status:'ok'});
  }catch(err){return corsResp({status:'error',error:err.message});}
}</div>

async function testConnection(){
  const r=document.getElementById('testResult');if(r)r.innerHTML='🔄 Testing...';
  if(!SCRIPT_URL){if(r)r.innerHTML='<span style="color:#c0392b">❌ SCRIPT_URL is not set in the HTML file.</span>';return;}
  try{
    const resp=await fetch(SCRIPT_URL+'?type=cash&secret='+encodeURIComponent(APP_SECRET),{redirect:'follow'});
    const raw=await resp.text();
    if(!raw||raw.trimStart().startsWith('<')) throw new Error('Got HTML — set "Who has access = Anyone" in deployment');
    JSON.parse(raw);
    if(r)r.innerHTML='<span style="color:#27ae60">✅ Connection working!</span>';
    showToast('✅ Connected to Google Sheet!');
  }catch(e){
    if(r)r.innerHTML='<span style="color:#c0392b">❌ '+e.message+'</span>';
    showToast('❌ Connection failed.');
  }
}

async function refreshUsers(){
  if(!SCRIPT_URL){showToast('SCRIPT_URL not set in HTML file.');return;}
  showToast('🔄 Fetching users...');
  try{
    const resp=await fetch(SCRIPT_URL+'?type=users&secret='+encodeURIComponent(APP_SECRET),{redirect:'follow'});
    const raw=await resp.text();
    if(!raw||raw.trimStart().startsWith('<')) throw new Error('HTML response');
    const rows=JSON.parse(raw);
    if(!Array.isArray(rows)||rows.length<2) throw new Error('Empty Users tab');
    const hdr=rows[0].map(h=>String(h).toLowerCase().trim());
    const ei=hdr.indexOf('email'),pi=['password','pwd','pass'].reduce((f,k)=>f>=0?f:hdr.indexOf(k),-1),ni=hdr.indexOf('name'),ri=hdr.indexOf('role');
    if(ei<0||pi<0) throw new Error('Email or Password column not found');
    const users=rows.slice(1).filter(r=>r[ei]).map(r=>({email:String(r[ei]).trim(),pwd:String(r[pi]).trim(),name:ni>=0?String(r[ni]).trim():String(r[ei]).trim(),role:ri>=0?String(r[ri]).trim().toLowerCase():'creator'}));
    USERS=users;sd('ghj_users',USERS);
    showToast('✅ '+USERS.length+' users loaded!');showPage('settings');
  }catch(e){showToast('❌ '+e.message);}
}

function downloadCSV(data,filename){
  if(!data||!data.length){showToast('No data.');return;}
  const keys=Object.keys(data[0]);
  const csv=[keys.join(','),...data.map(row=>keys.map(k=>{const v=String(row[k]===null||row[k]===undefined?'':row[k]);return v.includes(',')||v.includes('"')||v.includes('\n')?'"'+v.replace(/"/g,'""')+'"':v;}).join(','))].join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=filename+'_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast('✅ Downloaded: '+a.download);
}

function downloadEntries(type){
  const d=getData();
  const cr=currentUser.role==='creator';
  const mn=currentUser.name;
  const entries=(cr?d[type].filter(e=>e.createdBy===mn||e.paidByUser===mn):d[type])
    .map(e=>({SrNo:e.srno,Date:e.date,Head:e.head,Category:e.category,DrCr:e.type==='debit'?'DR':'CR',Amount:e.amount,Description:e.desc,Vendor:e.vendor||'',PaidByUser:e.paidByUser||'',CreatedBy:e.createdBy||'',Status:e.status,PaymentRef:e.paymentRef||'',ApprovedBy:e.approvedBy||'',InvoiceLink:e.invoiceLink||'',ScreenshotLink:e.screenshotLink||''}));
  downloadCSV(entries,'GHJ_'+type+'_entries');
}
