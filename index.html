<!DOCTYPE html>

<title>GHJ Exp App</title>
<style>
  :root {
    --primary:#1a5276;--primary-light:#2980b9;--accent:#e67e22;--accent-light:#f39c12;
    --success:#27ae60;--danger:#c0392b;--warn:#d4ac0d;--bg:#f4f6f8;--card:#ffffff;
    --border:#dce3ea;--text:#1c2833;--text-muted:#7f8c8d;--sidebar-w:260px;--header-h:64px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
  #loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a5276 0%,#154360 50%,#0d2137 100%);}
  .login-box{background:#fff;border-radius:16px;padding:40px 36px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.3);text-align:center;}
  .login-title{font-size:22px;font-weight:700;color:var(--primary);margin-bottom:4px;}
  .login-sub{font-size:12px;color:var(--text-muted);margin-bottom:28px;}
  .form-group{margin-bottom:16px;text-align:left;}
  .form-group label{font-size:12px;font-weight:600;color:var(--text-muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
  .form-group input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;color:var(--text);}
  .btn-primary{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;}
  .btn-primary:hover{background:var(--primary-light);}
  .login-error{color:var(--danger);font-size:12px;margin-top:8px;display:none;}
  #appShell{display:none;min-height:100vh;}
  .header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2);}
  .header-left{display:flex;align-items:center;gap:12px;}
  .header-title{font-size:18px;font-weight:700;}
  .header-title span{color:var(--accent-light);}
  .header-right{display:flex;align-items:center;gap:12px;}
  .user-badge{background:rgba(255,255,255,.15);border-radius:20px;padding:5px 12px;font-size:13px;}
  .btn-logout{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;}
  .sidebar{position:fixed;top:var(--header-h);left:0;width:var(--sidebar-w);bottom:0;background:#1a2537;overflow-y:auto;z-index:50;padding:16px 0;}
  .nav-section{padding:6px 16px 4px;font-size:10px;font-weight:700;color:#5d7499;text-transform:uppercase;letter-spacing:1px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:#9cb2cc;cursor:pointer;font-size:13px;transition:all .2s;border-left:3px solid transparent;}

  .nav-icon{font-size:16px;width:20px;text-align:center;}
  .nav-badge{background:var(--accent);color:#fff;border-radius:10px;padding:2px 7px;font-size:10px;margin-left:auto;}
  .main{margin-left:var(--sidebar-w);margin-top:var(--header-h);padding:24px;min-height:calc(100vh - var(--header-h));}

  .card-title{font-size:15px;font-weight:700;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px;}

  thead th{background:#f0f4f8;padding:10px 12px;text-align:left;font-weight:700;color:var(--text-muted);font-size:11px;text-transform:uppercase;border-bottom:2px solid var(--border);}

  .badge-rejected{background:#fdedec;color:#922b21;}
  .badge-paid{background:#eaf0fb;color:#1a5276;}
  .badge-voided{background:#f0f0f0;color:#888;}

  .modal-bg.open{display:flex;}
  .modal{background:#fff;border-radius:14px;padding:28px;width:640px;max-width:95vw;max-height:90vh;overflow-y:auto;}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}

  #toast{position:fixed;bottom:24px;right:24px;background:#1a2537;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;z-index:500;display:none;box-shadow:0 4px 12px rgba(0,0,0,.2);}
  .filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px;background:#fff;padding:14px 16px;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
  .filter-bar .form-group{margin:0;min-width:140px;}
  .pipeline{display:flex;gap:0;margin-bottom:20px;}
  .pipe-step{flex:1;padding:10px 14px;background:#ecf0f1;text-align:center;font-size:11px;font-weight:700;color:var(--text-muted);position:relative;}
  .pipe-step:not(:last-child)::after{content:'';position:absolute;right:-10px;top:0;bottom:0;width:20px;background:inherit;clip-path:polygon(0 0,calc(100% - 5px) 50%,0 100%);z-index:1;}
  .pipe-step.active{background:var(--primary);color:#fff;}
  .pipe-step.done{background:var(--success);color:#fff;}
  .pipe-step:first-child{border-radius:6px 0 0 6px;}
  .pipe-step:last-child{border-radius:0 6px 6px 0;}
  /* Holding card */
  .holding-card{border-radius:10px;padding:14px;margin-bottom:10px;border:1.5px solid var(--border);}
  .holding-card.positive{border-color:#27ae60;background:#f0fff4;}
  .holding-card.zero{border-color:#bdc3c7;background:#f8f9fa;}
  .holding-card.negative{border-color:#c0392b;background:#fff5f5;}
  @media(max-width:768px){
    .sidebar{display:none!important;}
    .main{margin-left:0!important;padding:12px!important;}
    .stats-row{grid-template-columns:repeat(2,1fr)!important;}
    .form-row.col2,.form-row.col3,.form-row.col4{grid-template-columns:1fr!important;}
    .modal{width:100vw!important;max-width:100vw!important;border-radius:16px 16px 0 0!important;position:fixed;bottom:0;left:0;right:0;margin:0;}
    .modal-bg.open{align-items:flex-end!important;}
  }
</style>

let USERS = (function(){

function loadData(k){ try{return JSON.parse(localStorage.getItem(k))||[];}catch{return[];} }

// ── Image compression & Drive upload ─────────────────────────────────────────
const COMPRESS_CONFIG = { maxWidth:1200, maxHeight:1600, quality:0.65, mimeOut:'image/jpeg' };
function b64SizeKB(b64){ return Math.round(b64.length*0.75/1024); }

async function fileToBase64(file){
  if(!file.type.startsWith('image/')){
    return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
  }
  return new Promise((res,rej)=>{
    const img=new Image(), objUrl=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(objUrl);
      let {width,height}=img;
      const ratio=Math.min(COMPRESS_CONFIG.maxWidth/width,COMPRESS_CONFIG.maxHeight/height);
      if(ratio<1){width=Math.round(width*ratio);height=Math.round(height*ratio);}
      const canvas=document.createElement('canvas');
      canvas.width=width; canvas.height=height;
      const ctx=canvas.getContext('2d');
      ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,width,height);
      ctx.drawImage(img,0,0,width,height);
      res(canvas.toDataURL(COMPRESS_CONFIG.mimeOut,COMPRESS_CONFIG.quality).split(',')[1]);
    };
    img.onerror=()=>{URL.revokeObjectURL(objUrl);rej(new Error('Image load failed'));};
    img.src=objUrl;
  });
}

// Folder: GHJ Exp App/Cash|Bank/Invoices|Payments
// File:   Cash_Inv_VendorName_EntryID.jpg
async function uploadFileToDrive(file, fieldId, paytype, entryId, vendor){
  const url=getScriptUrl();
  if(!url){showToast('⚠️ No Apps Script URL. Set in Settings.',4000);return null;}
  const secret=APP_CONFIG.appSecret||localStorage.getItem('ghj_app_secret')||'';

  // Show progress bar
  const progressId='upload_progress_'+fieldId;
  let progressEl=document.getElementById(progressId);
  if(!progressEl){
    progressEl=document.createElement('div');
    progressEl.id=progressId;
    progressEl.style.cssText='margin-top:6px;background:#ecf0f1;border-radius:4px;height:8px;overflow:hidden;display:none';
    progressEl.innerHTML='<div id="'+progressId+'_bar" style="height:8px;background:var(--primary);width:0%;transition:width 0.3s;border-radius:4px"></div>';
    const previewId = fieldId==='invoice' ? 'f_invoice_preview' : 'pay_ss_preview';
    const container = document.getElementById(previewId);
    if(container && container.parentElement) container.parentElement.appendChild(progressEl);
  }
  progressEl.style.display='block';
  const bar=document.getElementById(progressId+'_bar');
  if(bar) bar.style.width='10%';

  try{
    // Compress if image
    const originalKB=Math.round(file.size/1024);
    if(bar) bar.style.width='30%';
    const base64=await fileToBase64(file);
    const compKB=b64SizeKB(base64);
    const isImage=file.type.startsWith('image/');
    if(bar) bar.style.width='60%';

    // Build folder and filename
    const typeFolder=paytype==='bank'?'Bank':'Cash';
    const docFolder=fieldId==='invoice'?'Invoices':'Payments';
    const folderPath='GHJ Exp App/'+typeFolder+'/'+docFolder;
    const vendorClean=(vendor||'NoVendor').replace(/[^a-zA-Z0-9]/g,'_').substring(0,20);
    const ext=isImage?'.jpg':'.'+file.name.split('.').pop();
    const prefix=typeFolder+'_'+(fieldId==='invoice'?'Inv':'Pay');
    const fileName=prefix+'_'+vendorClean+'_'+(entryId||Date.now())+ext;
    const mimeType=isImage?COMPRESS_CONFIG.mimeOut:(file.type||'application/octet-stream');

    if(bar) bar.style.width='75%';

    const resp=await fetch(url,{method:'POST',redirect:'follow',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'uploadFile',_secret:secret,
        fileName,mimeType,base64Data:base64,folder:folderPath})});

    if(bar) bar.style.width='90%';
    const raw=await resp.text();

    if(!raw||raw.trimStart().startsWith('<')) throw new Error('Apps Script returned HTML — check deployment');
    const r=JSON.parse(raw);
    if(r.status==='error') throw new Error(r.error||'Upload error');
    if(!r.link) throw new Error('No Drive link returned');

    if(bar){ bar.style.width='100%'; bar.style.background='#27ae60'; }
    setTimeout(()=>{ if(progressEl) progressEl.style.display='none'; },2000);

    const sizeMsg=isImage&&originalKB>compKB
      ?'✅ Uploaded ('+compKB+'KB, saved '+(originalKB-compKB)+'KB by compression)'
      :'✅ Uploaded '+fileName+' ('+compKB+'KB)';
    showToast(sizeMsg,5000);
    return r.link;

  }catch(e){
    if(bar){ bar.style.width='100%'; bar.style.background='#c0392b'; }
    setTimeout(()=>{ if(progressEl) progressEl.style.display='none'; },3000);
    console.error('Upload error:',e);
    showToast('⚠️ Upload failed: '+e.message+'\nCheck Apps Script is redeployed.',5000);
    return null;
  }
}

async function handleFileUpload(inputEl, linkFieldId, fieldId, paytype){
  const file=inputEl.files[0]; if(!file) return;

  // Find the label button and update it
  const label=inputEl.closest('label')||inputEl.parentElement;
  const origText=label.childNodes[0]?label.childNodes[0].textContent:'📎 Upload';
  if(label){ label.childNodes[0].textContent='⏳ Uploading…'; }

  const entryId=(document.getElementById('f_entry_id')||{}).value||Date.now();
  const vendor=(document.getElementById('f_vendor')||{}).value||'';

  const link=await uploadFileToDrive(file, fieldId, paytype, entryId, vendor);

  // Restore button text
  if(label){ label.childNodes[0].textContent=link?'✅ Uploaded':'📎 Retry'; }

  if(link){
    const linkEl=document.getElementById(linkFieldId);
    if(linkEl) linkEl.value=link;
    // Show preview link below the button
    let preview=document.getElementById(linkFieldId+'_preview');
    if(!preview){

      preview.id=linkFieldId+'_preview';

    preview.innerHTML='<a href="'+link+'" target="_blank" style="font-size:11px;color:var(--primary);display:inline-block;margin-top:4px">🔗 View in Google Drive</a>';
  }
  inputEl.value='';
}

async function doLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const pwd   = document.getElementById('loginPwd').value;
  const errEl = document.getElementById('loginErr');
  const btn   = document.querySelector('.btn-primary');
  errEl.style.display='none';

  if(!email||!pwd){
    errEl.textContent='Please enter email and password.';
    errEl.style.display='block'; return;
  }

  const url    = getScriptUrl(); // uses localStorage first, then APP_CONFIG
  // CRITICAL: check localStorage first — this is where Settings UI saves the secret
  const secret = localStorage.getItem('ghj_app_secret') || APP_CONFIG.appSecret || '';

  btn.textContent='Signing in…'; btn.disabled=true;
  errEl.style.display='none';

  // ── Step 1: Try to fetch users from Sheet and verify login ────────────────
  if(url){
    try{
      const fetchUrl = url+'?type=users'+(secret?'&secret='+encodeURIComponent(secret):'');
      const resp = await fetch(fetchUrl, {redirect:'follow'});
      const raw  = await resp.text();

      if(!raw||raw.trimStart().startsWith('<')){
        throw new Error('Apps Script returned HTML — check URL and deployment');
      }
      const parsed = JSON.parse(raw);
      if(parsed && parsed.status==='error'){
        throw new Error('Sheet error: '+(parsed.error||'Unauthorized — check secret token'));
      }
      if(Array.isArray(parsed)&&parsed.length>1){
        const hdr = parsed[0].map(h=>String(h||'').toLowerCase().trim());
        const ni=hdr.indexOf('name');
        const ei=['email','e-mail','mail'].reduce((f,k)=>f>=0?f:hdr.indexOf(k),-1);
        const pi=['password','pwd','pass'].reduce((f,k)=>f>=0?f:hdr.indexOf(k),-1);
        const ri=hdr.indexOf('role');
        if(ei>=0&&pi>=0){
          const sheetUsers=parsed.slice(1)
            .filter(r=>r[ei]&&String(r[ei]).includes('@'))
            .map(r=>({
              name:  ni>=0?String(r[ni]||'').trim():String(r[ei]).split('@')[0],
              email: String(r[ei]).trim(),
              pwd:   pi>=0?String(r[pi]||'').trim():'',
              role:  ri>=0?String(r[ri]||'creator').trim().toLowerCase():'creator'
            })).filter(u=>u.email&&u.pwd);
          if(sheetUsers.length){
            USERS=sheetUsers;
            localStorage.setItem('ghj_users',JSON.stringify(USERS));
            reloadUsers();
            console.log('✅ Verified '+sheetUsers.length+' users from Sheet');
          }
        }
      }
    }catch(sheetErr){
      console.warn('Sheet login check failed:',sheetErr.message);
      // Don't block login — fall back to cached users
      // But show a warning so the user knows what happened
      errEl.textContent='⚠️ Could not reach Sheet ('+sheetErr.message+') — trying cached users…';
      errEl.style.color='#e67e22';
      errEl.style.display='block';
      await new Promise(r=>setTimeout(r,1200));
      errEl.style.display='none';
      errEl.style.color='';
    }
  }

  btn.textContent='Sign In'; btn.disabled=false;

  // ── Step 2: Verify credentials against (now updated) USERS list ───────────
  const user = USERS.find(u=>
    u.email.toLowerCase().trim()===email.toLowerCase().trim() && u.pwd===pwd
  );

  if(user){
    currentUser=user;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('appShell').style.display='block';
    document.getElementById('userBadge').textContent='👤 '+user.name+' ('+user.role+')';
    buildSidebar();

    if(url){
      // Show loading screen while fetching all data from Sheet
      const mc=document.getElementById('mainContent');
      mc.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px">'
        +'<div style="font-size:48px">⏳</div>'
        +'<div style="font-size:18px;font-weight:700;color:var(--primary)">Loading data from Google Sheet…</div>'
        +'<div style="font-size:13px;color:var(--text-muted)">Fetching cash, bank and allocation data</div>'
        +'<div id="login_load_msg" style="font-size:12px;color:#e67e22;margin-top:8px"></div>'
        +'</div>';
      loadFromSheet().then(function(){
        updateBadges(); updateSyncTimeDisplay(); showPage('dashboard');
      }).catch(function(err){
        const el=document.getElementById('login_load_msg');
        if(el) el.textContent='⚠️ Sheet unreachable — showing cached data.';
        setTimeout(function(){ updateBadges(); updateSyncTimeDisplay(); showPage('dashboard'); },1500);
      });
    } else {
      updateBadges(); updateSyncTimeDisplay(); showPage('dashboard');
    }
    return;
  }

  // Login failed — tell user exactly why
  if(USERS===DEFAULT_USERS||!localStorage.getItem('ghj_users')){
    errEl.textContent='⚠️ Using demo users only. If you have a Sheet, check URL and Secret in Settings, then try again. Demo: admin@ghj.org / admin123';
  } else {
    errEl.textContent='❌ Invalid email or password. Check your credentials.';
  }
  errEl.style.display='block';
}

function clearAllCacheAndReload(){
  if(!confirm(
    'Clear locally cached data and reload?\n\n' +
    'This will remove cash entries, bank entries, sync queue\n' +
    'from browser storage. Your Google Sheet data is safe.\n\n' +
    'Your Sheet URL, Secret, and User accounts will be kept.\n' +
    'Fresh data will load from Sheet on next login.'
  )) return;

  // Keys to KEEP — everything needed to reconnect to Sheet
  const keysToKeep = [
    'ghj_api_url',      // Apps Script URL
    'ghj_sheet_id',     // Sheet ID
    'ghj_app_secret',   // Security token
    'ghj_users',        // User accounts — MUST keep so real login works after clear
    'ghj_last_sheet_sync' // Sync timestamp
  ];

  // Remove only data keys, not config keys
  const toRemove = [];
  for(let i=0; i<localStorage.length; i++){
    const k = localStorage.key(i);
    if(!keysToKeep.includes(k)) toRemove.push(k);
  }
  toRemove.forEach(k => localStorage.removeItem(k));

  showToast('✅ Cache cleared — reloading…', 2000);
  setTimeout(() => location.reload(), 1500);
}

function getScriptUrl(){ return APP_CONFIG.scriptUrl||localStorage.getItem('ghj_api_url')||''; }


function computeCashHoldings() {
  const d    = getData();
  const cash = d.cash.filter(e => e.status !== 'voided');

  // Only known registered users — no unknowns ever
  const validUser = name => name && USERS.some(u => u.name === name.trim());

  // Per-person ledger: built ENTIRELY from CashEntries — single source of truth
  const bl = {};
  USERS.forEach(u => {
    bl[u.name] = { income:0, expense:0, transferOut:0, transferIn:0, balance:0 };
  });

  cash.forEach(e => {
    const holder = (e.createdBy || '').trim();
    if (!validUser(holder)) return;  // skip unknown creators
    const amt = Number(e.amount) || 0;
    if (!amt) return;

    const txn = e.txnType
      || (e.type === 'credit' ? 'Income(Inflow)' : 'Expense(Outflow)');

    if (txn === 'Income(Inflow)') {
      bl[holder].income  += amt;
      bl[holder].balance += amt;

    } else if (txn === 'Expense(Outflow)') {
      bl[holder].expense  += amt;
      bl[holder].balance  -= amt;

    } else if (txn === 'Transfer') {
      // Transfer is NOT income, NOT expense — it is a custody movement
      // transferTo = the person receiving cash (selected from USERS dropdown)
      // Also check vendor field as fallback (some entries stored it there)
      const rawReceiver = e.transferTo || e.vendor || '';
      const receiver = rawReceiver.trim();
      bl[holder].transferOut += amt;
      bl[holder].balance     -= amt;
      // Try exact match first, then case-insensitive match
      let receiverKey = receiver;
      if (!validUser(receiverKey)) {
        const found = USERS.find(u => u.name.trim().toLowerCase() === receiver.toLowerCase());
        receiverKey = found ? found.name : '';
      }
      if (receiverKey) {
        bl[receiverKey].transferIn += amt;
        bl[receiverKey].balance    += amt;
      }
    }
    // Any other txnType: ignore
  });

  // Build holdings map — only USERS, sorted by role
  const holdings = {};
  USERS.forEach(u => {
    const b = bl[u.name];
    holdings[u.name] = {
      income:      b.income,
      expense:     b.expense,
      transferOut: b.transferOut,
      transferIn:  b.transferIn,
      balance:     b.balance,
      role:        u.role
    };
  });

  const totalCashIn  = USERS.reduce((s,u) => s + bl[u.name].income, 0);
  const totalHolding = USERS.reduce((s,u) => s + Math.max(0, bl[u.name].balance), 0);

  return { holdings, totalCashIn, totalHolding };
}

async function pushToSheet(action,data){
  const url=getScriptUrl();
  const secret=APP_CONFIG.appSecret||localStorage.getItem('ghj_app_secret')||'';
  const payload={
    action, _secret:secret,
    // Maps exactly to Google Sheet column names
    // ── CashEntries columns ────────────────────────────────────
    id:            data.id||'',           // A: ID (Auto)
    createdAt:     data.createdAt||new Date().toISOString(), // B: TimeStamp (Auto)
    createdBy:     data.createdBy||'',    // C: CreatedBy (login user)
    txnType:       data.txnType||'',      // D: EntryType: Income(Inflow)/Transfer/Expense(Outflow)
    srno:          data.srno||'',         // E: SrNo
    date:          data.date||'',         // F: Date
    head:          data.head||'',         // G: Head
    category:      data.category||'',     // H: Category
    vendor:        data.vendor||'',       // I: ReceivedBy/VendorName
    amount:        Number(data.amount)||0,// J: Amount
    desc:          data.desc||'',         // K: Description
    invoiceLink:   data.invoiceLink||'',  // L: InvoiceLink
    screenshotLink:data.screenshotLink||'',// M: ScreenShot
    status:        data.status||'pending',// N: Status
    approvedBy:    data.approvedBy||'',   // O: ApprovedBy
    paymentRef:    data.paymentRef||'',   // P: PaymentRef
    remarks:       data.remarks||'',      // Q: Remarks
    // R: Type = 'cash' (auto-set on server)
    paytype:       data.paytype||'cash',
    type:          data.type||'debit',    // debit/credit (for bank entries)
    // ── BankEntries extra columns ──────────────────────────────
    bankName:      data.bankName||'',     // Q: BankName
    accNo:         data.accNo||'',        // R: AccountNo
    chequeRef:     data.chequeRef||'',    // S: ChequeRef
    // ── Transfer destination ───────────────────────────────────
    transferTo:    data.transferTo||'',
    paidByUser:    data.paidByUser||''
  };
  if(!url){addToQueue(payload);return;}
  try{
    const resp=await fetch(url,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
    const raw=await resp.text();
    if(!raw||raw.trimStart().startsWith('<')) throw new Error('HTML response — fix deployment');
    const r=JSON.parse(raw);
    if(r.status==='ok'){removeFromQueue(payload.id);updateSyncBadge();showToast('✅ Saved to Google Sheets!');}
    else throw new Error(r.error||'Script error');
  }catch(e){addToQueue(payload);showToast('⚠️ Saved locally: '+e.message);}
}

async function loadFromSheet(){
  const url=getScriptUrl(); if(!url) return;
  // CRITICAL: use secret from BOTH sources — localStorage takes priority over hardcoded
  const secret = localStorage.getItem('ghj_app_secret') || APP_CONFIG.appSecret || '';
  const startTime=Date.now();
  try{
    // ── Load Users FIRST so login works with real accounts ──────────────────
    try{
      const uResp=await fetch(url+'?type=users'+(secret?'&secret='+encodeURIComponent(secret):''),{redirect:'follow'});
      const uRaw=await uResp.text();
      if(uRaw&&!uRaw.trimStart().startsWith('<')&&!uRaw.includes('"error"')){
        const uRows=JSON.parse(uRaw);
        if(Array.isArray(uRows)&&uRows.length>1){
          const uh=uRows[0].map(h=>String(h||'').toLowerCase().trim());
          const ui=k=>uh.indexOf(k);
          const ni=ui('name'), ei=['email','e-mail'].reduce((f,k)=>f>=0?f:ui(k),-1);
          const pi=['password','pwd','pass'].reduce((f,k)=>f>=0?f:ui(k),-1), ri=ui('role');
          const sheetUsers=uRows.slice(1).filter(r=>r[ei>=0?ei:1]&&String(r[ei>=0?ei:1]).includes('@')).map(r=>({
            name:  ni>=0?String(r[ni]||'').trim():String(r[0]||'').trim(),
            email: String(r[ei>=0?ei:1]||'').trim(),
            pwd:   pi>=0?String(r[pi]||'').trim():'',
            role:  ri>=0?String(r[ri]||'creator').trim().toLowerCase():'creator'
          })).filter(u=>u.email);
          if(sheetUsers.length){
            USERS=sheetUsers;
            localStorage.setItem('ghj_users',JSON.stringify(USERS));
            reloadUsers();
            console.log('Loaded '+USERS.length+' users from Sheet');
          }
        }
      }
    }catch(ue){console.warn('User load failed:',ue.message);}

    // ── Load Cash + Bank ledger entries ─────────────────────────────────────
    for(const type of['cash','bank']){
      const resp=await fetch(url+'?type='+type+(secret?'&secret='+encodeURIComponent(secret):''),{redirect:'follow'});
      const raw=await resp.text();
      if(!raw||raw.trimStart().startsWith('<')||raw.includes('"error"')) continue;
      const rows=JSON.parse(raw);
      if(!Array.isArray(rows)||rows.length<2) continue;

      // Use header row to find column positions — robust to any column order
      const hdr=rows[0].map(h=>String(h||'').toLowerCase().replace(/[^a-z0-9]/g,''));
      const col=k=>{const i=hdr.indexOf(k);return i>=0?i:-1;};
      const sv=(r,k,fb)=>{const i=col(k);return String(i>=0&&r[i]!=null?r[i]:r[fb]!=null?r[fb]:'');};
      const nv=(r,k,fb)=>{const i=col(k);return parseFloat(i>=0&&r[i]!=null?r[i]:r[fb]!=null?r[fb]:0)||0;};

      let entries;
      if(type==='cash'){
        entries=rows.slice(1)
          .filter(r=>r[0]&&String(r[0]).startsWith('GHJ')&&sv(r,'status',13).toLowerCase()!=='stub')
          .map(r=>{
            const entryType=sv(r,'entrytype',3);
            const isInflow  = entryType==='Income(Inflow)';
            const isTransfer= entryType==='Transfer';
            return {
              id:           sv(r,'idauto',0)||sv(r,'id',0),
              createdAt:    sv(r,'timestampauto',1),
              createdBy:    sv(r,'createdby',2),
              txnType:      entryType,
              srno:         sv(r,'srno',4),
              date:         sv(r,'date',5),
              head:         sv(r,'head',6),
              category:     sv(r,'category',7),
              vendor:       sv(r,'receivedbyvndorname',8)||sv(r,'vendor',8),
              amount:       nv(r,'amount',9),
              desc:         sv(r,'description',10),
              invoiceLink:  sv(r,'invoicelink',11),
              screenshotLink:sv(r,'screenshot',12),
              status:       sv(r,'status',13)||'pending',
              approvedBy:   sv(r,'approvedby',14),
              paymentRef:   sv(r,'paymentref',15),
              remarks:      sv(r,'remarks',16),
              type:         isInflow?'credit':'debit',
              paytype:      'cash',
              paidByUser:   sv(r,'createdby',2),
              transferTo:   isTransfer?(sv(r,'receivedbyvndorname',8)||sv(r,'vendor',8)):''
            };
          });
      } else {
        entries=rows.slice(1)
          .filter(r=>r[0]&&String(r[0]).startsWith('GHJ')&&sv(r,'status',11).toLowerCase()!=='stub')
          .map(r=>({
            id:           sv(r,'id',0),
            srno:         sv(r,'srno',1),
            date:         sv(r,'date',2),
            head:         sv(r,'head',3),
            category:     sv(r,'category',4),
            type:         sv(r,'type',5)||'debit',
            amount:       nv(r,'amount',6),
            desc:         sv(r,'description',7),
            vendor:       sv(r,'vendor',8),
            invoiceLink:  sv(r,'invoicelink',9),
            screenshotLink:sv(r,'screenshot',10),
            status:       sv(r,'status',11)||'pending',
            createdBy:    sv(r,'createdby',12),
            approvedBy:   sv(r,'approvedby',13),
            paymentRef:   sv(r,'paymentref',14),
            remarks:      sv(r,'remarks',15),
            bankName:     sv(r,'bankname',16),
            accNo:        sv(r,'accountno',17),
            chequeRef:    sv(r,'chequeref',18),
            paytype:      'bank'
          }));
      }
      // Merge with pending queue (local unsaved entries take priority)
      const queuedIds=new Set(getPendingQueue().map(q=>q.id));
      const merged=entries.filter(e=>!queuedIds.has(e.id));
      merged.push(...getPendingQueue().filter(q=>q.paytype===type));
      saveData('ghj_'+type, merged);
      console.log('Loaded '+merged.length+' '+type+' entries from Sheet');
    }

    // Load Cash Allocations from Sheet (CashMgmt tab)
    try{
      const aResp=await fetch(url+'?type=cashalloc'+(secret?'&secret='+encodeURIComponent(secret):''),{redirect:'follow'});
      const aRaw=await aResp.text();
      if(aRaw&&!aRaw.trimStart().startsWith('<')){
        const aRows=JSON.parse(aRaw);
        if(Array.isArray(aRows)&&aRows.length>1){
          const ah=aRows[0].map(h=>String(h).toLowerCase().trim());
          const ai=k=>ah.indexOf(k);
          const allocs=aRows.slice(1).filter(r=>r[ai('id')]||r[0]).map(r=>({
            id:String(r[ai('id')]||r[0]||''),
            date:String(r[ai('date')]||r[1]||''),
            toUser:String(r[ai('touser')]||r[2]||''),
            fromUser:String(r[ai('fromuser')]||r[3]||''),
            amount:parseFloat(r[ai('amount')]||r[4]||0),
            purpose:String(r[ai('purpose')]||r[5]||''),
            status:String(r[ai('status')]||r[6]||'active'),
            remarks:String(r[ai('remarks')]||r[7]||''),
            createdAt:String(r[ai('createdat')]||r[8]||'')
          }));
          if(allocs.length>0){
            saveCashAllocations(allocs);
            console.log('Loaded '+allocs.length+' allocations from Sheet');
          }
        }
      }
    }catch(ae){console.warn('Alloc load failed:',ae.message);}

    // Record last sync timestamp
    const syncTime=new Date().toISOString();
    localStorage.setItem('ghj_last_sheet_sync',syncTime);
    updateSyncTimeDisplay();

    const elapsed=((Date.now()-startTime)/1000).toFixed(1);
    showToast('✅ Synced from Sheet in '+elapsed+'s');
    showPage(currentPage);
  }catch(e){showToast('⚠️ Refresh failed: '+e.message);}
}

function updateSyncTimeDisplay(){
  const ts=localStorage.getItem('ghj_last_sheet_sync');
  const el=document.getElementById('lastSyncDisplay');
  if(!el) return;
  if(!ts){ el.textContent=''; return; }
  const d=new Date(ts);
  const pad=n=>String(n).padStart(2,'0');
  el.textContent='Last sync: '+d.toLocaleDateString('en-IN')+' '+pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
}

// Sync queue
function getPendingQueue(){try{return JSON.parse(localStorage.getItem('ghj_sync_queue')||'[]');}catch{return[];}}
function savePendingQueue(q){try{localStorage.setItem('ghj_sync_queue',JSON.stringify(q));}catch{}}
function addToQueue(e){const q=getPendingQueue().filter(x=>x.id!==e.id);q.push({...e,_at:new Date().toISOString()});savePendingQueue(q);updateSyncBadge();}
function removeFromQueue(id){savePendingQueue(getPendingQueue().filter(e=>e.id!==id));updateSyncBadge();}
function updateSyncBadge(){
  const q=getPendingQueue(),b=document.getElementById('syncBadge');if(!b)return;
  if(q.length>0){b.textContent=q.length+' unsynced';b.style.display='inline-block';b.style.background='#e67e22';}
  else{b.style.display='none';}
}
async // Add entry to sync queue with full data
function addToSyncQueue(entry) {
  const q = getPendingQueue();
  // Remove duplicate if exists
  const idx = q.findIndex(x => x.id === entry.id);
  if (idx >= 0) q.splice(idx, 1);
  q.push(entry);
  localStorage.setItem('ghj_sync_queue', JSON.stringify(q));
  updateSyncBadge();
}

async function retrySyncQueue(){
  const url=getScriptUrl();if(!url||!getPendingQueue().length)return;
  const secret=APP_CONFIG.appSecret||localStorage.getItem('ghj_app_secret')||'';
  showToast('🔄 Retrying sync...');let n=0;
  for(const e of[...getPendingQueue()]){
    try{
      const payload={...e,_secret:secret};
      const r=await fetch(url,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
      const raw=await r.text();
      if(raw&&!raw.trimStart().startsWith('<')){const res=JSON.parse(raw);if(res.status==='ok'){removeFromQueue(e.id);n++;}}
    }catch{}
  }
  if(n>0){showToast('✅ '+n+' item(s) synced!');showPage(currentPage);}
}

  let prevS='',html='';
  pages.forEach(p=>{
    if(isCreator&&p.admin) return;
    if(p.s&&p.s!==prevS){html+=`<div class="nav-section">${p.s}</div>`;prevS=p.s;}
    html+=`<div class="nav-item" id="nav-${p.p}" data-page="${p.p}"><span class="nav-icon">${p.i}</span>${p.l}</div>`;
  });
  html+=`<div class="nav-section" style="margin-top:8px;border-top:1px solid #2a3547;padding-top:8px"></div>`;
  html+=`<div class="nav-item" id="nav-refresh"><span class="nav-icon">🔄</span>Refresh from Sheet</div>`;
  el.innerHTML=html;
  pages.forEach(p=>{
    const el2=document.getElementById('nav-'+p.p);
    if(el2) el2.addEventListener('click',()=>showPage(p.p));
  });
  const ref=document.getElementById('nav-refresh');
  if(ref) ref.addEventListener('click',()=>loadFromSheet());
  updateActiveNav();
}

function updateActiveNav(){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const a=document.getElementById('nav-'+currentPage);if(a)a.classList.add('active');
}

function updateBadges(){
  const d=getData();
  const pending=[...d.cash,...d.bank].filter(e=>e.status==='pending').length;
  updateSyncBadge();
}

//  ROUTING
// ══════════════════════════════════════════════════════════
function showPage(page){
  const restricted=['cashalloc','cashholding','approvals','payments','reports','settings'];
  if(currentUser.role==='creator'&&restricted.includes(page)){showToast('⚠️ No permission.');page='dashboard';}
  currentPage=page; updateActiveNav();
  const mc=document.getElementById('mainContent');
  const pages={dashboard:renderDashboard,cash:()=>renderLedger('cash'),bank:()=>renderLedger('bank'),
    cashalloc:renderCashAlloc,cashholding:renderCashHolding,approvals:renderApprovals,
    payments:renderPayments,reports:renderReports,settings:renderSettings};
  mc.innerHTML=(pages[page]||renderDashboard)();
  updateBadges();
}

              +' <button class="btn btn-sm" style="background:#fee;color:#c0392b;border:1px solid #f5c6cb" data-aid="'+a.id+'" onclick="cancelAllocation(this.dataset.aid)">✕</button>'
            : '—')+'</td>'

async function saveAllocationToSheet(rec){
  const url=getScriptUrl();
  if(!url){ addAllocToSyncQueue(rec); return; }
  const secret=APP_CONFIG.appSecret||localStorage.getItem('ghj_app_secret')||'';
  try{
    const resp=await fetch(url,{method:'POST',redirect:'follow',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'saveAllocation',_secret:secret,...rec})});
    const raw=await resp.text();
    if(raw&&!raw.trimStart().startsWith('<')){
      const r=JSON.parse(raw);
      if(r.status==='ok'){
        // Mark this alloc as synced in localStorage
        const allc=getCashAllocations();
        const idx=allc.findIndex(a=>a.id===rec.id);
        if(idx>=0){ allc[idx]._synced=true; saveCashAllocations(allc); }
        const confirmEl=document.getElementById('alloc_save_confirm');
        if(confirmEl){
          confirmEl.style.display='block';
          confirmEl.innerHTML='✅ <b>Saved to Google Sheet</b> — ID: <code>'+rec.id+'</code> · '+new Date().toLocaleString('en-IN');
        }
        const stubEl=document.getElementById('alloc_stub_info');
        if(stubEl) stubEl.style.display='none';
        updateSyncTimeDisplay();
        return;
      }
    }
    throw new Error('Sheet returned error');
  }catch(e){
    addAllocToSyncQueue(rec);
    const confirmEl=document.getElementById('alloc_save_confirm');
    if(confirmEl){
      confirmEl.style.display='block';
      confirmEl.style.background='#fff8e1';
      confirmEl.style.borderColor='#f39c12';
      confirmEl.style.color='#856404';
      confirmEl.innerHTML='⚠️ Saved locally — Sheet sync failed. Will retry automatically. Error: '+e.message;
    }
  }
}

// Separate sync queue for allocations (so it doesn't mix with cash/bank entries)
function getAloocSyncQueue(){ try{return JSON.parse(localStorage.getItem('ghj_alloc_queue')||'[]');}catch{return[];} }
function saveAllocSyncQueue(q){ try{localStorage.setItem('ghj_alloc_queue',JSON.stringify(q));}catch{} }
function addAllocToSyncQueue(rec){
  const q=getAloocSyncQueue();
  const idx=q.findIndex(x=>x.id===rec.id);
  if(idx>=0) q.splice(idx,1);
  q.push(rec);
  saveAllocSyncQueue(q);
}
async function retryAllocSyncQueue(){
  const url=getScriptUrl(); if(!url) return;
  const secret=APP_CONFIG.appSecret||localStorage.getItem('ghj_app_secret')||'';
  const q=[...getAloocSyncQueue()];
  let n=0;
  for(const rec of q){
    try{
      const resp=await fetch(url,{method:'POST',redirect:'follow',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body:JSON.stringify({action:'saveAllocation',_secret:secret,...rec})});
      const raw=await resp.text();
      if(raw&&!raw.trimStart().startsWith('<')){
        const r=JSON.parse(raw);
        if(r.status==='ok'){
          const newQ=getAloocSyncQueue().filter(x=>x.id!==rec.id);
          saveAllocSyncQueue(newQ);
          n++;
        }
      }
    }catch{}
  }
  if(n>0) showToast('✅ '+n+' allocation(s) synced to Sheet!',3000);
}

async function issueAllocation(){
  const toUser  = document.getElementById('al_to').value.trim();
  const amount  = parseFloat(document.getElementById('al_amount').value);
  const date    = document.getElementById('al_date').value;
  const purpose = document.getElementById('al_purpose').value.trim();
  const remarks = document.getElementById('al_remarks').value.trim();

  if(!toUser||!amount||!date||!purpose){alert('Please fill: Allocate To, Amount, Date, Purpose');return;}
  if(!USERS.find(u=>u.name===toUser)){alert('Invalid recipient. Select from the users list.');return;}
  if(toUser===currentUser.name){alert('You cannot allocate cash to yourself.');return;}

  const h=computeCashHoldings();
  const myBal=(h.holdings[currentUser.name]||{}).balance||0;
  if(amount>myBal){
    if(!confirm('⚠️ Balance Warning!\nYou ('+currentUser.name+') hold ₹'+myBal.toLocaleString('en-IN')+'.\nAllocating ₹'+amount.toLocaleString('en-IN')+' exceeds your balance.\n\nProceed anyway?')) return;
  }

  // Show stub banner
  const stubEl=document.getElementById('alloc_stub_info');
  if(stubEl) stubEl.style.display='flex';

  const rec={
    id:'GHJ-A-'+Date.now(),
    date, toUser,
    fromUser:currentUser.name,
    amount, purpose, status:'active', remarks,
    createdAt:new Date().toISOString(),
    _synced:false
  };

  // Save locally first — never lose it
  const existing=getCashAllocations().filter(a=>a.toUser&&a.fromUser&&a.id);
  existing.push(rec);
  saveCashAllocations(existing);

  showToast('✅ ₹'+amount.toLocaleString('en-IN')+' allocated to '+toUser+' — syncing…',4000);

  // Sync to Sheet (async — updates banner)
  await saveAllocationToSheet(rec);
  await retryAllocSyncQueue();

  setTimeout(()=>showPage('cashalloc'),1200);
}

function settleAllocation(id){
  const allc=getCashAllocations();
  const idx=allc.findIndex(a=>a.id===id);
  if(idx<0) return;
  const remarks=prompt('Settle allocation to '+allc[idx].toUser+'\nAmount: ₹'+allc[idx].amount+'\nPurpose: '+allc[idx].purpose+'\n\nSettlement remarks:')||'';
  allc[idx].status='settled';
  allc[idx].settledAt=new Date().toISOString();
  allc[idx].remarks=(allc[idx].remarks?allc[idx].remarks+' | ':'')+'Settled: '+remarks;
  saveCashAllocations(allc);
  saveAllocationToSheet(allc[idx]);
  showToast('✅ Allocation settled & synced.');
  showPage('cashalloc');
}

function cancelAllocation(id){
  if(!confirm('Cancel this allocation? (Use only if cash was NOT actually given.)')) return;
  const allc=getCashAllocations();
  const idx=allc.findIndex(a=>a.id===id);
  if(idx<0) return;
  allc[idx].status='cancelled';
  saveCashAllocations(allc);
  saveAllocationToSheet(allc[idx]);
  showToast('Allocation cancelled.');
  showPage('cashalloc');
}

function filterTable(type){
  const from=(document.getElementById('filterFrom')||{}).value||'';
  const to=(document.getElementById('filterTo')||{}).value||'';
  const head=(document.getElementById('filterHead')||{}).value||'';
  const etype=(document.getElementById('filterType')||{}).value||'';
  const status=(document.getElementById('filterStatus')||{}).value||'';
  const search=((document.getElementById('filterSearch')||{}).value||'').toLowerCase();
  const d=getData();
  const isCreator=currentUser.role==='creator';
  const myName=currentUser.name;
  let entries=isCreator?d[type].filter(e=>e.createdBy===myName||e.paidByUser===myName):d[type];
  entries=entries.filter(e=>{
    if(from&&e.date<from) return false;
    if(to&&e.date>to) return false;
    if(head&&e.head!==head) return false;
    if(etype&&e.type!==etype) return false;
    if(status&&e.status!==status) return false;
    if(search){const hay=[e.desc,e.vendor,e.srno,e.head,e.paidByUser,e.createdBy,String(e.amount)].join(' ').toLowerCase();if(!hay.includes(search)) return false;}
    return true;
  });
  const body=document.getElementById('tableBody');if(!body)return;
  if(!entries.length){body.innerHTML='<tr><td colspan="13" style="text-align:center;padding:20px;color:var(--text-muted)">No matching entries.</td></tr>';return;}
  const q=getPendingQueue();
  body.innerHTML=entries.slice().sort((a,b)=>b.date>a.date?1:-1).map(e=>`
  <tr style="${e.status==='voided'?'opacity:.45':''}">
    <td style="font-size:10px;color:var(--text-muted)">${e.srno}</td><td>${e.date}</td>
    <td style="font-size:11px">${e.head}</td><td style="font-size:10px">${e.category}</td>
    <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.desc}</td>
    <td style="color:var(--primary-light);font-size:11px">${e.vendor||'—'}</td>
    <td style="font-size:11px;color:#6c3483;font-weight:500">${e.paidByUser||e.createdBy||'—'}</td>
    ${type==='bank'?`<td style="font-size:10px">${e.bankName||'—'}</td><td style="font-size:10px">${e.chequeRef||'—'}</td>`:''}
    <td><span class="badge badge-${e.type}">${e.type==='debit'?'DR':'CR'}</span></td>
    <td style="font-weight:700;color:${e.type==='debit'?'#c0392b':'#27ae60'}">₹${Number(e.amount).toLocaleString('en-IN')}</td>
    <td>${e.invoiceLink?`<a href="${e.invoiceLink}" target="_blank" class="badge badge-approved" style="text-decoration:none">📎</a>`:''}</td>
    <td><span class="badge badge-${e.status}">${e.status==='voided'?'VOID':e.status.toUpperCase()}</span>${q.find(x=>x.id===e.id)?'<span style="font-size:9px;background:#e67e22;color:#fff;border-radius:8px;padding:2px 5px;margin-left:3px">⚡</span>':''}</td>
    <td>
      ${(currentUser.role==='admin'||(currentUser.role==='creator'&&e.createdBy===currentUser.name))&&e.status==='pending'?`<button class="btn btn-outline btn-sm" onclick="editEntry('${type}','${e.id}')">Edit</button> `:''}
      ${e.status==='approved'&&(currentUser.role==='admin'||currentUser.role==='approver')&&needsPaymentRelease(e)?`<button class="btn-pay btn-sm" onclick="openPayModal('${type}','${e.id}')">💳 Pay</button> `:''}
      ${currentUser.role==='admin'&&e.status!=='paid'&&e.status!=='voided'?`<button class="btn btn-sm" style="background:#fee;color:#c0392b;border:1px solid #f5c6cb" onclick="voidEntry('${type}','${e.id}')">✕</button>`:''}
    </td>
  </tr>`).join('');
}

function openNewEntry(type){
  // Reset state
  editingId   = null;
  currentStub = null;

  // Get modal elements — fail loudly if missing
  var modal   = document.getElementById('entryModal');
  var titleEl = document.getElementById('modalTitle');
  var bodyEl  = document.getElementById('modalBody');

  if (!modal)   { console.error('entryModal not found'); return; }
  if (!bodyEl)  { console.error('modalBody not found');  return; }
  if (!titleEl) { console.error('modalTitle not found'); return; }

  // Set title
  titleEl.textContent = (type === 'cash') ? '💵 New Cash Entry' : '🏦 New Bank Entry';

  // Build a local stub immediately — no network call needed
  var now     = new Date();
  var localTs = now.toISOString();
  var localId = 'GHJ-L-' + now.getTime();
  var existingCount = 0;
  try { existingCount = (getData()[type] || []).length; } catch(e) {}
  var localSrno = 'GHJ/' + (type === 'cash' ? 'C' : 'B') + '/' +
                  ('000' + (existingCount + 1)).slice(-4);

  currentStub = { id: localId, srno: localSrno, createdAt: localTs, isLocal: true };

  // Render the form — wrapped so ANY error shows a message instead of silence
  var formHtml;
  try {
    formHtml = entryForm(type, {
      id:             localId,
      srno:           localSrno,
      createdAt:      localTs,
      createdBy:      currentUser ? currentUser.name : '',
      _isNewWithStub: true
    });
  } catch(err) {
    console.error('entryForm crashed:', err);
    formHtml = '<div style="padding:20px 24px;color:#c0392b;font-size:13px;line-height:2">'
      + '<b>⚠️ Form could not load</b><br>'
      + '<code style="font-size:11px;background:#fee;padding:4px 8px;border-radius:4px">' + err.message + '</code>'
      + '<br><br><button onclick="closeModal()" style="padding:8px 18px;border:1px solid #c0392b;background:#fee;border-radius:6px;cursor:pointer">Close</button>'
      + '</div>';
  }

  // Set content and open — these two lines are the critical path
  bodyEl.innerHTML = formHtml;
  modal.classList.add('open');

  // Kick off background Sheet registration (fully async, never blocks)
  _fetchStubFromSheet(type, localTs);
}

// Separate async function so openNewEntry stays synchronous
async function _fetchStubFromSheet(type, localTs) {
  const url    = getScriptUrl();
  const banner = document.getElementById('stub_info');
  if (!url) {
    if (banner) {
      banner.style.background  = '#fff8e1';
      banner.style.borderColor = '#e67e22';
      banner.innerHTML = '⚠️ No Sheet URL configured. Entry saved locally.';
    }
    return;
  }

  const secret = APP_CONFIG.appSecret || localStorage.getItem('ghj_app_secret') || '';
  try {
    const resp = await fetch(url, {
      method: 'POST', redirect: 'follow',
      headers: {'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({
        action: 'createStub', _secret: secret,
        paytype: type, createdBy: currentUser ? currentUser.name : '',
        createdAt: localTs
      })
    });
    const raw = await resp.text();
    if (!raw || raw.trimStart().startsWith('<')) throw new Error('Invalid response');
    const r = JSON.parse(raw);
    if (r.status === 'ok' && r.id) {
      // ✅ Got real Sheet ID — upgrade currentStub
      currentStub = { id: r.id, srno: r.srno, createdAt: r.timestamp || localTs, isLocal: false };
      // Update hidden fields in the still-open form
      const fId   = document.getElementById('f_entry_id');
      const fSrno = document.getElementById('f_entry_srno');
      const fTs   = document.getElementById('f_entry_ts');
      if (fId)   fId.value   = r.id;
      if (fSrno) fSrno.value = r.srno;
      if (fTs)   fTs.value   = r.timestamp || localTs;
      // Update banner to green
      if (banner) {
        banner.style.background  = '#eafaf1';
        banner.style.borderColor = '#27ae60';
        banner.style.color       = '#1e8449';
        banner.innerHTML = '✅ <b>Entry ID received from Sheet</b> — '
          + 'ID: <code style="background:rgba(0,0,0,0.08);padding:1px 6px;border-radius:3px;font-size:11px">' + r.id + '</code>'
          + ' &nbsp;|&nbsp; SrNo: <b>' + r.srno + '</b>'
          + ' &nbsp;|&nbsp; ' + new Date(r.timestamp||localTs).toLocaleString('en-IN');
      }
    }
  } catch(err) {
    console.warn('Sheet stub failed (using local ID):', err.message);
    if (banner) {
      banner.style.background  = '#fff8e1';
      banner.style.borderColor = '#e67e22';
      banner.innerHTML = '⚠️ <b>Sheet unreachable</b> — using local ID. Will sync on save.';
    }
  }
}

function onTxnTypeChange(type) {
  const el = document.getElementById('f_txntype');
  if (!el) return;
  const txnType = el.value;
  const typeEl  = document.getElementById('f_type');
  const headEl  = document.getElementById('f_head');
  const catEl   = document.getElementById('f_category');
  const hint    = document.getElementById('txntype_rule');
  const desc    = document.getElementById('txntype_desc');
  const transferRow = document.getElementById('transfer_to_row');
  const vendorLabel = document.getElementById('vendor_label');

  if (txnType === 'Income(Inflow)') {
    if (typeEl)  typeEl.value = 'credit';
    if (headEl && !INCOME_HEADS.includes(headEl.value)) headEl.value = INCOME_HEADS[0];
    if (transferRow) transferRow.style.display = 'none';
    if (hint) hint.textContent = 'Income(Inflow) — Rule: From = External source';
    if (desc) desc.textContent = 'Cash received: donation, sale, bank withdrawal, fees, etc.';
    if (vendorLabel) vendorLabel.textContent = 'Received From / Source *';
  } else if (txnType === 'Transfer') {
    if (typeEl)  typeEl.value = 'debit';
    if (headEl)  headEl.value = 'Patty Cash Transfer';
    if (transferRow) transferRow.style.display = '';
    if (hint) hint.textContent = 'Transfer — Rule: Between people only';
    if (desc) desc.textContent = 'Cash given to another user. Cannot exceed your cash in hand.';
    if (vendorLabel) vendorLabel.textContent = 'Transfer To (Person) *';
  } else if (txnType === 'Expense(Outflow)') {
    if (typeEl)  typeEl.value = 'debit';
    if (headEl && !EXPENSE_HEADS.includes(headEl.value)) headEl.value = EXPENSE_HEADS[0];
    if (transferRow) transferRow.style.display = 'none';
    if (hint) hint.textContent = 'Expense(Outflow) — Rule: To = Vendor/Payee';
    if (desc) desc.textContent = 'Cash paid to vendor. Cannot exceed cash in hand.';
    if (vendorLabel) vendorLabel.textContent = 'Vendor / Paid To *';
  }
  // Refresh category options
  refreshCategoryOptions(txnType);
}

function refreshCategoryOptions(txnType) {
  const catEl = document.getElementById('f_category');
  if (!catEl) return;
  const isIncome = txnType === 'Income(Inflow)';
  const cats = isIncome ? INCOME_CATEGORIES : EXPENSE_CATEGORIES;
  catEl.innerHTML = cats.map(c => '<option>' + c + '</option>').join('');
}

function onTypeChange(type){
  const val = document.getElementById('f_type').value;
  const headEl = document.getElementById('f_head');
  if (!headEl) return;
  if (val==='credit' && EXPENSE_HEADS.includes(headEl.value)) headEl.value = CASH_INFLOW_HEADS[0];
  if (val==='debit'  && CASH_INFLOW_HEADS.includes(headEl.value)) headEl.value = EXPENSE_HEADS[0];
}

function onHeadChange(){
  const headEl = document.getElementById('f_head');
  const typeEl = document.getElementById('f_type');
  if (!headEl || !typeEl) return;
  if (CASH_INFLOW_HEADS.includes(headEl.value)) typeEl.value = 'credit';
  if (EXPENSE_HEADS.includes(headEl.value)) typeEl.value = 'debit';
}


function saveEntry(type){
  const date   = document.getElementById('f_date').value;
  const etype  = document.getElementById('f_type').value;
  const head   = document.getElementById('f_head').value;

  // HARD RULE: Cash holder is ALWAYS the login user who creates the entry.
  // paidByUser is set to currentUser.name on every entry — no exceptions.
  // Transfer receiver is stored in transferTo field, not paidByUser.
  const txnTypeEl = document.getElementById('f_txntype');
  const txnType   = txnTypeEl ? txnTypeEl.value : (etype==='credit'?'Income(Inflow)':'Expense(Outflow)');
  const paidByUser = currentUser.name; // ALWAYS login user
  const category   = document.getElementById('f_category').value;
  const amount     = parseFloat(document.getElementById('f_amount').value);
  const desc       = document.getElementById('f_desc').value.trim();
  const vendor     = document.getElementById('f_vendor').value.trim();
  const invoiceLink= document.getElementById('f_invoice').value.trim();
  const remarks    = document.getElementById('f_remarks').value.trim();
  const g = id => { const el=document.getElementById(id); return el?el.value.trim():''; };

  const transferTo= g('f_transfer_to');

  if(!date||!head||!amount||!desc){alert('Please fill: Date, Head, Amount, Description');return;}
  if(!vendor && txnType!=='Transfer'){alert('Please fill Vendor / Paid To / Received From');return;}
  if(txnType==='Transfer' && !transferTo){alert('Please select the Transfer To person.');return;}

  // ── Rule 5.4: Expense/Transfer cannot exceed cash in hand ─────────────────
  if(type==='cash' && !editingId && (txnType==='Expense(Outflow)'||txnType==='Transfer')) {
    const h = computeCashHoldings();
    const holder = paidByUser || currentUser.name;
    const balance = (h.holdings[holder]||{}).balance || 0;
    if(amount > balance) {
      const action = txnType==='Transfer'?'Transfer':'Expense';
      if(!confirm('⚠️ Rule 5.4 Violation!\n'
        +holder+' only has ₹'+balance.toLocaleString('en-IN')+' cash in hand.\n'
        +'This '+action+' of ₹'+amount.toLocaleString('en-IN')+' exceeds available balance.\n\n'
        +'Proceed anyway? (This will create a deficit.)')) return;
    }
  }

  const d    = getData();
  const list = d[type];

  if(editingId){
    const idx=list.findIndex(e=>e.id===editingId);if(idx<0)return;
    list[idx]={...list[idx],date,type:etype,txnType,transferTo,paidByUser,head,category,
      amount,desc,vendor,invoiceLink,remarks,
      updatedBy:currentUser.name,updatedAt:new Date().toISOString(),
      ...(type==='bank'?{bankName:g('f_bank'),accNo:g('f_accno'),chequeRef:g('f_cheque')}:{})};
    saveData('ghj_'+type,list);
    closeModal();showPage(type);showToast('✅ Entry updated — syncing...');
    pushToSheet('updateEntry',{...list[idx],paytype:type});
  } else {
    // Read from hidden fields first (may have been upgraded by background stub)
    // Hidden fields are the most up-to-date source — they get updated if Sheet responded
    const fId   = document.getElementById('f_entry_id');
    const fSrno = document.getElementById('f_entry_srno');
    const fTs   = document.getElementById('f_entry_ts');
    const stub  = currentStub || {};

    const entryId   = (fId   && fId.value)   ? fId.value   : stub.id   || ('GHJ-L-' + Date.now());
    const entrySrno = (fSrno && fSrno.value)  ? fSrno.value : stub.srno || ('GHJ/'+(type==='cash'?'C':'B')+'/'+String(list.length+1).padStart(4,'0'));
    const entryTs   = (fTs   && fTs.value)    ? fTs.value   : stub.createdAt || new Date().toISOString();
    const isLocal   = entryId.startsWith('GHJ-L-') || entryId.startsWith('GHJ-LOCAL-');

    const entry={
      id:entryId, srno:entrySrno, date, type:etype, txnType, transferTo,
      paytype:type, paidByUser, head, category, amount, desc, vendor,
      invoiceLink, screenshotLink:'', remarks,
      status:'pending',
      createdBy: currentUser.name,
      createdAt: entryTs,
      approvedBy:'', paymentRef:'',
      _stubLocal: isLocal,   // flag for sync queue
      ...(type==='bank'?{bankName:g('f_bank'),accNo:g('f_accno'),chequeRef:g('f_cheque')}:{})
    };

    // Remove existing entry with same ID if it was a stub placeholder
    const existingIdx = list.findIndex(e=>e.id===entryId);
    if(existingIdx>=0) list.splice(existingIdx,1);
    list.push(entry);
    saveData('ghj_'+type, list);

    currentStub = null; // clear after use

    closeModal();
    showPage(type);

    // If stub was local (offline), add to sync queue
    if(isLocal){
      addToSyncQueue(entry);
      showToast('⚠️ Saved locally — will sync to Sheet when connection returns.', 4000);
    } else {
      // Stub was Sheet-registered — update that row with full data
      const savedTime = new Date().toLocaleString('en-IN');
      showToast('✅ Saved & syncing to Sheet — ID: ' + entryId + ' · ' + savedTime, 5000);
      pushToSheet('updateEntry', entry).then(()=>{
        showToast('✅ Entry confirmed in Sheet — ' + entry.srno + ' · ' + savedTime, 4000);
      }).catch(()=>{
        addToSyncQueue(entry);
        showToast('⚠️ Sheet sync failed — added to retry queue.', 4000);
      });
    }
  }
}

// ── Payment release logic ─────────────────────────────────────────────────────
// Only EXPENSE (Outflow) cash entries and ALL bank entries need payment release.
// INCOME entries: money already received — approve just confirms the receipt.
// TRANSFER entries: cash already physically handed over — approve just confirms.
function needsPaymentRelease(e) {
  if (!e) return false;
  if (e.paytype === 'bank') return true;
  const txn = e.txnType || '';
  if (txn === 'Income(Inflow)')   return false;
  if (txn === 'Transfer')         return false;
  if (txn === 'Expense(Outflow)') return true;
  return e.type === 'debit'; // fallback
}

function changeStatus(type,id,status){
  const d=getData(),list=d[type];
  const idx=list.findIndex(e=>e.id===id);if(idx<0)return;
  const entry=list[idx];

  if(status==='approved'){
    // Income and Transfer: auto-mark as paid on approval — no payment release needed
    if(!needsPaymentRelease(entry)){
      list[idx].status='paid';
      list[idx].approvedBy=currentUser.name;
      list[idx].approvedAt=new Date().toISOString();
      list[idx].paymentRef='Confirmed on approval';
      list[idx].paidAt=new Date().toISOString();
      saveData('ghj_'+type,list);
      pushToSheet('updateStatus',{...list[idx],paytype:type});
      const msg = (entry.txnType==='Income(Inflow)')
        ? '✅ Receipt confirmed! Income recorded in '+  (entry.paidByUser||'your')+' account.'
        : '✅ Transfer confirmed! No payment release needed.';
      showToast(msg, 4000);
    } else {
      // Expense / Bank: goes to Payment Releases next
      list[idx].status='approved';
      list[idx].approvedBy=currentUser.name;
      list[idx].approvedAt=new Date().toISOString();
      saveData('ghj_'+type,list);
      pushToSheet('updateStatus',{...list[idx],paytype:type});
      showToast('✅ Approved! Go to Payment Releases to pay the vendor.', 4000);
    }
  } else {
    list[idx].status='rejected';
    list[idx].approvedBy=currentUser.name;
    list[idx].approvedAt=new Date().toISOString();
    saveData('ghj_'+type,list);
    pushToSheet('updateStatus',{...list[idx],paytype:type});
    showToast('❌ Entry rejected.');
  }
  showPage('approvals');
}

function voidEntry(type,id){
  if(currentUser.role!=='admin'){showToast('Only Admin can void entries.');return;}
  const d=getData(),list=d[type];
  const entry=list.find(e=>e.id===id);if(!entry)return;
  if(entry.status==='paid'){showToast('Cannot void a paid entry. Create a reversal entry instead.');return;}
  const reason=prompt('Reason for voiding (required):');
  if(!reason||!reason.trim()){showToast('Void cancelled.');return;}
  const idx=list.findIndex(e=>e.id===id);
  list[idx].status='voided';list[idx].voidedBy=currentUser.name;
  list[idx].voidedAt=new Date().toISOString();list[idx].voidReason=reason.trim();
  saveData('ghj_'+type,list);
  pushToSheet('updateStatus',{...list[idx],paytype:type,approvedBy:'VOID: '+reason+' by '+currentUser.name});
  showToast('Entry voided.');showPage(currentPage);
}

function getReportPeriodFilter(period){
  const now=new Date(),y=now.getFullYear(),m=now.getMonth();
  if(period==='this_month'){const f=new Date(y,m,1).toISOString().slice(0,10),t=new Date(y,m+1,0).toISOString().slice(0,10);return e=>e.date>=f&&e.date<=t;}
  if(period==='prev_month'){const f=new Date(y,m-1,1).toISOString().slice(0,10),t=new Date(y,m,0).toISOString().slice(0,10);return e=>e.date>=f&&e.date<=t;}
  if(period==='this_year'){const f=y+'-01-01',t=y+'-12-31';return e=>e.date>=f&&e.date<=t;}
  if(period==='last_3m'){const f=new Date(y,m-2,1).toISOString().slice(0,10);return e=>e.date>=f;}
  if(period==='last_6m'){const f=new Date(y,m-5,1).toISOString().slice(0,10);return e=>e.date>=f;}
  return()=>true;
}

function renderReports(){
  const d=getData();
  const periodFn=getReportPeriodFilter(reportPeriod);
  const periodLabel={all:'All Time',this_month:'This Month',prev_month:'Previous Month',this_year:'This Year',last_3m:'Last 3 Months',last_6m:'Last 6 Months'}[reportPeriod];

  const allRaw=[...d.cash.map(e=>({...e,paytype:'cash'})),...d.bank.map(e=>({...e,paytype:'bank'}))];
  const modeFiltered=reportMode==='all'?allRaw:allRaw.filter(e=>e.paytype===reportMode);

  // ── RULE: Transfer entries are NEVER counted in income or expense ─────────
  const isTransfer = e => e.txnType==='Transfer';
  const filtered   = modeFiltered.filter(e=>e.status!=='voided'&&periodFn(e)&&!isTransfer(e));
  const transfers  = modeFiltered.filter(e=>e.status!=='voided'&&periodFn(e)&&isTransfer(e));

  // ── INCOME: Credit entries only, NO transfers ─────────────────────────────
  const credits    = filtered.filter(e=>e.type==='credit');
  const totalCredit= credits.reduce((s,e)=>s+Number(e.amount),0);

  // ── EXPENSE: Debit entries only, NO transfers ─────────────────────────────
  const debits     = filtered.filter(e=>e.type==='debit');
  const totalDebit = debits.reduce((s,e)=>s+Number(e.amount),0);

  // ── HEAD BREAKDOWN: income and expense, NO transfers ─────────────────────

  // ── HOLDINGS by user (from computeCashHoldings — live, all-time) ─────────

  const misRows=USERS.map(u=>{
    const uCr = credits.filter(e=>e.createdBy===u.name).reduce((s,e)=>s+Number(e.amount),0);

      <select onchange="reportMode=this.value;showPage('reports')" style="font-size:12px;padding:5px 8px;border:1.5px solid var(--border);border-radius:7px">
        <option value="all" ${reportMode==='all'?'selected':''}>Cash + Bank</option>
        <option value="cash" ${reportMode==='cash'?'selected':''}>Cash Only</option>
        <option value="bank" ${reportMode==='bank'?'selected':''}>Bank Only</option>

        <option value="all"        ${reportPeriod==='all'?'selected':''}>All Time</option>
      </select>
    </div>
  </div>

  <!-- ══ SECTION 1: CASH RECEIVED BY HEAD ══ -->
  <div class="card" style="border:2px solid #27ae60;margin-bottom:16px">
    <div class="card-title" style="font-size:15px;color:#27ae60">💰 Total Cash Received — By Head · ${periodLabel}</div>
    <div style="font-size:11px;color:var(--text-muted);margin-bottom:12px">All cash that entered the system (from outside — donations, fees, sales, bank withdrawal, etc.)</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">

          <tbody>
          ${headCrEntries.map(([hd,amt])=>`
          <tr style="border-bottom:.5px solid #f0f0f0">

function downloadMISReport(){
  const d=getData();
  const periodFn=getReportPeriodFilter(reportPeriod);
  const isTransfer=e=>e.txnType==='Transfer';
  const allRaw=[...d.cash.map(e=>({...e,paytype:'cash'})),...d.bank.map(e=>({...e,paytype:'bank'}))];
  const modeFiltered=(reportMode==='all'?allRaw:allRaw.filter(e=>e.paytype===reportMode)).filter(e=>e.status!=='voided'&&periodFn(e));
  const credits=modeFiltered.filter(e=>e.type==='credit'&&!isTransfer(e));
  const debits =modeFiltered.filter(e=>e.type==='debit' &&!isTransfer(e));
  const transfers=modeFiltered.filter(e=>isTransfer(e));
  const h=computeCashHoldings();
  const rows=USERS.map(u=>({
    'User':u.name,'Role':u.role,
    'Income(Inflow)':credits.filter(e=>e.createdBy===u.name).reduce((s,e)=>s+Number(e.amount),0),
    'Transfer In':transfers.filter(e=>(e.transferTo||e.vendor||'').trim().toLowerCase()===u.name.toLowerCase()).reduce((s,e)=>s+Number(e.amount),0),
    'Transfer Out':transfers.filter(e=>e.createdBy===u.name).reduce((s,e)=>s+Number(e.amount),0),
    'Expense(Outflow)':debits.filter(e=>e.createdBy===u.name).reduce((s,e)=>s+Number(e.amount),0),
    'Cash Balance':(h.holdings[u.name]||{}).balance||0
  }));
  downloadCSV(rows,'GHJ_MIS_'+reportPeriod);
}

function downloadReportData(){
  const d=getData();
  const periodFn=getReportPeriodFilter(reportPeriod);
  const allRaw=[...d.cash.map(e=>({...e,paytype:'cash'})),...d.bank.map(e=>({...e,paytype:'bank'}))];
  const filtered=(reportMode==='all'?allRaw:allRaw.filter(e=>e.paytype===reportMode)).filter(e=>periodFn(e));
  downloadCSV(filtered.map(e=>({SrNo:e.srno,Date:e.date,Mode:e.paytype,Head:e.head,Category:e.category,DrCr:e.type==='debit'?'DR':'CR',Amount:e.amount,Description:e.desc,Vendor:e.vendor||'',PaidByUser:e.paidByUser||e.createdBy||'',Status:e.status})),'GHJ_report_'+reportPeriod);
}

function corsResponse(data) {

function ensureHeaders(tab, headers) {
  // Update the header row if it doesn't match expected headers
  // This fixes sheets created with old column names
  if (tab.getLastRow() === 0) return; // empty sheet
  var existing = tab.getRange(1, 1, 1, Math.max(tab.getLastColumn(), headers.length)).getValues()[0];
  var needsUpdate = false;
  for (var i = 0; i < headers.length; i++) {
    if (String(existing[i]||'').trim() !== headers[i]) { needsUpdate = true; break; }
  }
  if (needsUpdate) {
    tab.getRange(1, 1, 1, headers.length).setValues([headers]);
    tab.getRange(1, 1, 1, headers.length)
       .setFontWeight('bold')
       .setBackground('#1a3a5c')
       .setFontColor('#ffffff');
    tab.setFrozenRows(1);
  }
}

function getOrCreateTab(ss, name, headers) {
  var tab = ss.getSheetByName(name);
  if (!tab) {
    tab = ss.insertSheet(name);
    tab.appendRow(headers);
    var hdrRange = tab.getRange(1, 1, 1, headers.length);
    hdrRange.setFontWeight('bold')
            .setBackground('#1a3a5c')
            .setFontColor('#ffffff');
    tab.setFrozenRows(1);
  }
  return tab;
}

// ── Rebuild CashMgmt summary from CashEntries ─────────────────────────────────
function rebuildCashMgmt(ss) {
  var ctab = ss.getSheetByName('CashEntries');
  if (!ctab || ctab.getLastRow() < 2) return;

  var rows = ctab.getDataRange().getValues();
  var hdr  = rows[0].map(function(h){ return String(h).trim(); });
  var col  = function(name){ return hdr.indexOf(name); };

  // Per-user summary from CashEntries — single source of truth
  var summary = {};
  var init = function(u){ if(!summary[u]) summary[u]={income:0,transferIn:0,transferOut:0,expense:0}; };

  for (var i = 1; i < rows.length; i++) {
    var r      = rows[i];
    var status = String(r[col('Status')] || '').trim().toLowerCase();
    if (status === 'voided' || status === 'stub') continue; // skip voided and stubs

    var holder = String(r[col('CreatedBy')] || '').trim();
    var etype  = String(r[col('EntryType')] || '').trim();
    var amt    = parseFloat(r[col('Amount')] || 0);
    var vendor = String(r[col('ReceivedBy/VendorName')] || '').trim();

    if (!holder || !amt) continue;
    init(holder);

    if (etype === 'Income(Inflow)') {
      // Income — NOT a transfer, goes to holder's income
      summary[holder].income += amt;
    } else if (etype === 'Transfer') {
      // Transfer — custody moves from holder to vendor/recipient
      // NOT counted in income or expense of either person
      summary[holder].transferOut += amt;
      if (vendor) { init(vendor); summary[vendor].transferIn += amt; }
    } else if (etype === 'Expense(Outflow)') {
      // Expense — NOT a transfer, deducted from holder
      summary[holder].expense += amt;
    }
  }

  // ── Write CashMgmt tab — CLEAR ALL then rewrite cleanly ──────────────────
  var CMGMT_HDR = ['LoginUserName','Opening','Income(Inflow)','Transfer In','Transfer Out','Expense(Outflow)','Closing Balance'];
  var mtab = ss.getSheetByName('CashMgmt');
  if (!mtab) {
    mtab = ss.insertSheet('CashMgmt');
  }
  // Clear entire sheet and start fresh — prevents duplicates
  mtab.clearContents();

  // Write header row
  mtab.appendRow(CMGMT_HDR);
  mtab.getRange(1, 1, 1, CMGMT_HDR.length)
      .setFontWeight('bold')
      .setBackground('#1a3a5c')
      .setFontColor('#ffffff');
  mtab.setFrozenRows(1);

  // Write one row per user (only users who have entries)
  var userNames = Object.keys(summary).sort();
  userNames.forEach(function(u) {
    var s = summary[u];
    var closing = s.income + s.transferIn - s.transferOut - s.expense;
    mtab.appendRow([u, 0, s.income, s.transferIn, s.transferOut, s.expense, closing]);
  });

  // Auto-resize columns
  try { mtab.autoResizeColumns(1, CMGMT_HDR.length); } catch(e) {}
}

// ════════════════════════════════════════════════════════════════════════
//  doPost — write operations
// ════════════════════════════════════════════════════════════════════════
function doPost(e) {
  try {
    if (!e || !e.postData || !e.postData.contents)
      return corsResponse({status:'error', error:'No POST body'});

    var p;
    try { p = JSON.parse(e.postData.contents); }
    catch(ex) { return corsResponse({status:'error', error:'Bad JSON: '+ex.message}); }

    if (APP_SECRET && p._secret !== APP_SECRET)
      return corsResponse({status:'error', error:'Unauthorized'});

    var ss = SpreadsheetApp.openById(SHEET_ID);

    // ── CREATE row stub first (the "auto-ID" pattern) ────────────────
    // Client calls action='createStub' FIRST to get a pre-registered row.
    // Then fills in the form and calls saveEntry to update that row.
    if (p.action === 'createStub') {
      var isBankEntry = (p.paytype === 'bank');
      var stubTab = isBankEntry
        ? getOrCreateTab(ss, 'BankEntries', BANK_HEADERS)
        : getOrCreateTab(ss, 'CashEntries', CASH_HEADERS);

      var ts   = new Date().toISOString();
      var uid  = 'GHJ-' + Date.now() + '-' + Math.floor(Math.random()*9999);
      // SrNo = count of existing data rows + 1
      var rowCount = Math.max(stubTab.getLastRow() - 1, 0); // minus header
      var srno = 'GHJ/' + (isBankEntry?'B':'C') + '/' + ('000' + (rowCount+1)).slice(-4);

      if (isBankEntry) {
        // BankEntries: A:ID B:SrNo C:Date D:Head E:Category F:Type G:Amount
        //              H:Description I:Vendor J:InvoiceLink K:ScreenShot
        //              L:Status M:CreatedBy ... (rest blank)
        var stubRowB = [uid, srno, '', '', '', 'debit', 0, '', '', '', '', 'stub',
                        p.createdBy||'', '', '', '', '', '', '', 'bank'];
        while(stubRowB.length < BANK_HEADERS.length) stubRowB.push('');
        stubTab.appendRow(stubRowB);
      } else {
        // CashEntries: A:ID(Auto) B:TimeStamp(Auto) C:CreatedBy D:EntryType
        //              E:SrNo F:Date G:Head H:Category I:ReceivedBy/VendorName
        //              J:Amount K:Description L:InvoiceLink M:ScreenShot
        //              N:Status O:ApprovedBy P:PaymentRef Q:Remarks R:Type
        var stubRowC = [uid, ts, p.createdBy||'', '', srno, '', '', '', '',
                        0, '', '', '', 'stub', '', '', '', 'cash'];
        while(stubRowC.length < CASH_HEADERS.length) stubRowC.push('');
        stubTab.appendRow(stubRowC);
      }

      // Format the new stub row
      var newRowNum = stubTab.getLastRow();
      stubTab.getRange(newRowNum, 1).setBackground('#fff8e1'); // yellow = stub

      return corsResponse({status:'ok', id:uid, srno:srno, timestamp:ts});
    }

    // ── Save/Update Cash Entry ───────────────────────────────────────
    if (p.action === 'saveEntry' || p.action === 'updateEntry') {

      if (p.paytype === 'bank') {
        var btab = getOrCreateTab(ss, 'BankEntries', BANK_HEADERS);
        ensureHeaders(btab, BANK_HEADERS); // fix headers if tab existed with old columns
        var brows = btab.getDataRange().getValues();
        var bfound = -1;
        for (var bi = 1; bi < brows.length; bi++) {
          if (String(brows[bi][0]) === String(p.id)) { bfound = bi; break; }
        }
        // BankEntries: A:ID B:SrNo C:Date D:Head E:Category F:Type G:Amount
        //              H:Description I:Vendor J:InvoiceLink K:ScreenShot L:Status
        //              M:CreatedBy N:ApprovedBy O:PaymentRef P:Remarks
        //              Q:BankName R:AccountNo S:ChequeRef T:PayType
        var brow = [
          p.id||'',              // A: ID
          p.srno||'',            // B: SrNo
          p.date||'',            // C: Date
          p.head||'',            // D: Head
          p.category||'',        // E: Category
          p.type||'debit',       // F: Type
          Number(p.amount)||0,   // G: Amount
          p.desc||'',            // H: Description
          p.vendor||'',          // I: Vendor
          p.invoiceLink||'',     // J: InvoiceLink
          p.screenshotLink||'',  // K: ScreenShot
          p.status||'pending',   // L: Status
          p.createdBy||'',       // M: CreatedBy
          p.approvedBy||'',      // N: ApprovedBy
          p.paymentRef||'',      // O: PaymentRef
          p.remarks||'',         // P: Remarks
          p.bankName||'',        // Q: BankName
          p.accNo||'',           // R: AccountNo
          p.chequeRef||'',       // S: ChequeRef
          p.paytype||'bank'      // T: PayType
        ];
        if (bfound >= 1) btab.getRange(bfound+1,1,1,brow.length).setValues([brow]);
        else btab.appendRow(brow);

      } else {
        var ctab = getOrCreateTab(ss, 'CashEntries', CASH_HEADERS);
        ensureHeaders(ctab, CASH_HEADERS); // fix headers if tab existed with old columns
        var crows = ctab.getDataRange().getValues();
        var cfound = -1;
        for (var ci = 1; ci < crows.length; ci++) {
          if (String(crows[ci][0]) === String(p.id)) { cfound = ci; break; }
        }
        // CashEntries: A:ID(Auto) B:TimeStamp(Auto) C:CreatedBy D:EntryType
        //              E:SrNo F:Date G:Head H:Category I:ReceivedBy/VendorName
        //              J:Amount K:Description L:InvoiceLink M:ScreenShot
        //              N:Status O:ApprovedBy P:PaymentRef Q:Remarks R:Type
        var crow = [
          p.id||'',              // A: ID (Auto)
          p.createdAt||new Date().toISOString(), // B: TimeStamp (Auto)
          p.createdBy||'',       // C: CreatedBy (login user)
          p.txnType||'',         // D: EntryType (Income(Inflow)/Transfer/Expense(Outflow))
          p.srno||'',            // E: SrNo
          p.date||'',            // F: Date
          p.head||'',            // G: Head
          p.category||'',        // H: Category
          p.vendor||'',          // I: ReceivedBy/VendorName
          Number(p.amount)||0,   // J: Amount
          p.desc||'',            // K: Description
          p.invoiceLink||'',     // L: InvoiceLink
          p.screenshotLink||'',  // M: ScreenShot
          p.status||'pending',   // N: Status
          p.approvedBy||'',      // O: ApprovedBy
          p.paymentRef||'',      // P: PaymentRef
          p.remarks||'',         // Q: Remarks
          'cash'                 // R: Type
        ];
        if (cfound >= 1) {
          ctab.getRange(cfound+1,1,1,crow.length).setValues([crow]);
          // Clear stub yellow background now that row is filled
          ctab.getRange(cfound+1,1,1,crow.length).setBackground(null);
        } else {
          ctab.appendRow(crow);
        }

        // Rebuild CashMgmt summary after every cash write
        rebuildCashMgmt(ss);
      }
      return corsResponse({status:'ok'});
    }

    // ── Update Status only ───────────────────────────────────────────
    if (p.action === 'updateStatus') {
      var tabName = p.paytype==='bank' ? 'BankEntries' : 'CashEntries';
      var stab = ss.getSheetByName(tabName);
      if (!stab) return corsResponse({status:'error', error:'Tab not found'});
      var srows = stab.getDataRange().getValues();
      for (var si = 1; si < srows.length; si++) {
        if (String(srows[si][0]) === String(p.id)) {
          if (p.paytype === 'bank') {
            // Bank: Status=L(12), ApprovedBy=N(14), PaymentRef=O(15), Screenshot=K(11)
            if (p.status)         stab.getRange(si+1,12).setValue(p.status);
            if (p.approvedBy)     stab.getRange(si+1,14).setValue(p.approvedBy);
            if (p.paymentRef)     stab.getRange(si+1,15).setValue(p.paymentRef);
            if (p.screenshotLink) stab.getRange(si+1,11).setValue(p.screenshotLink);
          } else {
            // Cash: Status=N(14), ApprovedBy=O(15), PaymentRef=P(16), Screenshot=M(13)
            if (p.status)         stab.getRange(si+1,14).setValue(p.status);
            if (p.approvedBy)     stab.getRange(si+1,15).setValue(p.approvedBy);
            if (p.paymentRef)     stab.getRange(si+1,16).setValue(p.paymentRef);
            if (p.screenshotLink) stab.getRange(si+1,13).setValue(p.screenshotLink);
          }
          if (p.paytype !== 'bank') rebuildCashMgmt(ss);
          return corsResponse({status:'ok'});
        }
      }
      return corsResponse({status:'error', error:'ID not found'});
    }

    // ── Upload file to Google Drive ─────────────────────────────────────────
    if (p.action === 'uploadFile') {
      try {
        var decoded  = Utilities.base64Decode(p.base64Data);
        var blob     = Utilities.newBlob(decoded, p.mimeType, p.fileName);
        // Get or create nested folder: e.g. "GHJ Exp App/Cash/Invoices"
        var parts = (p.folder || 'GHJ Exp App').split('/');
        var folder = DriveApp.getRootFolder();
        parts.forEach(function(part){
          var found = folder.getFoldersByName(part);
          folder = found.hasNext() ? found.next() : folder.createFolder(part);
        });
        var file   = folder.createFile(blob);
        file.setSharing(DriveApp.Access.ANYONE_WITH_LINK, DriveApp.Permission.VIEW);
        return corsResponse({status:'ok', link:'https://drive.google.com/file/d/'+file.getId()+'/view'});
      } catch(ue) {
        return corsResponse({status:'error', error:'Upload failed: '+ue.message});
      }
    }

    return corsResponse({status:'error', error:'Unknown action: '+p.action});

  } catch(err) {
    return corsResponse({status:'error', error:err.message});
  }
}

// ════════════════════════════════════════════════════════════════════════
//  doGet — read operations
// ════════════════════════════════════════════════════════════════════════
function doGet(e) {
  try {
    var secret = (e && e.parameter && e.parameter.secret) ? e.parameter.secret : '';
    if (APP_SECRET && secret !== APP_SECRET)
      return corsResponse({status:'error', error:'Unauthorized'});

    var type = (e && e.parameter && e.parameter.type) ? e.parameter.type : 'cash';
    var ss   = SpreadsheetApp.openById(SHEET_ID);
    var tab;

    if      (type === 'cash')      tab = ss.getSheetByName('CashEntries');
    else if (type === 'bank')      tab = ss.getSheetByName('BankEntries');
    else if (type === 'cashalloc') tab = ss.getSheetByName('CashMgmt');
    else if (type === 'users')     tab = ss.getSheetByName('Users');
    else return corsResponse({status:'error', error:'Unknown type: '+type});

    if (!tab || tab.getLastRow() < 2) return corsResponse([]);
    return corsResponse(tab.getDataRange().getValues());

  } catch(err) {
    return corsResponse({status:'error', error:err.message});
  }
}
