async function diagnoseConnection() {
  const url = (document.getElementById('apiUrl') && document.getElementById('apiUrl').value.trim()) || localStorage.getItem('ghj_api_url');
  const r = document.getElementById('testResult');
  if (!url) {
    if (r) r.innerHTML = '<span style="color:var(--danger)">❌ No URL entered. Paste your Apps Script URL above and click Save Settings first.</span>';
    return;
  }
  if (r) r.innerHTML = '<span style="color:var(--accent)">🔍 Diagnosing... checking your Apps Script URL...</span>';

  // Check 1: URL format
  if (!url.includes('script.google.com/macros/s/') || !url.endsWith('/exec')) {
    if (r) r.innerHTML = `<span style="color:var(--danger)">
      ❌ <b>Wrong URL format.</b><br>
      Your URL: <code>${url}</code><br>
      It must look like: <code>https://script.google.com/macros/s/AKfyc.../exec</code><br>
      Make sure it ends with <b>/exec</b> — not /dev or /edit.
    </span>`;
    return;
  }

  // Check 2: Fetch and inspect the raw response
  try {
    const resp = await fetch(url + '?type=cash', { redirect: 'follow' });
    const rawText = await resp.text();
    const httpStatus = resp.status;
    const first200 = rawText.substring(0, 200).trim();

    let diagnosis = `<b>URL:</b> <code>${url}</code><br>
    <b>HTTP Status:</b> ${httpStatus}<br>
    <b>First 200 chars of response:</b><br>
    <code style="font-size:10px;word-break:break-all;background:#f4f6f8;display:block;padding:6px;border-radius:4px;margin:4px 0">${first200.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code>`;

    if (rawText.trimStart().startsWith('[') || rawText.trimStart().startsWith('{')) {
      // Looks like JSON — good
      try {
        JSON.parse(rawText);
        if (r) r.innerHTML = `<span style="color:var(--success)">
          ✅ <b>Connection is WORKING correctly!</b><br>${diagnosis}<br>
          The script is returning valid JSON. If entries are still not saving to Sheets, check that your Sheet ID is correct and the CashEntries / BankEntries tabs exist.
        </span>`;
      } catch(pe) {
        if (r) r.innerHTML = `<span style="color:var(--danger)">
          ❌ <b>Response looks like JSON but could not be parsed.</b><br>${diagnosis}<br>
          Try re-deploying: Apps Script → Deploy → Manage Deployments → Edit → New version → Update.
        </span>`;
      }
    } else if (rawText.includes('accounts.google.com') || rawText.includes('signin') || rawText.includes('ServiceLogin')) {
      if (r) r.innerHTML = `<span style="color:var(--danger)">
        ❌ <b>Script is returning a Google login page.</b><br>${diagnosis}<br>
        <b>Fix:</b> Apps Script → Deploy → Manage Deployments → click pencil icon → 
        set <b>Who has access = Anyone</b> → change version to <b>New version</b> → Update.
      </span>`;
    } else if (rawText.includes('Exception') || rawText.includes('Error')) {
      if (r) r.innerHTML = `<span style="color:var(--danger)">
        ❌ <b>Script returned an error page.</b><br>${diagnosis}<br>
        <b>Fix:</b> Go to Apps Script → delete all code → paste the full script from above → replace YOUR_SHEET_ID_HERE → Save → redeploy as New version.
      </span>`;
    } else if (rawText.includes('<!DOCTYPE') || rawText.startsWith('<html') || rawText.startsWith('<HTML')) {
      if (r) r.innerHTML = `<span style="color:var(--danger)">
        ❌ <b>Script returned HTML — deployment settings are wrong.</b><br>${diagnosis}<br>
        <b>Most common fix:</b> Apps Script → Deploy → Manage Deployments → Edit → 
        set <b>Who has access = Anyone</b> (not "Only myself") → New version → Update.
      </span>`;
    } else {
      if (r) r.innerHTML = `<span style="color:var(--warn)">
        ⚠️ <b>Unexpected response — cannot determine cause automatically.</b><br>${diagnosis}<br>
        Try: delete all code in Apps Script, paste the full script again, redeploy as New version with Who has access = Anyone.
      </span>`;
    }
  } catch(e) {
    if (r) r.innerHTML = `<span style="color:var(--danger)">
      ❌ <b>Network error — could not reach the URL at all.</b><br>
      Error: ${e.message}<br>
      Check that: (1) the URL is correct and ends with /exec, (2) you have internet access, (3) the deployment is published (not just saved).
    </span>`;
  }
}

async function testUpload() {
  const url = getScriptUrl();
  if (!url) { showToast('⚠️ Paste your Apps Script URL first, then Save'); return; }
  const r = document.getElementById('testResult');
  if (r) r.innerHTML = '<span style="color:var(--accent)">🔄 Sending test file to Drive...</span>';
  const testBlob = new Blob(['GHJ Exp App — Drive upload test OK'], { type: 'text/plain' });
  const testFile = new File([testBlob], 'ghj_test_upload.txt', { type: 'text/plain' });
  try {
    const base64 = await fileToBase64(testFile);
    const resp = await fetch(url, {
      method: 'POST',
      redirect: 'follow',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'uploadFile', fileName: testFile.name, mimeType: 'text/plain', base64Data: base64, folder: 'GHJ Exp App Files' })
    });
    const rawText = await resp.text();
    if (!rawText || rawText.trimStart().startsWith('<')) {
      throw new Error('Script returned HTML not JSON. Fix: Apps Script → Deploy → Manage Deployments → Edit → "Who has access" = Anyone → Update.');
    }
    const result = JSON.parse(rawText);
    if (result.status === 'ok') {
      if (r) r.innerHTML = `<span style="color:var(--success)">✅ Drive upload working! <a href="${result.fileUrl}" target="_blank" style="color:var(--primary-light)">View test file on Drive ↗</a></span>`;
    } else {
      if (r) r.innerHTML = `<span style="color:var(--danger)">❌ Script error: ${result.error}</span>`;
    }
  } catch(e) {
    if (r) r.innerHTML = `<span style="color:var(--danger)">❌ ${e.message}</span>`;
  }
}

    }
    JSON.parse(rawText); // validate it parses
    showToast('✅ Sheet connection working!');
    if (r) r.innerHTML = '<span style="color:var(--success)">✅ Google Sheet read successful!</span>';
  } catch(e) {
    showToast('❌ Connection failed.');
    if (r) r.innerHTML = `<span style="color:var(--danger)">❌ ${e.message}</span>`;
  }
}

// ===== MODALS =====
function closeModal() { document.getElementById('entryModal').classList.remove('open'); }
function closePayModal() { document.getElementById('payModal').classList.remove('open'); }

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

// ===== INIT =====
// Restore sync state on page load
(function initSyncState() {
  // Apply saved compression settings if any
  const savedW = parseInt(localStorage.getItem('ghj_compress_maxw'));
  const savedQ = parseFloat(localStorage.getItem('ghj_compress_q'));
  if (savedW) { COMPRESS_CONFIG.maxWidth = savedW; COMPRESS_CONFIG.maxHeight = Math.round(savedW * 1.4); }
  if (savedQ) { COMPRESS_CONFIG.quality = savedQ; }
  updateSyncBadge();
  updateSyncTimeDisplay();
  // Retry any queued entries after 2s (allows page to render first)
  setTimeout(() => {
    if (getScriptUrl() && getPendingQueue().length > 0) {
      retrySyncQueue();
    }
  }, 2000);
})();
