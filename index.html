<!DOCTYPE html>
<html lang="en">
<head>

<title>GHJ Exp App</title>
<style>
:root{--primary:#1a5276;--pl:#2980b9;--accent:#e67e22;--al:#f39c12;--success:#27ae60;--danger:#c0392b;--bg:#f4f6f8;--card:#fff;--border:#dce3ea;--text:#1c2833;--muted:#7f8c8d;--sw:260px;--hh:64px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
/* LOGIN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a5276,#154360,#0d2137);}
.lbox{background:#fff;border-radius:16px;padding:40px 36px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center;}
.ltitle{font-size:22px;font-weight:700;color:var(--primary);margin-bottom:4px;}
.lsub{font-size:12px;color:var(--muted);margin-bottom:28px;}
.fg{margin-bottom:16px;text-align:left;}
.fg label{font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px;text-transform:uppercase;}
.fg input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;}
.btnP{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;}
.btnP:hover{background:var(--pl);}
.lerr{color:var(--danger);font-size:12px;margin-top:8px;display:none;}
/* SHELL */
#appShell{display:none;min-height:100vh;}
.header{position:fixed;top:0;left:0;right:0;height:var(--hh);background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.htitle{font-size:18px;font-weight:700;}
.htitle span{color:var(--al);}
.hright{display:flex;align-items:center;gap:10px;}
.syncbar{background:rgba(255,255,255,.12);border-radius:8px;padding:4px 12px;font-size:11px;color:#fff;cursor:pointer;border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;gap:6px;}
.syncbar:hover{background:rgba(255,255,255,.22);}
.ubadge{background:rgba(255,255,255,.15);border-radius:20px;padding:5px 12px;font-size:13px;}
.blogout{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;}
/* SIDEBAR */
.sidebar{position:fixed;top:var(--hh);left:0;width:var(--sw);bottom:0;background:#1a2537;overflow-y:auto;z-index:50;padding:16px 0;}
.nsec{padding:6px 16px 4px;font-size:10px;font-weight:700;color:#5d7499;text-transform:uppercase;letter-spacing:1px;}
.ni{display:flex;align-items:center;gap:10px;padding:10px 20px;color:#9cb2cc;cursor:pointer;font-size:13px;transition:all .2s;border-left:3px solid transparent;}
.ni:hover{background:rgba(255,255,255,.05);color:#fff;}
.ni.active{background:rgba(41,128,185,.2);color:#fff;border-left-color:var(--accent);}
.nico{font-size:16px;width:20px;text-align:center;}
/* MAIN */
.main{margin-left:var(--sw);margin-top:var(--hh);padding:24px;min-height:calc(100vh - var(--hh));}
.card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 6px rgba(0,0,0,.07);margin-bottom:20px;}
.ctitle{font-size:15px;font-weight:700;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
/* STATS */
.srow{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.sc{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-left:4px solid var(--primary);}
.slabel{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;}
.sval{font-size:22px;font-weight:700;margin-top:4px;}
.ssub{font-size:11px;color:var(--muted);margin-top:2px;}
/* FORMS */
.frow{display:grid;gap:14px;margin-bottom:14px;}
.frow.c2{grid-template-columns:1fr 1fr;}
.frow.c3{grid-template-columns:1fr 1fr 1fr;}
.frow.c4{grid-template-columns:1fr 1fr 1fr 1fr;}
.fl{font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px;text-transform:uppercase;}
input[type=text],input[type=number],input[type=date],input[type=email],select,textarea{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;color:var(--text);background:#fff;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--pl);}
textarea{resize:vertical;min-height:60px;}
.brow{display:flex;gap:10px;justify-content:flex-end;margin-top:16px;}
.btn{padding:9px 20px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;}
.bs{background:var(--primary);color:#fff;}.bs:hover{background:var(--pl);}
.bc{background:#ecf0f1;color:var(--text);}
.bsm{padding:4px 10px;font-size:11px;}
.bo{background:transparent;border:1.5px solid var(--primary);color:var(--primary);}
.bnew{background:var(--accent);color:#fff;border:none;padding:9px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;}
/* TABLE */
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{background:#f0f4f8;padding:10px 12px;text-align:left;font-weight:700;color:var(--muted);font-size:11px;text-transform:uppercase;border-bottom:2px solid var(--border);}
tbody td{padding:10px 12px;border-bottom:1px solid #f0f0f0;vertical-align:middle;}
tbody tr:hover{background:#fafbfc;}
/* BADGES */
.badge{display:inline-block;padding:3px 9px;border-radius:12px;font-size:10px;font-weight:700;}
.b-received{background:#eafaf1;color:#1e8449;}
.b-transfer{background:#eaf0fb;color:#1a5276;}
.b-expense{background:#fdedec;color:#922b21;}
.b-pending{background:#fef9e7;color:#d68910;}
.b-approved{background:#eafaf1;color:#1e8449;}
.b-paid{background:#eaf0fb;color:#1a5276;}
.b-rejected{background:#fdedec;color:#922b21;}
.b-voided{background:#f0f0f0;color:#888;}
/* MODAL */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;}
.mbg.open{display:flex;}
.modal{background:#fff;border-radius:14px;padding:28px;width:660px;max-width:96vw;max-height:92vh;overflow-y:auto;}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.mtitle{font-size:17px;font-weight:700;color:var(--primary);}
.mclose{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);}
/* HOLDING CARD */
.hcard{border-radius:10px;padding:14px;margin-bottom:10px;border:1.5px solid var(--border);}
.hcard.pos{border-color:#27ae60;background:#f0fff4;}
.hcard.zero{border-color:#bdc3c7;background:#f8f9fa;}
.hcard.neg{border-color:#c0392b;background:#fff5f5;}
/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;background:#1a2537;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;z-index:500;display:none;box-shadow:0 4px 12px rgba(0,0,0,.2);}
/* FILTER */
.fbar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px;background:#fff;padding:14px 16px;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.fbar .fg{margin:0;min-width:130px;}
/* TYPE CHIP */
.chip{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:700;letter-spacing:.3px;}
.chip-R{background:#d5f5e3;color:#1e8449;}
.chip-T{background:#d6eaf8;color:#1a5276;}

/* MIS TABLE */
.mis-tbl th,.mis-tbl td{padding:10px 14px;text-align:right;}
.mis-tbl th:first-child,.mis-tbl td:first-child{text-align:left;}
.mis-tbl tfoot td{font-weight:700;border-top:2px solid var(--primary);}
@media(max-width:768px){
  .sidebar{display:none!important;}.main{margin-left:0!important;padding:12px!important;}
  .srow{grid-template-columns:repeat(2,1fr)!important;}
  .frow.c2,.frow.c3,.frow.c4{grid-template-columns:1fr!important;}
  .modal{width:100vw!important;max-width:100vw!important;border-radius:16px 16px 0 0!important;position:fixed;bottom:0;left:0;right:0;}
  .mbg.open{align-items:flex-end!important;}
}
</style>

// ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ
//  CONSTANTS
// ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ
const TX_TYPES = ['Cash Received','Transfer','Expense'];

const HEADS = {

};

const ALL_PEOPLE_KEY = 'ghj_people'; // dynamic list of people
const DEFAULT_PEOPLE = ['Admin','Cashier','Accountant','Creator','Creator2'];

const DEFAULT_USERS = [
  {email:'admin@ghj.org',   pwd:'admin123',  name:'Admin',    role:'admin'},
  {email:'approver@ghj.org',pwd:'approve123',name:'Approver', role:'approver'},
  {email:'creator@ghj.org', pwd:'create123', name:'Creator',  role:'creator'},
  {email:'creator2@ghj.org',pwd:'create456', name:'Creator2', role:'creator'},
];

// ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ
//  STATE
// ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ
let CU = null; // current user
let PAGE = 'dashboard';
let EDIT_ID = null;
let RPT_PERIOD = 'this_month';
let lastSync = localStorage.getItem('ghj_lastsync') || null;

// ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ
//  DATA HELPERS

// ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ
//  CORE LOGIC: Holdings from Cash_Transactions
// ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ
// Each transaction:
//   Cash Received : from=External, to=Person  ŌåÆ to.received += amount
//   Transfer      : from=Person,  to=Person  ŌåÆ from.given += amount, to.received += amount (internal)
//   Expense       : from=Person,  to=Vendor  ŌåÆ from.expense += amount

function computeHoldings(txArr) {
  txArr = (txArr || getTx()).filter(t => t.status !== 'voided');
  const people = getPeople();
  const H = {}; // { person: { received, given, expense, closing } }
  const init = p => { if(!H[p]) H[p] = {received:0, given:0, expense:0}; };
  people.forEach(p => init(p));

  txArr.forEach(t => {
    const amt = Number(t.amount)||0;
    if(t.txType === 'Cash Received') {
      init(t.toPerson);
      H[t.toPerson].received += amt;
    } else if(t.txType === 'Transfer') {
      init(t.fromPerson); init(t.toPerson);
      H[t.fromPerson].given    += amt;
      H[t.toPerson].received   += amt;
    } else if(t.txType === 'Expense') {
      init(t.fromPerson);
      H[t.fromPerson].expense  += amt;
    }
  });

  // closing = received - given - expense
  Object.keys(H).forEach(p => {
    H[p].closing = H[p].received - H[p].given - H[p].expense;
  });
  return H;
}

function getPersonBalance(person, txArr) {
  const H = computeHoldings(txArr);
  return (H[person]||{closing:0}).closing;
}

function updateSyncLabel() {
  const el = document.getElementById('syncLabel'); if(!el) return;
  if(!lastSync){ el.textContent='Click to sync from Sheet'; return; }
  const dt = new Date(lastSync), now = new Date();
  const mins = Math.floor((now-dt)/60000);
  const t = dt.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  const ago = mins<1?'just now':mins<60?mins+'m ago':Math.floor(mins/60)+'h ago';
  const isToday = dt.toDateString()===now.toDateString();
  el.textContent = 'Synced '+(isToday?t:dt.toLocaleDateString('en-IN',{day:'2-digit',month:'short'})+' '+t)+' ('+ago+')';
}
function setSync(){ lastSync=new Date().toISOString(); localStorage.setItem('ghj_lastsync',lastSync); updateSyncLabel(); }

function getUrl(){ return CFG.scriptUrl||localStorage.getItem('ghj_url')||''; }

async function pushTx(action, tx) {
  const url = getUrl(); const sec = CFG.secret||'';
  const payload = {action, _secret:sec,
    id:tx.id||'', srno:tx.srno||'', date:tx.date||'',
    txType:tx.txType||'', fromPerson:tx.fromPerson||'', toPerson:tx.toPerson||'',
    amount:Number(tx.amount)||0, head:tx.head||'', category:tx.category||'',
    remarks:tx.remarks||'', invoiceLink:tx.invoiceLink||'',
    status:tx.status||'pending', createdBy:tx.createdBy||'',
    approvedBy:tx.approvedBy||'', paymentRef:tx.paymentRef||'',
    screenshotLink:tx.screenshotLink||''};
  if(!url){ addQ(payload); return; }
  try{
    const r = await fetch(url,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
    const raw = await r.text();
    if(!raw||raw.trimStart().startsWith('<')) throw new Error('HTML response');
    const res = JSON.parse(raw);
    if(res.status==='ok'){ remQ(payload.id); showToast('Ō£ģ Synced to Sheet!'); }
    else throw new Error(res.error||'Script error');
  } catch(e){ addQ(payload); showToast('ŌÜĀ’ĖÅ Saved locally: '+e.message); }
}

async function doFullRefresh() {
  showToast('­¤öä Clearing cache & reloading from Sheet...');
  ['ghj_tx','ghj_people'].forEach(k=>localStorage.removeItem(k));
  await loadFromSheet();
}

async function loadFromSheet() {
  const url = getUrl(); if(!url) return;
  const sec = CFG.secret||'';
  try{
    // Load Cash_Transactions
    const r = await fetch(url+'?type=transactions&secret='+encodeURIComponent(sec),{redirect:'follow'});
    const raw = await r.text();
    if(!raw||raw.trimStart().startsWith('<')) throw new Error('HTML response ŌĆö check deployment');
    const rows = JSON.parse(raw);
    if(Array.isArray(rows)&&rows.length>=2){
      const hdr = rows[0].map(h=>String(h).toLowerCase().replace(/\s/g,''));
      const idx = h => hdr.indexOf(h);
      const qids = new Set(getQ().map(q=>q.id));
      const txs = rows.slice(1).filter(r=>r[idx('id')]||r[0]).map(r=>({
        id:        String(r[idx('id')]||r[0]||''),
        srno:      String(r[idx('srno')]||r[1]||''),
        date:      String(r[idx('date')]||r[2]||''),
        txType:    String(r[idx('txtype')]||r[3]||''),
        fromPerson:String(r[idx('fromperson')]||r[4]||''),
        toPerson:  String(r[idx('toperson')]||r[5]||''),
        amount:    parseFloat(r[idx('amount')]||r[6]||0),
        head:      String(r[idx('head')]||r[7]||''),
        category:  String(r[idx('category')]||r[8]||''),
        remarks:   String(r[idx('remarks')]||r[9]||''),
        invoiceLink:String(r[idx('invoicelink')]||r[10]||''),
        status:    String(r[idx('status')]||r[11]||'pending'),
        createdBy: String(r[idx('createdby')]||r[12]||''),
        approvedBy:String(r[idx('approvedby')]||r[13]||''),
        paymentRef:String(r[idx('paymentref')]||r[14]||''),
        screenshotLink:String(r[idx('screenshotlink')]||r[15]||''),
      })).filter(t=>!qids.has(t.id));
      txs.push(...getQ());
      saveTx(txs);
      // extract people
      const pSet = new Set(DEFAULT_PEOPLE);
      txs.forEach(t=>{ if(t.fromPerson&&t.fromPerson!=='External'&&t.fromPerson!=='Vendor') pSet.add(t.fromPerson); if(t.toPerson&&t.toPerson!=='External'&&t.toPerson!=='Vendor') pSet.add(t.toPerson); });
      savePeople([...pSet]);
    }
    setSync(); showToast('Ō£ģ Data refreshed from Google Sheet');
    showPage(PAGE);
  } catch(e){ showToast('ŌÜĀ’ĖÅ Refresh failed: '+e.message); }
}

async function retrySyncQueue() {
  const url=getUrl(); if(!url||!getQ().length) return;
  showToast('­¤öä Retrying sync...'); let n=0;
  for(const e of [...getQ()]){
    try{
      const r=await fetch(url,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(e)});
      const raw=await r.text();
      if(raw&&!raw.trimStart().startsWith('<')){ const res=JSON.parse(raw); if(res.status==='ok'){remQ(e.id);n++;} }
    }catch{}
  }
  if(n) showToast('Ō£ģ '+n+' item(s) synced!');
}

async function doLogin() {
  const email = document.getElementById('lemail').value.trim();
  const pwd   = document.getElementById('lpwd').value;
  const err   = document.getElementById('lerr');
  const btn   = document.querySelector('.btnP');
  err.style.display='none';
  const url = getUrl();
  if(url){
    btn.textContent='Verifying...'; btn.disabled=true;
    try{
      const r=await fetch(url+'?type=users&secret='+encodeURIComponent(CFG.secret||''),{redirect:'follow'});
      const raw=await r.text();
      if(raw&&!raw.trimStart().startsWith('<')){
        const rows=JSON.parse(raw);
        if(Array.isArray(rows)&&rows.length>1){
          const h=rows[0].map(x=>String(x).toLowerCase().trim());
          const ei=h.indexOf('email'),pi=['password','pwd','pass'].reduce((f,k)=>f>=0?f:h.indexOf(k),-1),ni=h.indexOf('name'),ri=h.indexOf('role');
          if(ei>=0&&pi>=0){
            const su=rows.slice(1).filter(r=>r[ei]).map(r=>({email:String(r[ei]).trim(),pwd:String(r[pi]).trim(),name:ni>=0?String(r[ni]).trim():String(r[ei]).trim(),role:ri>=0?String(r[ri]).trim().toLowerCase():'creator'}));
            if(su.length){ sd('ghj_users',su); }
          }
        }
      }
    }catch{}
    btn.textContent='Sign In'; btn.disabled=false;
  }
  const users = getUsers();
  const user = users.find(u=>u.email.toLowerCase()===email.toLowerCase()&&u.pwd===pwd);
  if(user){
    CU=user;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('appShell').style.display='block';
    document.getElementById('ubadge').textContent='­¤æż '+user.name+' ('+user.role+')';
    buildSidebar(); updateSyncLabel(); updateUB();
    showPage('dashboard');
    if(url) loadFromSheet();
    setInterval(updateSyncLabel, 60000);
    return;
  }
  err.textContent='Invalid credentials.'; err.style.display='block';
}
function doLogout(){ CU=null; document.getElementById('loginScreen').style.display='flex'; document.getElementById('appShell').style.display='none'; }

  if(!txArr.length) return '<tr><td colspan="11" style="text-align:center;padding:30px;color:var(--muted)">No transactions found.</td></tr>';
  const q = getQ();
  return txArr.slice().sort((a,b)=>b.date>a.date?1:-1).map(t=>`
  <tr style="${t.status==='voided'?'opacity:.4;text-decoration:line-through':''}">
    <td style="font-size:10px;color:var(--muted)">${t.srno}</td>
    <td>${t.date}</td>
    <td><span class="chip chip-${t.txType==='Cash Received'?'R':t.txType==='Transfer'?'T':'E'}">${t.txType}</span></td>
    <td style="font-weight:600;color:${t.txType==='Cash Received'?'#27ae60':t.txType==='Transfer'?'#1a5276':'#c0392b'}">${t.fromPerson}</td>
    <td>${t.toPerson}</td>
    <td style="font-size:11px">${t.head}</td>
    <td style="font-size:11px;color:var(--muted);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.remarks||'ŌĆö'}</td>
    <td style="font-weight:700;color:${t.txType==='Cash Received'?'#27ae60':t.txType==='Transfer'?'#1a5276':'#c0392b'}">${fmtINR(t.amount)}</td>
    <td>${t.invoiceLink?`<a href="${t.invoiceLink}" target="_blank" style="color:var(--primary)">­¤ōÄ</a>`:'ŌĆö'}</td>
    <td><span class="badge b-${t.status}">${t.status.toUpperCase()}</span>${q.find(x=>x.id===t.id)?'<span style="font-size:9px;background:#e67e22;color:#fff;border-radius:8px;padding:2px 5px;margin-left:3px">ŌÜĪ</span>':''}</td>
    <td style="white-space:nowrap">
      ${(CU.role==='admin'||(CU.role==='creator'&&t.createdBy===CU.name))&&t.status==='pending'?`<button class="btn bo bsm" onclick="openEditModal('${t.id}')">Edit</button> `:''}
      ${t.status==='approved'&&(CU.role==='admin'||CU.role==='approver')?`<button class="btn bsm" style="background:var(--accent);color:#fff" onclick="markPaid('${t.id}')">Pay</button> `:''}

}

function renderTxTable(arr){
  if(!arr||!arr.length) return '<div style="text-align:center;padding:20px;color:var(--muted)">No transactions yet.</div>';
  return `<div class="tw"><table>
    <thead><tr><th>Date</th><th>Type</th><th>From</th><th>To</th><th>Head</th><th>Amount</th><th>Status</th></tr></thead>

function filterTx(){
  const from=(document.getElementById('ff')||{}).value||'';
  const to=(document.getElementById('ft')||{}).value||'';
  const type=(document.getElementById('ftype')||{}).value||'';
  const person=(document.getElementById('fperson')||{}).value||'';
  const status=(document.getElementById('fstatus')||{}).value||'';
  const search=((document.getElementById('fsearch')||{}).value||'').toLowerCase();
  const isC=CU.role==='creator';
  let tx=getTx();
  if(isC) tx=tx.filter(t=>t.fromPerson===CU.name||t.toPerson===CU.name);
  tx=tx.filter(t=>{
    if(from&&t.date<from) return false;
    if(to&&t.date>to) return false;
    if(type&&t.txType!==type) return false;
    if(person&&t.fromPerson!==person&&t.toPerson!==person) return false;
    if(status&&t.status!==status) return false;
    if(search){const hay=[t.head,t.fromPerson,t.toPerson,t.remarks,t.srno,String(t.amount)].join(' ').toLowerCase();if(!hay.includes(search))return false;}
    return true;
  });
  const body=document.getElementById('txBody');if(body) body.innerHTML=buildTxRows(tx);
}

  const curType = v.txType||( isC?'Expense':'Cash Received');

    'Cash Received': '<b style="color:#27ae60">Cash Received:</b> Money coming IN from External ŌåÆ to a Person (Admin/Cashier/etc). From = External source.',
    'Transfer':      '<b style="color:#1a5276">Transfer:</b> Cash moving between people internally. Reduces From-Person balance, increases To-Person balance.',

    <div id="fromWrap"><label class="fl" id="fromLabel">From Person *</label>

        : `<select id="f_to">${curType==='Transfer'?`<option value="">Select...</option>${allPeopleOptTo}`:curType==='Expense'?`<option value="Vendor" selected>Vendor / External</option>`:allPeopleOptTo}</select>`}
    </div>
  </div>

  <div class="frow c2">
    <div><label class="fl">Head / Category *</label>
      <select id="f_head">${headsForType}</select>
    </div>
    <div><label class="fl">Vendor / Payee Name</label>
      <input type="text" id="f_vendor" value="${v.vendor||''}" placeholder="${curType==='Expense'?'Shop/vendor name':'Name of person/source'}">
    </div>

  <div class="frow c2">

function onTxTypeChange(){
  const type = (document.getElementById('f_txtype')||{}).value||'Cash Received';
  const headSel = document.getElementById('f_head');
  if(headSel) headSel.innerHTML = (HEADS[type]||HEADS['Expense']).map(h=>`<option>${h}</option>`).join('');
  const fromSel = document.getElementById('f_from');
  const toSel   = document.getElementById('f_to');
  const people  = getPeople();
  if(fromSel){
    if(type==='Cash Received') fromSel.innerHTML=`<option value="External" selected>External (Donor/Source)</option>`+people.map(p=>`<option>${p}</option>`).join('');
    else fromSel.innerHTML=`<option value="">Select person...</option>`+people.map(p=>`<option>${p}</option>`).join('');
  }
  if(toSel){
    if(type==='Expense') toSel.innerHTML=`<option value="Vendor" selected>Vendor / External</option>`;
    else if(type==='Transfer') toSel.innerHTML=`<option value="">Select person...</option>`+people.map(p=>`<option>${p}</option>`).join('');
    else toSel.innerHTML=people.map(p=>`<option>${p}</option>`).join('');
  }
}

function saveTxEntry(){
  const tx = getTx();
  const isC = CU.role==='creator';
  const date    = document.getElementById('f_date').value;
  const txType  = isC ? 'Expense' : (document.getElementById('f_txtype')||{}).value;
  const amount  = parseFloat(document.getElementById('f_amount').value);
  const head    = (document.getElementById('f_head')||{}).value;
  const vendor  = (document.getElementById('f_vendor')||{}).value?.trim()||'';
  const invoice = (document.getElementById('f_invoice')||{}).value?.trim()||'';
  const remarks = (document.getElementById('f_remarks')||{}).value?.trim()||'';

  let fromPerson, toPerson;
  if(isC){
    fromPerson = CU.name;
    toPerson   = vendor||'Vendor';
  } else {
    const fromEl = document.getElementById('f_from');
    const toEl   = document.getElementById('f_to');
    fromPerson   = fromEl ? fromEl.value : 'External';
    toPerson     = toEl ? toEl.value : '';
  }

  if(!date||!txType||!amount||!head||!fromPerson||!toPerson){ alert('Please fill all required fields.'); return; }
  if(amount<=0){ alert('Amount must be greater than 0.'); return; }

  // Balance validation for Expense and Transfer
  if(txType==='Expense'||txType==='Transfer'){
    const currentBal = getPersonBalance(fromPerson, tx.filter(t=>t.id!==EDIT_ID));
    if(amount>currentBal){
      if(!confirm(`ŌÜĀ’ĖÅ ${fromPerson} only has ${fmtINR(currentBal)} cash in hand.\nThis ${txType.toLowerCase()} of ${fmtINR(amount)} exceeds available balance.\n\nProceed anyway (will create deficit)?`)) return;
    }
  }

  // Ensure toPerson is not same as fromPerson for Transfer
  if(txType==='Transfer'&&fromPerson===toPerson){ alert('Transfer: From and To cannot be the same person.'); return; }

  // Update people list
  const pSet = new Set(getPeople());
  if(fromPerson!=='External') pSet.add(fromPerson);
  if(toPerson!=='Vendor'&&toPerson!=='External') pSet.add(toPerson);
  savePeople([...pSet]);

  if(EDIT_ID){
    const idx = tx.findIndex(t=>t.id===EDIT_ID); if(idx<0) return;
    tx[idx]={...tx[idx],date,txType,fromPerson,toPerson,amount,head,vendor,invoiceLink:invoice,remarks,updatedBy:CU.name,updatedAt:new Date().toISOString()};
    saveTx(tx); closeTxModal(); showPage('transactions');
    showToast('Ō£ģ Updated ŌĆö syncing...');
    pushTx('updateTx',{...tx[idx]});
  } else {
    const srno='GHJ/TX/'+String(tx.length+1).padStart(4,'0');
    const entry={id:gid(),srno,date,txType,fromPerson,toPerson,amount,head,vendor,invoiceLink:invoice,remarks,status:'pending',createdBy:CU.name,createdAt:new Date().toISOString(),approvedBy:'',paymentRef:'',screenshotLink:''};
    tx.push(entry); saveTx(tx); closeTxModal();
    showPage(CU.role==='creator'?'dashboard':'transactions');
    showToast('Ō£ģ Transaction saved ŌĆö syncing...');
    pushTx('saveTx',entry);
  }
}

function changeSt(id,status){
  const tx=getTx(), idx=tx.findIndex(t=>t.id===id); if(idx<0) return;
  tx[idx].status=status; tx[idx].approvedBy=CU.name; tx[idx].approvedAt=new Date().toISOString();
  saveTx(tx); pushTx('updateTx',tx[idx]);
  showToast(status==='approved'?'Ō£ģ Approved!':'ŌØī Rejected.');
  showPage('approvals');
}

function markPaid(id){
  const ref=prompt('Enter Payment Reference / UTR No:'); if(ref===null) return;
  const tx=getTx(), idx=tx.findIndex(t=>t.id===id); if(idx<0) return;
  tx[idx].status='paid'; tx[idx].paymentRef=ref; tx[idx].paidBy=CU.name; tx[idx].paidAt=new Date().toISOString();
  saveTx(tx); pushTx('updateTx',tx[idx]);
  showToast('­¤Æ│ Marked as Paid!'); showPage(PAGE);
}

function voidTx(id){
  if(CU.role!=='admin'){showToast('Only Admin can void.');return;}
  const tx=getTx(), t=tx.find(x=>x.id===id); if(!t) return;
  if(t.status==='paid'){showToast('Cannot void a paid entry.');return;}
  const reason=prompt('Reason for voiding (required):'); if(!reason||!reason.trim()){showToast('Cancelled.');return;}
  const idx=tx.findIndex(x=>x.id===id);
  tx[idx].status='voided'; tx[idx].voidedBy=CU.name; tx[idx].voidedAt=new Date().toISOString(); tx[idx].voidReason=reason;
  saveTx(tx); pushTx('updateTx',tx[idx]);
  showToast('Entry voided.'); showPage(PAGE);
}

function getPeriodFn(period){
  const now=new Date(),y=now.getFullYear(),m=now.getMonth();
  if(period==='this_month'){const f=new Date(y,m,1).toISOString().slice(0,10),t=new Date(y,m+1,0).toISOString().slice(0,10);return e=>e.date>=f&&e.date<=t;}
  if(period==='prev_month'){const f=new Date(y,m-1,1).toISOString().slice(0,10),t=new Date(y,m,0).toISOString().slice(0,10);return e=>e.date>=f&&e.date<=t;}
  if(period==='this_year'){return e=>e.date>=y+'-01-01'&&e.date<=y+'-12-31';}
  if(period==='last_3m'){const f=new Date(y,m-2,1).toISOString().slice(0,10);return e=>e.date>=f;}
  if(period==='last_6m'){const f=new Date(y,m-5,1).toISOString().slice(0,10);return e=>e.date>=f;}
  return()=>true;
}

async function refreshUsers(){

    const users=rows.slice(1).filter(r=>r[ei]).map(r=>({email:String(r[ei]).trim(),pwd:String(r[pi]).trim(),name:ni>=0?String(r[ni]).trim():String(r[ei]).trim(),role:ri>=0?String(r[ri]).trim().toLowerCase():'creator'}));

function dlCSV(data,name){
  if(!data||!data.length){showToast('No data.');return;}
  const keys=Object.keys(data[0]);
  const csv=[keys.join(','),...data.map(r=>keys.map(k=>{const v=String(r[k]??'');return v.includes(',')||v.includes('"')||v.includes('\n')?'"'+v.replace(/"/g,'""')+'"':v;}).join(','))].join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=name+'_'+today()+'.csv'; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('Ō£ģ Downloaded: '+a.download);
}
function downloadTxCSV(){ dlCSV(getTx().map(t=>({SrNo:t.srno,Date:t.date,TxType:t.txType,FromPerson:t.fromPerson,ToPerson:t.toPerson,Amount:t.amount,Head:t.head,Remarks:t.remarks||'',Status:t.status,CreatedBy:t.createdBy||''})),'GHJ_CashTransactions'); }
function downloadHoldings(){
  const H=computeHoldings(); const people=getPeople();
  dlCSV(people.filter(p=>H[p]).map(p=>({Person:p,Opening:0,Received:H[p].received,GivenOut:H[p].given,Expense:H[p].expense,Closing:H[p].closing,Status:H[p].closing>0?'HOLDS CASH':H[p].closing<0?'DEFICIT':'SETTLED',AsOf:new Date().toLocaleString('en-IN')})),'GHJ_Holdings');
}
async function downloadMIS(){
  const fn=getPeriodFn(RPT_PERIOD);
  const tx=getTx().filter(t=>fn(t)&&t.status!=='voided');
  const H=computeHoldings(tx); const people=getPeople();
  // Holdings CSV
  dlCSV(people.map(p=>({Person:p,Opening:0,Received:(H[p]||{received:0}).received,GivenOut:(H[p]||{given:0}).given,Expense:(H[p]||{expense:0}).expense,Closing:(H[p]||{closing:0}).closing,Period:RPT_PERIOD})),'GHJ_MIS_Holdings');
  // Push to sheet
  const url=getUrl(); if(!url){return;}
  showToast('­¤ōŖ Syncing MIS to ReportsMIS sheet...');
  const payload={action:'saveReport',_secret:CFG.secret||'',paytype:'reportsmis',
    period:RPT_PERIOD,generatedAt:new Date().toISOString(),generatedBy:CU.name,
    holdingsJson:JSON.stringify(people.map(p=>({person:p,received:(H[p]||{received:0}).received,given:(H[p]||{given:0}).given,expense:(H[p]||{expense:0}).expense,closing:(H[p]||{closing:0}).closing}))),
    ledgerRows:JSON.stringify(tx.map(t=>({srno:t.srno,date:t.date,txType:t.txType,from:t.fromPerson,to:t.toPerson,head:t.head,amount:t.amount,status:t.status})))};
  try{
    const r=await fetch(url,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
    const raw=await r.text();
    if(!raw||raw.trimStart().startsWith('<'))throw new Error('HTML response');
    const res=JSON.parse(raw);
    if(res.status==='ok') showToast('Ō£ģ MIS synced to ReportsMIS sheet!');
    else throw new Error(res.error);
  }catch(e){ showToast('ŌÜĀ’ĖÅ Sheet sync failed: '+e.message); }
}
