<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHJ Exp App</title>
<style>
:root{--primary:#1a5276;--pl:#2980b9;--accent:#e67e22;--al:#f39c12;--success:#27ae60;--danger:#c0392b;--bg:#f4f6f8;--border:#dce3ea;--text:#1c2833;--muted:#7f8c8d;--sw:260px;--hh:64px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a5276,#154360,#0d2137);}
.lbox{background:#fff;border-radius:16px;padding:40px 36px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center;}
.ltitle{font-size:22px;font-weight:700;color:var(--primary);margin-bottom:4px;}
.lsub{font-size:12px;color:var(--muted);margin-bottom:28px;}
.fg{margin-bottom:16px;text-align:left;}
.fg label{font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px;text-transform:uppercase;}
.fg input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;}
.btnP{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;}
.btnP:hover{background:var(--pl);}
.lerr{color:var(--danger);font-size:12px;margin-top:8px;display:none;}
#appShell{display:none;min-height:100vh;}
.header{position:fixed;top:0;left:0;right:0;height:var(--hh);background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.htitle{font-size:18px;font-weight:700;}.htitle span{color:var(--al);}
.hright{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.syncbar{background:rgba(255,255,255,.12);border-radius:8px;padding:4px 12px;font-size:11px;color:#fff;cursor:pointer;border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;gap:5px;}
.syncbar:hover{background:rgba(255,255,255,.22);}
.ubadge{background:rgba(255,255,255,.15);border-radius:20px;padding:5px 12px;font-size:13px;}
.blogout{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;}
.sidebar{position:fixed;top:var(--hh);left:0;width:var(--sw);bottom:0;background:#1a2537;overflow-y:auto;z-index:50;padding:16px 0;}
.nsec{padding:6px 16px 4px;font-size:10px;font-weight:700;color:#5d7499;text-transform:uppercase;letter-spacing:1px;}
.ni{display:flex;align-items:center;gap:10px;padding:10px 20px;color:#9cb2cc;cursor:pointer;font-size:13px;transition:all .2s;border-left:3px solid transparent;}
.ni:hover{background:rgba(255,255,255,.05);color:#fff;}
.ni.active{background:rgba(41,128,185,.2);color:#fff;border-left-color:var(--accent);}
.nico{font-size:16px;width:20px;text-align:center;}
.main{margin-left:var(--sw);margin-top:var(--hh);padding:24px;min-height:calc(100vh - var(--hh));}
.card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 6px rgba(0,0,0,.07);margin-bottom:20px;}
.ctitle{font-size:15px;font-weight:700;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.srow{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.sc{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-left:4px solid var(--primary);}
.slabel{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;}
.sval{font-size:22px;font-weight:700;margin-top:4px;}
.ssub{font-size:11px;color:var(--muted);margin-top:2px;}
.frow{display:grid;gap:14px;margin-bottom:14px;}
.frow.c2{grid-template-columns:1fr 1fr;}
.frow.c3{grid-template-columns:1fr 1fr 1fr;}
.frow.c4{grid-template-columns:1fr 1fr 1fr 1fr;}
.fl{font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px;text-transform:uppercase;}
input[type=text],input[type=number],input[type=date],input[type=email],select,textarea{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;color:var(--text);background:#fff;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--pl);}
textarea{resize:vertical;min-height:60px;}
.brow{display:flex;gap:10px;justify-content:flex-end;margin-top:16px;}
.btn{padding:9px 20px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;}
.bs{background:var(--primary);color:#fff;}.bs:hover{background:var(--pl);}
.bc{background:#ecf0f1;color:var(--text);}
.bsm{padding:5px 12px;font-size:11px;}
.bo{background:transparent;border:1.5px solid var(--primary);color:var(--primary);}
.bnew{background:var(--accent);color:#fff;border:none;padding:9px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;}
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{background:#f0f4f8;padding:10px 12px;text-align:left;font-weight:700;color:var(--muted);font-size:11px;text-transform:uppercase;border-bottom:2px solid var(--border);}
tbody td{padding:10px 12px;border-bottom:1px solid #f0f0f0;vertical-align:middle;}
tbody tr:hover{background:#fafbfc;}
.badge{display:inline-block;padding:3px 9px;border-radius:12px;font-size:10px;font-weight:700;}
.b-pending{background:#fef9e7;color:#d68910;}
.b-approved{background:#eafaf1;color:#1e8449;}
.b-paid{background:#eaf0fb;color:#1a5276;}
.b-rejected{background:#fdedec;color:#922b21;}
.b-voided{background:#f0f0f0;color:#888;}
.chip{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700;}
.chip-R{background:#d5f5e3;color:#1e8449;}
.chip-T{background:#d6eaf8;color:#1a5276;}
.chip-E{background:#fadbd8;color:#922b21;}
.chip-B{background:#e8daef;color:#6c3483;}
.hcard{border-radius:10px;padding:14px;margin-bottom:10px;border:1.5px solid var(--border);}
.hcard.pos{border-color:#27ae60;background:#f0fff4;}
.hcard.zero{border-color:#bdc3c7;background:#f8f9fa;}
.hcard.neg{border-color:#c0392b;background:#fff5f5;}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;}
.mbg.open{display:flex;}
.modal{background:#fff;border-radius:14px;padding:28px;width:680px;max-width:96vw;max-height:92vh;overflow-y:auto;}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.mtitle{font-size:17px;font-weight:700;color:var(--primary);}
.mclose{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);}
.fbar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px;background:#fff;padding:14px 16px;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.fbar .fg{margin:0;min-width:120px;}
.mis-tbl th,.mis-tbl td{padding:10px 14px;text-align:right;}
.mis-tbl th:first-child,.mis-tbl td:first-child{text-align:left;}
.mis-tbl tfoot td{font-weight:700;border-top:2px solid var(--primary);background:#f0f4f8;}
#toast{position:fixed;bottom:24px;right:24px;background:#1a2537;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;z-index:500;display:none;box-shadow:0 4px 12px rgba(0,0,0,.2);}
@media(max-width:768px){
  .sidebar{display:none!important;}.main{margin-left:0!important;padding:12px!important;}
  .srow{grid-template-columns:repeat(2,1fr)!important;}
  .frow.c2,.frow.c3,.frow.c4{grid-template-columns:1fr!important;}
  .modal{width:100vw!important;max-width:100vw!important;border-radius:16px 16px 0 0!important;position:fixed;bottom:0;left:0;right:0;}
  .mbg.open{align-items:flex-end!important;}
}
</style>
</head>

<script>
// ════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════
const CFG = {
  scriptUrl: 'https://script.google.com/macros/s/AKfycbxecxIf7353B_rnGZHvR1efu3O5iwGRt9ufcVT6F56CDgUMU9dQlKjPScPsu8gamMNNEA/exec',
  sheetId:   '1oXL9RineOWxOlx42vlKRrCuyxPZlmbYfjomGm6wgLnA',
  secret:    '6279@GSEKLX278905721',
};
if(CFG.scriptUrl) ls('ghj_url',CFG.scriptUrl);
if(CFG.sheetId)   ls('ghj_sid',CFG.sheetId);
if(CFG.secret)    ls('ghj_sec',CFG.secret);

// ════════════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════════════
const CASH_TX_TYPES = ['Cash Received','Transfer','Expense'];

const CASH_HEADS = {
  'Cash Received':['Cash Donation','Cash Fees','Cash Sale','Accommodation Charges','Fooding Charges','Bank Withdrawal to Cash','Corpus Fund','Capital Contribution','Miscellaneous Receipts'],
  'Transfer':     ['Petty Cash Transfer','Working Capital Transfer','Advance to Staff','Expense Advance','Return of Cash'],
  'Expense':      ['Groceries/Food Items','Admin & Office','Operational Expenses','Repair & Maintenance','Program/Event/Welfare','Purchase of Goods','Inventories','Salaries & Wages','Travel & Transportation','Marketing & Events','Government Fees/Taxes','Miscellaneous Expense']
};

const BANK_TX_TYPES = ['Bank Receipt','Bank Transfer','Bank Expense','Bank Deposit from Cash'];

const BANK_HEADS = {
  'Bank Receipt':         ['Online Donation','NEFT/RTGS Receipt','UPI Receipt','Cheque Receipt','Bank Interest','Refund Received','Grant/Aid Received'],
  'Bank Transfer':        ['Internal Fund Transfer','Advance Payment','Salary Transfer','Vendor Advance'],
  'Bank Expense':         ['Salary Payment','Vendor Payment','Utility Payment','Bank Charges','Loan EMI','Insurance Premium','Government Fees','Subscription/Software','Purchase Payment','Miscellaneous Bank Expense'],
  'Bank Deposit from Cash':['Cash Deposited to Bank']
};

const BANK_MODES = ['NEFT','RTGS','IMPS','UPI','Cheque','DD','Cash Deposit','Auto Debit','Standing Instruction'];

const DEFAULT_PEOPLE = ['Admin','Cashier','Accountant','Creator','Creator2'];
const DEFAULT_USERS  = [
  {email:'admin@ghj.org',   pwd:'admin123',  name:'Admin',    role:'admin'},
  {email:'approver@ghj.org',pwd:'approve123',name:'Approver', role:'approver'},
  {email:'creator@ghj.org', pwd:'create123', name:'Creator',  role:'creator'},
  {email:'creator2@ghj.org',pwd:'create456', name:'Creator2', role:'creator'},
];

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
let CU=null, PAGE='dashboard', EDIT_ID=null, EDIT_MODE='cash', RPT_PERIOD='this_month', lastSync=localStorage.getItem('ghj_lastsync')||null;

// ════════════════════════════════════════════
//  STORAGE HELPERS
// ════════════════════════════════════════════
function ls(k,v){ try{ if(v===undefined) return localStorage.getItem(k); localStorage.setItem(k,v); }catch{} }
function ld(k){ try{ return JSON.parse(localStorage.getItem(k))||[]; }catch{ return []; } }
function sd(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} }
function gid(){ return 'GHJ-'+Date.now()+'-'+Math.floor(Math.random()*9999); }
function fmtINR(n){ return '₹'+Number(n||0).toLocaleString('en-IN'); }
function today(){ return new Date().toISOString().split('T')[0]; }
function esc(s){ return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function getCashTx()   { return ld('ghj_ctx'); }
function saveCashTx(a) { sd('ghj_ctx',a); }
function getBankTx()   { return ld('ghj_btx'); }
function saveBankTx(a) { sd('ghj_btx',a); }
function getUsers()    { return ld('ghj_users').length ? ld('ghj_users') : DEFAULT_USERS; }
function getPeople()   { return ld('ghj_people').length ? ld('ghj_people') : [...DEFAULT_PEOPLE]; }
function savePeople(a) { sd('ghj_people',a); }
function getUrl()      { return CFG.scriptUrl||ls('ghj_url')||''; }
function getSecret()   { return CFG.secret||ls('ghj_sec')||''; }

// ════════════════════════════════════════════
//  CORE LOGIC — Cash Holdings
// ════════════════════════════════════════════
function computeCashHoldings(txArr) {
  txArr = (txArr||getCashTx()).filter(t=>t.status!=='voided');
  const people = getPeople();
  const H = {};
  const init = p => { if(!H[p]) H[p]={received:0,given:0,expense:0}; };
  people.forEach(init);
  txArr.forEach(t => {
    const amt=Number(t.amount)||0;
    if(t.txType==='Cash Received'){ init(t.toPerson);   H[t.toPerson].received+=amt; }
    else if(t.txType==='Transfer'){ init(t.fromPerson); init(t.toPerson); H[t.fromPerson].given+=amt; H[t.toPerson].received+=amt; }
    else if(t.txType==='Expense') { init(t.fromPerson); H[t.fromPerson].expense+=amt; }
  });
  Object.keys(H).forEach(p=>{ H[p].closing=H[p].received-H[p].given-H[p].expense; });
  return H;
}

function getPersonBalance(person, txArr) {
  return (computeCashHoldings(txArr||getCashTx())[person]||{closing:0}).closing;
}

// ════════════════════════════════════════════
//  SYNC TIME
// ════════════════════════════════════════════
function updateSyncLabel(){
  const el=document.getElementById('syncLabel'); if(!el) return;
  if(!lastSync){ el.textContent='Click to sync from Sheet'; return; }
  const dt=new Date(lastSync), now=new Date();
  const mins=Math.floor((now-dt)/60000);
  const t=dt.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  const ago=mins<1?'just now':mins<60?mins+'m ago':Math.floor(mins/60)+'h ago';
  el.textContent='Synced '+(dt.toDateString()===now.toDateString()?t:dt.toLocaleDateString('en-IN',{day:'2-digit',month:'short'})+' '+t)+' ('+ago+')';
}
function setSync(){ lastSync=new Date().toISOString(); localStorage.setItem('ghj_lastsync',lastSync); updateSyncLabel(); }

// ════════════════════════════════════════════
//  SYNC QUEUE
// ════════════════════════════════════════════
function getQ()     { return ld('ghj_queue'); }
function saveQ(q)   { sd('ghj_queue',q); }
function addQ(e)    { const q=getQ().filter(x=>x.ID!==e.ID); q.push({...e,_at:new Date().toISOString()}); saveQ(q); updateUB(); }
function remQ(id)   { saveQ(getQ().filter(e=>e.ID!==id)); updateUB(); }
function updateUB() { const q=getQ(),b=document.getElementById('unsyncBadge'); if(!b)return; if(q.length){b.textContent=q.length+' unsynced';b.style.display='inline-block';}else{b.style.display='none';} }

// ════════════════════════════════════════════
//  SHEET API — Push single tx
// ════════════════════════════════════════════
async function pushRow(payload) {
  const url=getUrl(); if(!url){ addQ(payload); return; }
  // Prevent duplicate: mark as in-flight
  if(payload._syncing) return;
  payload._syncing=true;
  try{
    const r=await fetch(url,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({...payload,_secret:getSecret()})});
    const raw=await r.text();
    if(!raw||raw.trimStart().startsWith('<')) throw new Error('HTML response — check Apps Script deployment');
    const res=JSON.parse(raw);
    if(res.status==='ok'){ remQ(payload.ID); showToast('✅ Saved to Google Sheet!'); }
    else throw new Error(res.error||'Script error');
  } catch(e){ addQ(payload); showToast('⚠️ Saved locally — will retry: '+e.message); }
}

// ════════════════════════════════════════════
//  BUILD PAYLOAD HELPERS
// ════════════════════════════════════════════
function cashPayload(action, t) {
  return {action, sheet:'Cash_Transactions', _secret:getSecret(),
    ID:t.id, SrNo:t.srno||'', Date:t.date||'', TxType:t.txType||'',
    FromPerson:t.fromPerson||'', ToPerson:t.toPerson||'', Amount:Number(t.amount)||0,
    Head:t.head||'', Remarks:t.remarks||'', InvoiceLink:t.invoiceLink||'',
    Status:t.status||'pending', CreatedBy:t.createdBy||'', ApprovedBy:t.approvedBy||'',
    PaymentRef:t.paymentRef||'', ScreenshotLink:t.screenshotLink||''};
}

function bankPayload(action, t) {
  return {action, sheet:'Bank_Transactions', _secret:getSecret(),
    ID:t.id, SrNo:t.srno||'', Date:t.date||'', TxType:t.txType||'',
    FromAccount:t.fromAccount||'', ToAccount:t.toAccount||'',
    BankName:t.bankName||'', AccNo:t.accNo||'', ChequeUTR:t.chequeUTR||'',
    PaymentMode:t.paymentMode||'', Amount:Number(t.amount)||0,
    Head:t.head||'', Remarks:t.remarks||'', InvoiceLink:t.invoiceLink||'',
    Status:t.status||'pending', CreatedBy:t.createdBy||'', ApprovedBy:t.approvedBy||'',
    PaymentRef:t.paymentRef||'', ScreenshotLink:t.screenshotLink||''};
}

// ════════════════════════════════════════════
//  FULL REFRESH — clears cache, reloads sheets
// ════════════════════════════════════════════
async function doFullRefresh(){
  showToast('🔄 Clearing cache & reloading from Sheet...');
  ['ghj_ctx','ghj_btx','ghj_people'].forEach(k=>localStorage.removeItem(k));
  await loadFromSheet();
}

async function loadFromSheet(){
  const url=getUrl(); if(!url) return;
  const sec=getSecret(); let loaded=0;
  try{
    // 1. Cash_Transactions
    const r1=await fetch(url+'?sheet=Cash_Transactions&secret='+encodeURIComponent(sec),{redirect:'follow'});
    const raw1=await r1.text();
    if(raw1&&!raw1.trimStart().startsWith('<')){
      const rows=JSON.parse(raw1);
      if(Array.isArray(rows)&&rows.length>=2){
        const hdr=rows[0].map(h=>String(h).toLowerCase().replace(/[^a-z]/g,''));
        const ix=h=>hdr.indexOf(h);
        const qids=new Set(getQ().filter(q=>q.sheet==='Cash_Transactions').map(q=>q.ID));
        const txs=rows.slice(1).filter(r=>r[0]).map(r=>({
          id:String(r[ix('id')]||r[0]||''), srno:String(r[ix('srno')]||r[1]||''),
          date:String(r[ix('date')]||r[2]||''), txType:String(r[ix('txtype')]||r[3]||''),
          fromPerson:String(r[ix('fromperson')]||r[4]||''), toPerson:String(r[ix('toperson')]||r[5]||''),
          amount:parseFloat(r[ix('amount')]||r[6]||0), head:String(r[ix('head')]||r[7]||''),
          remarks:String(r[ix('remarks')]||r[8]||''), invoiceLink:String(r[ix('invoicelink')]||r[9]||''),
          status:String(r[ix('status')]||r[10]||'pending'), createdBy:String(r[ix('createdby')]||r[11]||''),
          approvedBy:String(r[ix('approvedby')]||r[12]||''), paymentRef:String(r[ix('paymentref')]||r[13]||''),
          screenshotLink:String(r[ix('screenshotlink')]||r[14]||''),
        })).filter(t=>!qids.has(t.id));
        saveCashTx(txs); loaded++;
        // Build people list
        const pSet=new Set(getPeople());
        txs.forEach(t=>{ if(t.fromPerson&&!['External'].includes(t.fromPerson)) pSet.add(t.fromPerson); if(t.toPerson&&!['Vendor','External'].includes(t.toPerson)) pSet.add(t.toPerson); });
        savePeople([...pSet]);
      }
    }
    // 2. Bank_Transactions
    const r2=await fetch(url+'?sheet=Bank_Transactions&secret='+encodeURIComponent(sec),{redirect:'follow'});
    const raw2=await r2.text();
    if(raw2&&!raw2.trimStart().startsWith('<')){
      const rows=JSON.parse(raw2);
      if(Array.isArray(rows)&&rows.length>=2){
        const hdr=rows[0].map(h=>String(h).toLowerCase().replace(/[^a-z]/g,''));
        const ix=h=>hdr.indexOf(h);
        const qids=new Set(getQ().filter(q=>q.sheet==='Bank_Transactions').map(q=>q.ID));
        const txs=rows.slice(1).filter(r=>r[0]).map(r=>({
          id:String(r[ix('id')]||r[0]||''), srno:String(r[ix('srno')]||r[1]||''),
          date:String(r[ix('date')]||r[2]||''), txType:String(r[ix('txtype')]||r[3]||''),
          fromAccount:String(r[ix('fromaccount')]||r[4]||''), toAccount:String(r[ix('toaccount')]||r[5]||''),
          bankName:String(r[ix('bankname')]||r[6]||''), accNo:String(r[ix('accno')]||r[7]||''),
          chequeUTR:String(r[ix('chequeutr')]||r[8]||''), paymentMode:String(r[ix('paymentmode')]||r[9]||''),
          amount:parseFloat(r[ix('amount')]||r[10]||0), head:String(r[ix('head')]||r[11]||''),
          remarks:String(r[ix('remarks')]||r[12]||''), invoiceLink:String(r[ix('invoicelink')]||r[13]||''),
          status:String(r[ix('status')]||r[14]||'pending'), createdBy:String(r[ix('createdby')]||r[15]||''),
          approvedBy:String(r[ix('approvedby')]||r[16]||''), paymentRef:String(r[ix('paymentref')]||r[17]||''),
          screenshotLink:String(r[ix('screenshotlink')]||r[18]||''),
        })).filter(t=>!qids.has(t.id));
        saveBankTx(txs); loaded++;
      }
    }
    setSync(); showToast('✅ Refreshed — '+loaded+' sheet(s) loaded'); showPage(PAGE);
  } catch(e){ showToast('⚠️ Refresh failed: '+e.message); }
}

async function retrySyncQueue(){
  if(!getQ().length){ showToast('Nothing in queue.'); return; }
  showToast('🔄 Retrying sync...');
  await flushQueue();
}

async function doLogin(){
  const email=document.getElementById('lemail').value.trim();
  const pwd=document.getElementById('lpwd').value;
  const err=document.getElementById('lerr'), btn=document.querySelector('.btnP');
  err.style.display='none';
  const url=getUrl();
  if(url){
    btn.textContent='Verifying...'; btn.disabled=true;
    try{
      const r=await fetch(url+'?sheet=Users&secret='+encodeURIComponent(getSecret()),{redirect:'follow'});
      const raw=await r.text();
      if(raw&&!raw.trimStart().startsWith('<')){
        const rows=JSON.parse(raw);
        if(Array.isArray(rows)&&rows.length>1){
          const h=rows[0].map(x=>String(x).toLowerCase().trim());
          const ei=h.indexOf('email'),pi=['password','pwd','pass'].reduce((f,k)=>f>=0?f:h.indexOf(k),-1),ni=h.indexOf('name'),ri=h.indexOf('role');
          if(ei>=0&&pi>=0){
            const su=rows.slice(1).filter(r=>r[ei]).map(r=>({email:String(r[ei]).trim(),pwd:String(r[pi]).trim(),name:ni>=0?String(r[ni]).trim():String(r[ei]).trim(),role:ri>=0?String(r[ri]).trim().toLowerCase():'creator'}));
            if(su.length) sd('ghj_users',su);
          }
        }
      }
    }catch{}
    btn.textContent='Sign In'; btn.disabled=false;
  }
  const user=getUsers().find(u=>u.email.toLowerCase()===email.toLowerCase()&&u.pwd===pwd);
  if(user){
    CU=user;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('appShell').style.display='block';
    document.getElementById('ubadge').textContent='👤 '+user.name+' ('+user.role+')';
    buildSidebar(); updateSyncLabel(); updateUB(); showPage('dashboard');
    if(url) loadFromSheet();
    setInterval(updateSyncLabel,60000);
    return;
  }
  err.textContent='Invalid credentials.'; err.style.display='block';
}
function doLogout(){ CU=null; document.getElementById('loginScreen').style.display='flex'; document.getElementById('appShell').style.display='none'; }

function filterCash(){
  const from=(document.getElementById('cff')||{}).value||'';
  const to=(document.getElementById('cft')||{}).value||'';
  const type=(document.getElementById('cftype')||{}).value||'';
  const person=(document.getElementById('cfperson')||{}).value||'';
  const status=(document.getElementById('cfstatus')||{}).value||'';
  const search=((document.getElementById('cfsearch')||{}).value||'').toLowerCase();
  const isC=CU.role==='creator';
  let tx=getCashTx();
  if(isC) tx=tx.filter(t=>t.fromPerson===CU.name||t.toPerson===CU.name);
  tx=tx.filter(t=>{
    if(from&&t.date<from)return false; if(to&&t.date>to)return false;
    if(type&&t.txType!==type)return false;
    if(person&&t.fromPerson!==person&&t.toPerson!==person)return false;
    if(status&&t.status!==status)return false;
    if(search&&![t.head,t.fromPerson,t.toPerson,t.remarks,t.srno,String(t.amount)].join(' ').toLowerCase().includes(search))return false;
    return true;
  });
  const body=document.getElementById('cashBody'); if(body) body.innerHTML=buildCashRows(tx);
}

function renderBankTx(){
  const isC=CU.role==='creator';
  let tx=getBankTx();
  if(isC) tx=tx.filter(t=>t.createdBy===CU.name);
  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
    <div style="font-size:20px;font-weight:700;color:#6c3483">🏦 Bank Transactions <span style="font-size:12px;color:var(--muted);font-weight:400">→ Sheet: Bank_Transactions</span></div>
    <div style="display:flex;gap:8px">
      <button class="btn bo bsm" onclick="dlCSV(getBankTx().map(bankToCsvRow),'GHJ_Bank_Transactions')">⬇ CSV</button>
      <button class="bnew" style="background:#6c3483" onclick="openBankModal()">+ New Bank Tx</button>
    </div>
  </div>

  <!-- Bank Summary -->
  ${buildBankSummary()}

  <div class="fbar">
    <div class="fg"><label class="fl">From Date</label><input type="date" id="bff" onchange="filterBank()"></div>
    <div class="fg"><label class="fl">To Date</label><input type="date" id="bft" onchange="filterBank()"></div>
    <div class="fg"><label class="fl">Type</label><select id="bftype" onchange="filterBank()"><option value="">All</option>${BANK_TX_TYPES.map(t=>`<option>${t}</option>`).join('')}</select></div>
    <div class="fg"><label class="fl">Status</label><select id="bfstatus" onchange="filterBank()"><option value="">All</option><option>pending</option><option>approved</option><option>paid</option><option>rejected</option><option>voided</option></select></div>
    <div class="fg" style="min-width:140px"><label class="fl">Search</label><input type="text" id="bfsearch" placeholder="Acc / Head / Ref..." oninput="filterBank()"></div>
  </div>
  <div class="card">
    <div class="tw"><table>
      <thead><tr><th>Sr.No</th><th>Date</th><th>Type</th><th>From Account</th><th>To Account</th><th>Bank</th><th>Mode</th><th>Cheque/UTR</th><th>Head</th><th>Amount</th><th>Invoice</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody id="bankBody">${buildBankRows(tx)}</tbody>
    </table></div>
  </div>`;
}

function buildBankSummary(){
  const tx=getBankTx().filter(t=>t.status!=='voided');
  const cr=tx.filter(t=>t.txType==='Bank Receipt').reduce((s,t)=>s+Number(t.amount),0);
  const dr=tx.filter(t=>['Bank Expense','Bank Transfer'].includes(t.txType)).reduce((s,t)=>s+Number(t.amount),0);
  const dep=tx.filter(t=>t.txType==='Bank Deposit from Cash').reduce((s,t)=>s+Number(t.amount),0);
  return `<div class="srow" style="margin-bottom:16px">
    <div class="sc" style="border-left-color:#27ae60"><div class="slabel">Bank Credits (Receipts)</div><div class="sval" style="color:#27ae60">${fmtINR(cr)}</div></div>
    <div class="sc" style="border-left-color:#c0392b"><div class="slabel">Bank Debits (Expenses)</div><div class="sval" style="color:#c0392b">${fmtINR(dr)}</div></div>
    <div class="sc" style="border-left-color:#1a5276"><div class="slabel">Cash Deposited to Bank</div><div class="sval" style="color:#1a5276">${fmtINR(dep)}</div></div>
    <div class="sc" style="border-left-color:#e67e22"><div class="slabel">Net Bank Balance</div><div class="sval" style="color:${cr+dep-dr>=0?'#27ae60':'#c0392b'}">${fmtINR(cr+dep-dr)}</div></div>
  </div>`;
}

function bankToCsvRow(t){ return {SrNo:t.srno,Date:t.date,TxType:t.txType,FromAccount:t.fromAccount,ToAccount:t.toAccount,BankName:t.bankName||'',AccNo:t.accNo||'',ChequeUTR:t.chequeUTR||'',PaymentMode:t.paymentMode||'',Amount:t.amount,Head:t.head,Remarks:t.remarks||'',Status:t.status,CreatedBy:t.createdBy||'',ApprovedBy:t.approvedBy||'',PaymentRef:t.paymentRef||''}; }

function buildBankRows(arr){
  if(!arr.length) return '<tr><td colspan="13" style="text-align:center;padding:30px;color:var(--muted)">No bank transactions found.</td></tr>';
  const q=getQ();
  return arr.slice().sort((a,b)=>b.date>a.date?1:-1).map(t=>`
  <tr style="${t.status==='voided'?'opacity:.4;text-decoration:line-through':''}">
    <td style="font-size:10px;color:var(--muted)">${t.srno}</td><td>${t.date}</td>
    <td><span class="chip chip-B">${t.txType.replace('Bank ','')}</span></td>
    <td style="font-weight:600;font-size:11px">${t.fromAccount}</td>
    <td style="font-size:11px">${t.toAccount}</td>
    <td style="font-size:11px">${t.bankName||'—'}</td>
    <td style="font-size:11px">${t.paymentMode||'—'}</td>
    <td style="font-size:11px;color:var(--primary)">${t.chequeUTR||'—'}</td>
    <td style="font-size:11px">${t.head}</td>
    <td style="font-weight:700;color:#6c3483">${fmtINR(t.amount)}</td>
    <td>${t.invoiceLink?`<a href="${esc(t.invoiceLink)}" target="_blank" style="color:var(--primary)">📎</a>`:'—'}</td>
    <td><span class="badge b-${t.status}">${t.status.toUpperCase()}</span>${q.find(x=>x.ID===t.id)?'<span style="font-size:9px;background:#e67e22;color:#fff;border-radius:8px;padding:2px 5px;margin-left:3px">⚡</span>':''}</td>
    <td style="white-space:nowrap">
      ${(CU.role==='admin'||(CU.role==='creator'&&t.createdBy===CU.name))&&t.status==='pending'?`<button class="btn bo bsm" onclick="openBankModal('${t.id}')">Edit</button> `:''}
      ${t.status==='approved'&&(CU.role==='admin'||CU.role==='approver')?`<button class="btn bsm" style="background:var(--accent);color:#fff" onclick="markPaid('bank','${t.id}')">Pay</button> `:''}
      ${CU.role==='admin'&&t.status!=='paid'&&t.status!=='voided'?`<button class="btn bsm" style="background:#fee;color:#c0392b;border:1px solid #f5c6cb" onclick="voidEntry('bank','${t.id}')">✕</button>`:''}
    </td>
  </tr>`).join('');
}

function filterBank(){
  const from=(document.getElementById('bff')||{}).value||'';
  const to=(document.getElementById('bft')||{}).value||'';
  const type=(document.getElementById('bftype')||{}).value||'';
  const status=(document.getElementById('bfstatus')||{}).value||'';
  const search=((document.getElementById('bfsearch')||{}).value||'').toLowerCase();
  const isC=CU.role==='creator';
  let tx=getBankTx();
  if(isC) tx=tx.filter(t=>t.createdBy===CU.name);
  tx=tx.filter(t=>{
    if(from&&t.date<from)return false; if(to&&t.date>to)return false;
    if(type&&t.txType!==type)return false; if(status&&t.status!==status)return false;
    if(search&&![t.head,t.fromAccount,t.toAccount,t.remarks,t.srno,t.chequeUTR,String(t.amount)].join(' ').toLowerCase().includes(search))return false;
    return true;
  });
  const body=document.getElementById('bankBody'); if(body) body.innerHTML=buildBankRows(tx);
}

function openCashModal(editId){
  EDIT_ID=editId||null; EDIT_MODE='cash';
  const t=editId?getCashTx().find(x=>x.id===editId):null;
  document.getElementById('txModalTitle').textContent=editId?'Edit Cash Transaction':'New Cash Transaction';
  document.getElementById('txModalBody').innerHTML=cashForm(t);
  document.getElementById('txModal').classList.add('open');
}

function cashForm(t){
  const v=t||{}, isC=CU.role==='creator';
  const people=getPeople();
  const curType=v.txType||(isC?'Expense':'Cash Received');
  const typeOpts=isC?`<option value="Expense" selected>Expense</option>`:CASH_TX_TYPES.map(x=>`<option value="${x}"${curType===x?' selected':''}>${x}</option>`).join('');
  const hints={'Cash Received':'🟢 <b>Cash Received:</b> From = External source. To = Person receiving the cash (usually Admin).','Transfer':'🔵 <b>Transfer:</b> Between internal people. From-Person balance ↓, To-Person balance ↑.','Expense':'🔴 <b>Expense:</b> From-Person pays to external Vendor. From-Person balance ↓.'};
  const fromOpts=isC?`<input type="text" value="${CU.name}" readonly style="background:#f4f6f8">`:
    curType==='Cash Received'?`<select id="f_from"><option value="External" ${v.fromPerson==='External'||!v.fromPerson?'selected':''}>External (Donor/Source)</option>${people.map(p=>`<option ${v.fromPerson===p?'selected':''}>${p}</option>`).join('')}</select>`:
    `<select id="f_from"><option value="">Select person...</option>${people.map(p=>`<option ${v.fromPerson===p?'selected':''}>${p}</option>`).join('')}</select>`;
  const toOpts=isC?`<input type="text" value="Vendor" readonly style="background:#f4f6f8">`:
    curType==='Expense'?`<select id="f_to"><option value="Vendor" ${v.toPerson==='Vendor'||!v.toPerson?'selected':''}>Vendor / External</option></select>`:
    `<select id="f_to"><option value="">Select person...</option>${people.map(p=>`<option ${v.toPerson===p?'selected':''}>${p}</option>`).join('')}</select>`;
  return`
  <div style="background:#f0f4f8;border-left:4px solid var(--primary);padding:10px 14px;border-radius:0 8px 8px 0;font-size:12px;margin-bottom:14px" id="cashHint">${hints[curType]||''}</div>
  <div class="frow c3">
    <div><label class="fl">Date *</label><input type="date" id="f_date" value="${v.date||today()}"></div>
    <div><label class="fl">Transaction Type *</label><select id="f_txtype" onchange="onCashTypeChange()">${typeOpts}</select></div>
    <div><label class="fl">Amount (₹) *</label><input type="number" id="f_amount" value="${v.amount||''}" placeholder="0.00" min="1"></div>
  </div>
  <div class="frow c2">
    <div><label class="fl" id="fromLbl">From Person *</label><div id="fromWrap">${fromOpts}</div></div>
    <div><label class="fl" id="toLbl">To Person *</label><div id="toWrap">${toOpts}</div></div>
  </div>
  <div class="frow c2">
    <div><label class="fl">Head / Category *</label><select id="f_head">${(CASH_HEADS[curType]||CASH_HEADS['Expense']).map(h=>`<option ${v.head===h?'selected':''}>${h}</option>`).join('')}</select></div>
    <div><label class="fl">Vendor / Payee Name</label><input type="text" id="f_vendor" value="${v.vendor||''}" placeholder="Name of vendor or source"></div>
  </div>
  <div class="frow c2">
    <div><label class="fl">Invoice/Bill Link (Drive)</label><input type="text" id="f_invoice" value="${v.invoiceLink||''}" placeholder="https://drive.google.com/..."></div>
    <div><label class="fl">Remarks</label><input type="text" id="f_remarks" value="${v.remarks||''}" placeholder="Additional notes..."></div>
  </div>
  <div class="brow"><button class="btn bc" onclick="closeModal()">Cancel</button><button class="btn bs" onclick="saveCashEntry()">💾 Save to Sheet</button></div>`;
}

function onCashTypeChange(){
  const type=(document.getElementById('f_txtype')||{}).value||'Cash Received';
  const people=getPeople();
  const hint={'Cash Received':'🟢 <b>Cash Received:</b> From = External source. To = Person receiving the cash (usually Admin).','Transfer':'🔵 <b>Transfer:</b> Between internal people. From-Person balance ↓, To-Person balance ↑.','Expense':'🔴 <b>Expense:</b> From-Person pays to external Vendor. From-Person balance ↓.'};
  const hEl=document.getElementById('cashHint'); if(hEl) hEl.innerHTML=hint[type]||'';
  const h=document.getElementById('f_head'); if(h) h.innerHTML=(CASH_HEADS[type]||CASH_HEADS['Expense']).map(x=>`<option>${x}</option>`).join('');
  const fw=document.getElementById('fromWrap'), tw=document.getElementById('toWrap');
  if(fw) fw.innerHTML=type==='Cash Received'?`<select id="f_from"><option value="External" selected>External (Donor/Source)</option>${people.map(p=>`<option>${p}</option>`).join('')}</select>`:`<select id="f_from"><option value="">Select...</option>${people.map(p=>`<option>${p}</option>`).join('')}</select>`;
  if(tw) tw.innerHTML=type==='Expense'?`<select id="f_to"><option value="Vendor" selected>Vendor / External</option></select>`:`<select id="f_to"><option value="">Select...</option>${people.map(p=>`<option>${p}</option>`).join('')}</select>`;
}

function saveCashEntry(){
  const isC=CU.role==='creator';
  const date   =(document.getElementById('f_date')||{}).value;
  const txType = isC?'Expense':((document.getElementById('f_txtype')||{}).value||'');
  const amount = parseFloat((document.getElementById('f_amount')||{}).value||0);
  const head   =(document.getElementById('f_head')||{}).value;
  const vendor =(document.getElementById('f_vendor')||{}).value?.trim()||'';
  const invoice=(document.getElementById('f_invoice')||{}).value?.trim()||'';
  const remarks=(document.getElementById('f_remarks')||{}).value?.trim()||'';
  let fromPerson=isC?CU.name:((document.getElementById('f_from')||{}).value||'');
  let toPerson  =isC?(vendor||'Vendor'):((document.getElementById('f_to')||{}).value||'');
  if(!date||!txType||!amount||!head||!fromPerson||!toPerson){alert('Please fill all required fields.');return;}
  if(amount<=0){alert('Amount must be > 0.');return;}
  if(txType==='Transfer'&&fromPerson===toPerson){alert('Transfer: From and To cannot be the same person.');return;}
  // Balance check
  if(txType==='Expense'||txType==='Transfer'){
    const existing=EDIT_ID?getCashTx().filter(t=>t.id!==EDIT_ID):getCashTx();
    const bal=getPersonBalance(fromPerson,existing);
    if(amount>bal) if(!confirm(`⚠️ ${fromPerson} only has ${fmtINR(bal)} in hand.\n${txType} of ${fmtINR(amount)} exceeds balance.\nProceed (will create deficit)?`)) return;
  }
  // Update people
  const pSet=new Set(getPeople());
  if(fromPerson!=='External') pSet.add(fromPerson);
  if(toPerson!=='Vendor'&&toPerson!=='External') pSet.add(toPerson);
  savePeople([...pSet]);

  const tx=getCashTx();
  if(EDIT_ID){
    const idx=tx.findIndex(t=>t.id===EDIT_ID); if(idx<0)return;
    tx[idx]={...tx[idx],date,txType,fromPerson,toPerson,amount,head,vendor,invoiceLink:invoice,remarks,updatedBy:CU.name,updatedAt:new Date().toISOString()};
    saveCashTx(tx); closeModal(); showPage('cashtx'); showToast('✅ Updated!');
    pushRow(cashPayload('updateRow',tx[idx]));
  } else {
    const srno='GHJ/C/'+String(tx.length+1).padStart(4,'0');
    const entry={id:gid(),srno,date,txType,fromPerson,toPerson,amount,head,vendor,invoiceLink:invoice,remarks,status:'pending',createdBy:CU.name,createdAt:new Date().toISOString(),approvedBy:'',paymentRef:'',screenshotLink:''};
    tx.push(entry); saveCashTx(tx); closeModal();
    showPage(isC?'dashboard':'cashtx'); showToast('✅ Cash transaction saved!');
    pushRow(cashPayload('insertRow',entry));
  }
}

function renderApprovals(){
  const ctx=getCashTx(), btx=getBankTx();
  const pendingC=ctx.filter(t=>t.status==='pending');

  const canA=CU.role==='admin'||CU.role==='approver';
  return`

    <tbody>${pendingC.map(t=>`<tr>
      <td style="font-size:10px">${t.srno}</td><td>${t.date}</td>
      <td><span class="chip chip-${t.txType==='Cash Received'?'R':t.txType==='Transfer'?'T':'E'}">${t.txType}</span></td>
      <td style="font-weight:600">${t.fromPerson}</td><td>${t.toPerson}</td><td style="font-size:11px">${t.head}</td>
      <td style="font-weight:700">${fmtINR(t.amount)}</td>
      <td style="font-size:11px">${t.remarks||'—'}</td>

function changeSt(mode,id,status){
  const tx=mode==='cash'?getCashTx():getBankTx();
  const idx=tx.findIndex(t=>t.id===id); if(idx<0)return;
  tx[idx].status=status; tx[idx].approvedBy=CU.name; tx[idx].approvedAt=new Date().toISOString();
  mode==='cash'?saveCashTx(tx):saveBankTx(tx);
  pushRow(mode==='cash'?cashPayload('updateRow',tx[idx]):bankPayload('updateRow',tx[idx]));
  showToast(status==='approved'?'✅ Approved!':'❌ Rejected.');
  showPage('approvals');
}

function markPaid(mode,id){
  const ref=prompt('Payment Reference / UTR:'); if(ref===null)return;
  const tx=mode==='cash'?getCashTx():getBankTx();
  const idx=tx.findIndex(t=>t.id===id); if(idx<0)return;
  tx[idx].status='paid'; tx[idx].paymentRef=ref; tx[idx].paidBy=CU.name; tx[idx].paidAt=new Date().toISOString();
  mode==='cash'?saveCashTx(tx):saveBankTx(tx);
  pushRow(mode==='cash'?cashPayload('updateRow',tx[idx]):bankPayload('updateRow',tx[idx]));
  showToast('💳 Marked Paid!'); showPage(PAGE);
}

function voidEntry(mode,id){
  if(CU.role!=='admin'){showToast('Only Admin can void.');return;}
  const tx=mode==='cash'?getCashTx():getBankTx();
  const t=tx.find(x=>x.id===id); if(!t)return;
  if(t.status==='paid'){showToast('Cannot void a paid entry.');return;}
  const reason=prompt('Reason for voiding (required):'); if(!reason?.trim()){showToast('Cancelled.');return;}
  const idx=tx.findIndex(x=>x.id===id);
  tx[idx]={...tx[idx],status:'voided',voidedBy:CU.name,voidedAt:new Date().toISOString(),voidReason:reason};
  mode==='cash'?saveCashTx(tx):saveBankTx(tx);
  pushRow(mode==='cash'?cashPayload('updateRow',tx[idx]):bankPayload('updateRow',tx[idx]));
  showToast('Entry voided.'); showPage(PAGE);
}

function getPeriodFn(p){
  const now=new Date(),y=now.getFullYear(),m=now.getMonth();
  if(p==='this_month'){const f=new Date(y,m,1).toISOString().slice(0,10),t=new Date(y,m+1,0).toISOString().slice(0,10);return e=>e.date>=f&&e.date<=t;}
  if(p==='prev_month'){const f=new Date(y,m-1,1).toISOString().slice(0,10),t=new Date(y,m,0).toISOString().slice(0,10);return e=>e.date>=f&&e.date<=t;}
  if(p==='this_year'){return e=>e.date>=(y+'-01-01')&&e.date<=(y+'-12-31');}
  if(p==='last_3m'){const f=new Date(y,m-2,1).toISOString().slice(0,10);return e=>e.date>=f;}
  if(p==='last_6m'){const f=new Date(y,m-5,1).toISOString().slice(0,10);return e=>e.date>=f;}
  return()=>true;
}

async function downloadMIS(){
  const fn=getPeriodFn(RPT_PERIOD);
  const pCtx=getCashTx().filter(t=>fn(t)&&t.status!=='voided');
  const pBtx=getBankTx().filter(t=>fn(t)&&t.status!=='voided');
  const H=computeCashHoldings(pCtx), people=getPeople();
  dlCSV(people.map(p=>({Person:p,Opening:0,Received:(H[p]||{}).received||0,GivenOut:(H[p]||{}).given||0,Expense:(H[p]||{}).expense||0,Closing:(H[p]||{}).closing||0,Period:RPT_PERIOD})),'GHJ_MIS_Holdings');
  const url=getUrl(); if(!url) return;
  showToast('📊 Syncing MIS to ReportsMIS sheet...');
  const payload={action:'insertRow',sheet:'ReportsMIS',_secret:getSecret(),
    GeneratedAt:new Date().toISOString(),GeneratedBy:CU.name,Period:RPT_PERIOD,
    HoldingsJSON:JSON.stringify(people.map(p=>({person:p,...(H[p]||{received:0,given:0,expense:0,closing:0})}))),
    CashLedgerJSON:JSON.stringify(pCtx.map(t=>({srno:t.srno,date:t.date,type:t.txType,from:t.fromPerson,to:t.toPerson,head:t.head,amount:t.amount,status:t.status}))),
    BankLedgerJSON:JSON.stringify(pBtx.map(t=>({srno:t.srno,date:t.date,type:t.txType,from:t.fromAccount,to:t.toAccount,head:t.head,amount:t.amount,status:t.status})))};
  try{
    const r=await fetch(url,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
    const raw=await r.text();
    if(!raw||raw.trimStart().startsWith('<'))throw new Error('HTML response');
    const res=JSON.parse(raw);
    if(res.status==='ok') showToast('✅ MIS synced to ReportsMIS!');
    else throw new Error(res.error);
  }catch(e){ showToast('⚠️ Sheet sync failed: '+e.message); }
}

    <div class="ctitle">📋 Apps Script (Complete Code)</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:8px">Paste this entire script into your Apps Script editor (replaces existing code):</div>
    <pre style="background:#1a2537;color:#9cb2cc;padding:14px;border-radius:8px;font-size:10.5px;overflow-x:auto;white-space:pre-wrap;line-height:1.6">const SS_ID = '${ls('ghj_sid')||'YOUR_SHEET_ID'}';
const SECRET = '${ls('ghj_sec')||'YOUR_SECRET'}';

function ok(){ return ContentService.createTextOutput(JSON.stringify({status:'ok'})).setMimeType(ContentService.MimeType.JSON); }
function err(e){ return ContentService.createTextOutput(JSON.stringify({status:'error',error:String(e)})).setMimeType(ContentService.MimeType.JSON); }

function getSheet(name){
  const ss=SpreadsheetApp.openById(SS_ID);
  return ss.getSheetByName(name)||ss.insertSheet(name);
}

// Column headers for each sheet
const HEADERS = {
  Cash_Transactions:  ['ID','SrNo','Date','TxType','FromPerson','ToPerson','Amount','Head','Remarks','InvoiceLink','Status','CreatedBy','ApprovedBy','PaymentRef','ScreenshotLink'],
  Bank_Transactions:  ['ID','SrNo','Date','TxType','FromAccount','ToAccount','BankName','AccNo','ChequeUTR','PaymentMode','Amount','Head','Remarks','InvoiceLink','Status','CreatedBy','ApprovedBy','PaymentRef','ScreenshotLink'],
  Users:              ['Name','Email','Password','Role'],
  ReportsMIS:         ['GeneratedAt','GeneratedBy','Period','HoldingsJSON','CashLedgerJSON','BankLedgerJSON'],
};

function ensureHeaders(sheet, sheetName){
  if(sheet.getLastRow()===0 &amp;&amp; HEADERS[sheetName]){
    sheet.appendRow(HEADERS[sheetName]);
    sheet.getRange(1,1,1,HEADERS[sheetName].length).setFontWeight('bold').setBackground('#D0E4F7');
  }
}

function doGet(e){
  try{
    const p=e.parameter;
    if(p.secret!==SECRET) return err('Unauthorized');
    const sheetName=p.sheet||'Cash_Transactions';
    const sheet=getSheet(sheetName);
    ensureHeaders(sheet,sheetName);
    const data=sheet.getDataRange().getValues();
    return ContentService.createTextOutput(JSON.stringify(data)).setMimeType(ContentService.MimeType.JSON);
  }catch(ex){ return err(ex); }
}

function doPost(e){
  try{
    const b=JSON.parse(e.postData.contents);
    if(b._secret!==SECRET) return err('Unauthorized');
    const sheetName=b.sheet;
    const sheet=getSheet(sheetName);
    ensureHeaders(sheet,sheetName);
    const hdrs=sheet.getRange(1,1,1,sheet.getLastColumn()).getValues()[0].map(String);

    if(b.action==='insertRow'){
      const row=hdrs.map(h=>b[h]!==undefined?b[h]:'');
      sheet.appendRow(row);
      return ok();
    }

    if(b.action==='updateRow'){
      // Find row by ID (first column)
      const data=sheet.getDataRange().getValues();
      for(let i=1;i&lt;data.length;i++){
        if(String(data[i][0])===String(b.ID||b.id||'')){
          const row=hdrs.map(h=>b[h]!==undefined?b[h]:data[i][hdrs.indexOf(h)]);
          sheet.getRange(i+1,1,1,hdrs.length).setValues([row]);
          return ok();
        }
      }
      // If not found, append as new
      sheet.appendRow(hdrs.map(h=>b[h]!==undefined?b[h]:''));
      return ok();
    }

    return err('Unknown action: '+b.action);
  }catch(ex){ return err(ex); }
}</pre>

function addPerson(){ const n=(document.getElementById('newPerson')||{}).value?.trim(); if(!n){alert('Enter a name.');return;} const p=new Set(getPeople()); p.add(n); savePeople([...p]); showToast('Added: '+n); showPage('settings'); }

async function testConn(){
  const url=ls('ghj_url'); if(!url){showToast('No URL.');return;}
  const r=document.getElementById('testResult'); if(r)r.innerHTML='🔄 Testing...';
  try{
    const resp=await fetch(url+'?sheet=Cash_Transactions&secret='+encodeURIComponent(getSecret()),{redirect:'follow'});
    const raw=await resp.text();
    if(!raw||raw.trimStart().startsWith('<'))throw new Error('HTML — set "Execute as Me" + "Anyone" in deployment');
    JSON.parse(raw);
    if(r)r.innerHTML='<span style="color:var(--success)">✅ Connection OK!</span>'; showToast('✅ Connected!');
  }catch(ex){ if(r)r.innerHTML='<span style="color:var(--danger)">❌ '+ex.message+'</span>'; }
}
async function refreshUsers(){
  const url=ls('ghj_url'); if(!url){showToast('No URL.');return;}
  try{
    const r=await fetch(url+'?sheet=Users&secret='+encodeURIComponent(getSecret()),{redirect:'follow'});
    const raw=await r.text(); if(!raw||raw.trimStart().startsWith('<'))throw new Error('HTML');
    const rows=JSON.parse(raw); if(!Array.isArray(rows)||rows.length<2)throw new Error('Empty');
    const h=rows[0].map(x=>String(x).toLowerCase().trim());
    const ei=h.indexOf('email'),pi=['password','pwd','pass'].reduce((f,k)=>f>=0?f:h.indexOf(k),-1),ni=h.indexOf('name'),ri=h.indexOf('role');
    const users=rows.slice(1).filter(r=>r[ei]).map(r=>({email:String(r[ei]).trim(),pwd:String(r[pi]).trim(),name:ni>=0?String(r[ni]).trim():String(r[ei]).trim(),role:ri>=0?String(r[ri]).trim().toLowerCase():'creator'}));
    sd('ghj_users',users); showToast('✅ '+users.length+' users loaded!'); showPage('settings');
  }catch(ex){ showToast('❌ '+ex.message); }
}

function dlCSV(data,name){
  if(!data||!data.length){showToast('No data.');return;}
  const keys=Object.keys(data[0]);
  const csv=[keys.join(','),...data.map(r=>keys.map(k=>{const v=String(r[k]??'');return v.includes(',')||v.includes('"')||v.includes('\n')?'"'+v.replace(/"/g,'""')+'"':v;}).join(','))].join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download=name+'_'+today()+'.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast('✅ Downloaded: '+a.download);
}
